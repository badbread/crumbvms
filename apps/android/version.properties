# Android app version — bumped on every release.
#
# How to bump for a release:
#   1. Increment VERSION_CODE (must strictly increase for every Play Store / GitHub
#      Release upload — Android will refuse an update with a lower or equal code).
#   2. Set VERSION_NAME to the human-facing version (semver-ish, matches the git
#      tag without the "v" prefix, e.g. tag v1.2.0 -> VERSION_NAME=1.2.0).
#   3. Commit both together in the same release-prep commit, then tag (e.g. `git
#      tag v1.2.0 && git push origin v1.2.0`) to trigger
#      .github/workflows/android-release.yml.
#
# These are read by app/build.gradle.kts; if this file is missing or a key is
# absent, sane debug-friendly defaults are used instead (versionCode=1,
# versionName="0.0.1-dev") so local builds never hard-fail.
VERSION_CODE=3
VERSION_NAME=0.1.0
