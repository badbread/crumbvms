# Mosquitto MQTT broker configuration for Crumb NVR.
#
# Bound to 127.0.0.1:1883 by docker-compose.yml (LAN-local only; not exposed
# publicly). Both Frigate and the Crumb API container connect to this broker
# over the Docker bridge network.
#
# Authentication: anonymous access allowed (LAN-local; no external exposure).
# For production hardening, add password_file and TLS (see Mosquitto docs).

# Listen on all container interfaces — port binding in compose restricts to
# 127.0.0.1:1883 on the host.
listener 1883

# Allow clients without credentials.  Acceptable for LAN-local deployments;
# restrict via password_file if the MQTT port is ever exposed externally.
allow_anonymous true

# Persistence: disabled. Events are stored in Postgres via the ingester;
# MQTT is a transport, not a store. Restart-safe via HTTP backfill on startup.
persistence false

# Logging: WARN level to avoid filling the container log with heartbeats.
log_type warning
