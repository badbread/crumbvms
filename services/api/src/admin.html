    `<div title="${esc(s.title)}" style="flex:1;height:4px;border-radius:2px;background:${idx <= WZ.i ? 'var(--accent)' : 'var(--border)'}"></div>`).join('');
  $('wizard-title').textContent = step.title;
  $('wizard-hint').textContent = step.hint;
  wizardMsg('');
  $('wizard-body').innerHTML = wizardBody(step.key);
  $('wizard-back').style.visibility = (WZ.i > 0 && WZ.steps[WZ.i - 1].key !== 'admin') ? 'visible' : 'hidden';
  $('wizard-skip').style.display = step.skippable ? '' : 'none';
  $('wizard-next').textContent = step.next || 'Next';
  // The terms step gates Next on the acknowledgement checkbox; every other step
  // leaves it enabled (clearing any disable left over from visiting terms).
  $('wizard-next').disabled = (step.key === 'terms') && !(($('wz-terms-agree') || {}).checked);
  if (step.key === 'storage') {
    if (WZ.storages === null) wizardLoadStorage();
    else if ($('wz-storage-path')) wizardStorageCheck();
  }
  if (step.key === 'cam-find') {
    if (WZ.existing === null) wizardLoadExisting();
    // Prefill the scan range once, from the server's Host-derived /24 guess.
    if (!WZ.scan.range && WZ.suggested.suggested_scan_range) WZ.scan.range = WZ.suggested.suggested_scan_range;
    const ri = $('wz-scan-range'); if (ri) ri.value = WZ.scan.range;
  }
  if (step.key === 'cam-select') { wizardAutoThumbs(); /* groups loaded lazily on cam-commit */ }
  if (step.key === 'detect-hw') wizardDetectHwEnter();
  if (step.key === 'users') wizardUsersEnter();
}

/* Load the storage rows AND the default policy so the storage step can show the
   disk the default policy actually records to (§4.4) plus its size cap/retention. */
async function wizardLoadStorage() {
  try { WZ.storages = await api('/config/storages'); } catch { WZ.storages = []; }
  try { WZ.defaultPolicy = await api('/config/policy/default'); } catch { WZ.defaultPolicy = null; }
  // "Default storage" = the storage the DEFAULT POLICY records to, NOT a
  // non-existent `is_default` flag on the storage row (the old dead lookup).
  const wantId = WZ.defaultPolicy && WZ.defaultPolicy.live_storage_id;
  const st = (WZ.storages || []).find(s => s.id === wantId) || (WZ.storages || [])[0];
  WZ._storageId = st ? st.id : null;
  WZ.defaultStorage = st || null;
  if (wizardStepKey() === 'storage') wizardRender();
}

/* ── Storage-path preflight (writability + free space) ───────────────────────
   The old storage step showed a capacity bar ONLY when the disk reported a
   non-zero size, so a writable-but-full (or statvfs-reports-zero) path showed
   NOTHING and the wizard happily advanced, setting up a system that silently
   records no footage. This POSTs /config/fs/check for the path currently in the
   box, paints a live status line, and returns the verdict so wizardSave can
   hard-block "Next" on an `error`. Degrades silently on an older server that
   lacks the endpoint (404). */
let FS_CHECK_AVAILABLE = true;
let _wzStorageCheckT = null;
let _wzStorageCheckSeq = 0;
function wizardStorageCheckDebounced() {
  clearTimeout(_wzStorageCheckT);
  _wzStorageCheckT = setTimeout(() => { wizardStorageCheck(); }, 400);
}
async function wizardStorageCheck() {
  const el = $('wz-storage-check');
  const inp = $('wz-storage-path');
  if (!inp) return null;
  const path = (inp.value || '').trim();
  if (!path) { if (el) el.innerHTML = ''; if (WZ) WZ._storageCheck = null; return null; }
  if (!FS_CHECK_AVAILABLE) return null;
  if (el) el.innerHTML = '<span style="color:var(--dim2)">Checking folder…</span>';
  const seq = ++_wzStorageCheckSeq;
  let res;
  try {
    const r = await fetch('/config/fs/check', {
      method: 'POST',
      headers: Object.assign({ 'Content-Type': 'application/json' }, TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {}),
      body: JSON.stringify({ path })
    });
    if (r.status === 404) { FS_CHECK_AVAILABLE = false; if (el) el.innerHTML = ''; return null; }
    if (r.status === 401) { logout(); return null; }
    if (!r.ok) {
      let m = r.statusText; try { const j = await r.json(); m = j.message || j.error || m; } catch {}
      if (el && seq === _wzStorageCheckSeq) el.innerHTML = `<span style="color:var(--warn)">Couldn't check this folder: ${esc(m)}</span>`;
      return null;
    }
    res = await r.json();
  } catch (_) {
    if (el && seq === _wzStorageCheckSeq) el.innerHTML = `<span style="color:var(--warn)">Couldn't check this folder.</span>`;
    return null;
  }
  if (seq !== _wzStorageCheckSeq) return WZ ? WZ._storageCheck : null; // superseded by a newer keystroke
  if (WZ) WZ._storageCheck = res;
  if (el) el.innerHTML = wizardStorageCheckHtml(res);
  return res;
}
function wizardStorageCheckHtml(res) {
  if (!res) return '';
  const color = res.status === 'error' ? 'var(--danger)' : (res.status === 'warn' ? 'var(--warn)' : 'var(--ok)');
  const mark  = res.status === 'error' ? '✕' : (res.status === 'warn' ? '!' : '✓');
  return `<span style="color:${color};font-weight:700">${mark}</span> <span style="color:var(--dim)">${esc(res.message || '')}</span>`;
}

/* Existing cameras, used client-side to grey out already-added devices in the
   scan results (match discovered ip against onvif_host + host-of-source_url). */
async function wizardLoadExisting() {
  try { WZ.existing = await api('/config/cameras'); } catch { WZ.existing = []; }
  if (wizardStepKey() === 'cam-find') wizardHostRender();
}

/* Pull the host (IP or name) out of an rtsp/http URL, creds and port stripped. */
function hostOfUrl(u) {
  if (!u) return '';
  try {
    // URL() needs a scheme; camera source_urls always have rtsp:// etc.
    return new URL(u).hostname || '';
  } catch {
    // Best-effort fallback for odd strings: strip scheme, creds, path, port.
    let s = String(u).replace(/^[a-z]+:\/\//i, '');
    const at = s.lastIndexOf('@'); if (at >= 0) s = s.slice(at + 1);
    s = s.split('/')[0].split('?')[0];
    // strip :port (but keep bare host)
    const colon = s.lastIndexOf(':'); if (colon > 0 && /^\d+$/.test(s.slice(colon + 1))) s = s.slice(0, colon);
    return s;
  }
}

/* Is this discovered IP already added as a camera? Matches onvif_host and the
   host part of source_url on every existing camera. */
function wizardAlreadyAdded(ip) {
  if (!ip || !WZ.existing) return false;
  return (WZ.existing || []).some(c =>
    (c.onvif_host && c.onvif_host === ip) ||
    (c.source_url && hostOfUrl(c.source_url) === ip));
}

/* Small pill badge (no dedicated .badge CSS class exists, style inline). */
function wizardPill(text, accent) {
  const bg = accent ? 'var(--accent-dim,rgba(80,140,255,.15))' : 'var(--border)';
  const fg = accent ? 'var(--accent)' : 'var(--dim)';
  return `<span style="display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;background:${bg};color:${fg}">${esc(text)}</span>`;
}

/* ── Storage step (§3.1) ─────────────────────────────────────────────────────
   Disk card for the storage the DEFAULT POLICY records to: editable path, live
   capacity bar, a "keep at most" GB cap → default policy live_max_bytes, and a
   "keep at least" retention-days → live_retention_hours. */
function wizardStorageBody() {
  if (WZ.storages === null) return '<div class="login-sub">Loading…</div>';
  const st = WZ.defaultStorage || (WZ.storages || []).find(s => s.id === WZ._storageId) || (WZ.storages || [])[0];
  if (!st) return '<div class="login-sub">No storage is configured yet, Crumb will use its built-in default folder. You can add disks later from the console.</div>';
  const total = st.fs_total_bytes || st.total_bytes || 0;
  const free = st.free_bytes;
  const used = (total && free != null) ? Math.max(0, total - free) : 0;
  const usedPct = total ? Math.min(100, Math.round(used / total * 100)) : 0;
  const capBar = total ? `
    <div style="height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-top:8px">
      <div style="height:100%;width:${usedPct}%;background:var(--accent)"></div>
    </div>
    <div class="login-sub" style="margin-top:6px">${fmtBytes(free)} free of ${fmtBytes(total)}${total ? ` · ${usedPct}% used` : ''}</div>` : '';
  // Cap prefill: min(80% of fs_total, free − 50 GiB) so a novice disk can't fill.
  const dp = WZ.defaultPolicy || {};
  const HEADROOM = 50 * 1024 * 1024 * 1024;
  const capDefaultBytes = total
    ? Math.max(0, Math.min(Math.floor(total * 0.8), (free != null ? free - HEADROOM : Math.floor(total * 0.8))))
    : 0;
  const capBytes = (dp.live_max_bytes != null) ? dp.live_max_bytes : capDefaultBytes;
  const capGb = capBytes ? Math.round(capBytes / 1e9) : '';
  const retHours = (dp.live_retention_hours != null) ? dp.live_retention_hours : 720; // 30 days default
  const retDays = Math.max(1, Math.round(retHours / 24));
  return `
    <div class="form-grid" style="margin-top:2px">
      <label class="fg-label" for="wz-storage-path">Recording folder</label>
      <div class="fg-ctl">
        <input id="wz-storage-path" class="mono" value="${esc(st.path || '')}" style="font-size:13px" oninput="wizardStorageCheckDebounced()" />
        ${fsbBtn('wz-storage-path')}
      </div>
      <div class="fg-full">${capBar}<div id="wz-storage-check" class="login-sub" style="margin-top:6px"></div></div>
      <label class="fg-label" for="wz-storage-cap">Keep at most (GB)</label>
      <div class="fg-ctl"><input id="wz-storage-cap" type="number" min="1" value="${capGb}" placeholder="unlimited" style="max-width:140px" /></div>
      <label class="fg-label" for="wz-storage-days">Keep at least (days)</label>
      <div class="fg-ctl"><input id="wz-storage-days" type="number" min="1" value="${retDays}" style="max-width:140px" /></div>
    </div>
    <div class="login-sub" style="margin-top:8px">
      Oldest footage is deleted first, once either limit is reached. The size cap keeps this disk from filling —
      we pre-filled a safe value from its capacity.
    </div>
    <details style="margin-top:12px">
      <summary style="cursor:pointer;color:var(--dim);font-size:13px">Advanced</summary>
      <div class="login-sub" style="margin-top:8px">
        Need a second disk or a separate archive tier? Finish setup, then open
        <b>Storage</b> and <b>Recording policies</b> in the console, those give the full controls.
      </div>
    </details>`;
}

/* ── Find step (§3.2) ────────────────────────────────────────────────────────
   Range + shared creds, chunked scan with a live progress bar, results table. */
function wizardFindBody() {
  const sc = WZ.scan;
  const range = sc.range || WZ.suggested.suggested_scan_range || '';
  return `
    <label class="field-label" style="margin-top:0">IP range</label>
    <input id="wz-scan-range" class="mono" value="${esc(range)}" placeholder="192.168.1.0/24   or   192.168.1.1-254" style="font-size:13px" oninput="WZ.scan.range=this.value" />
    <label class="field-label" style="margin-top:10px">Camera credentials <span style="color:var(--dim2);font-weight:400">(optional, add every login your cameras use)</span></label>
    ${wizardCredListHtml()}
    <div class="login-sub" style="margin-top:6px">Detection works without credentials; reading each camera's stream URLs needs them. Each set is tried against each camera until one works, the working login is saved on that camera. Different brands usually mean different logins: add one set per brand.</div>
    <div style="margin-top:14px;display:flex;align-items:center;gap:12px">
      <button class="primary" id="wz-scan-go" onclick="wizardRunScan()" ${sc.scanning ? 'disabled' : ''}>${sc.scanning ? 'Scanning…' : (sc.done ? 'Scan again' : 'Scan')}</button>
      <span id="wz-scan-status" style="font-size:13px;color:var(--dim)">${wizardScanStatusText()}</span>
    </div>
    <div id="wz-scan-progress" style="margin-top:10px">${wizardScanProgressBar()}</div>
    <div id="wz-scan-results" style="margin-top:12px">${wizardScanResultsTable()}</div>
    <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">${wizardManualAddBlock()}</div>`;
}

/* ── Credential list (commercial-VMS-style) ──────────────────────────────────────
   The wizard holds a LIST of user/pass sets for the session (WZ.scan.creds).
   The scan sweep runs with set #1; cameras that still lack a usable stream URL
   get the remaining sets tried one-by-one (single-IP re-scans) until one works.
   The working set is recorded on the row → persisted onto the camera at commit
   (onvif_user/onvif_password), so PTZ/redetect keep working later. The list is
   session-only by design: persisting camera passwords in browser storage would
   be a plaintext-secret regression. */
function wizardCreds() {
  if (!Array.isArray(WZ.scan.creds) || !WZ.scan.creds.length) WZ.scan.creds = [{ user: WZ.scan.user || '', pass: WZ.scan.pass || '' }];
  return WZ.scan.creds;
}
/* Non-empty sets only, deduped (same user+pass entered twice counts once). */
function wizardCredsClean() {
  const seen = new Set(); const out = [];
  for (const cr of wizardCreds()) {
    const u = (cr.user || '').trim(); const p = cr.pass || '';
    if (!u) continue;
    const k = u + '␀' + p;
    if (seen.has(k)) continue;
    seen.add(k); out.push({ user: u, pass: p });
  }
  return out;
}
function wizardCredListHtml() {
  const creds = wizardCreds();
  const rows = creds.map((cr, i) => `
    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;margin-top:${i ? 6 : 4}px">
      <input class="wz-cred-user" autocomplete="off" placeholder="username (e.g. admin)" value="${esc(cr.user || '')}" oninput="wizardCreds()[${i}].user=this.value" />
      <input type="password" autocomplete="new-password" placeholder="password" value="${esc(cr.pass || '')}" oninput="wizardCreds()[${i}].pass=this.value" />
      ${creds.length > 1 ? `<button class="sm ghost" title="Remove this credential set" onclick="wizardCredRemove(${i})">✕</button>` : '<span style="width:26px"></span>'}
    </div>`).join('');
  return `<div id="wz-cred-list">${rows}
    <button class="sm ghost" style="margin-top:8px" onclick="wizardCredAdd()">＋ Add another credential set</button>
  </div>`;
}
function wizardCredAdd() {
  wizardCreds().push({ user: '', pass: '' });
  const el = $('wz-cred-list'); if (el) el.outerHTML = wizardCredListHtml();
  // Focus the new row's username so the user can just start typing.
  const users = document.querySelectorAll('#wz-cred-list .wz-cred-user');
  if (users.length) users[users.length - 1].focus();
}
function wizardCredRemove(i) {
  wizardCreds().splice(i, 1);
  const el = $('wz-cred-list'); if (el) el.outerHTML = wizardCredListHtml();
}
/* Remember a set that just worked (per-device entry) for the rest of the session
   so the other cameras sharing that login resolve without retyping. */
function wizardCredRemember(user, pass) {
  const u = (user || '').trim(); if (!u) return;
  if (wizardCreds().some(cr => (cr.user || '').trim() === u && (cr.pass || '') === (pass || ''))) return;
  // Replace a trailing empty row if present, else append.
  const creds = wizardCreds();
  const last = creds[creds.length - 1];
  if (last && !(last.user || '').trim() && !last.pass) creds[creds.length - 1] = { user: u, pass: pass || '' };
  else creds.push({ user: u, pass: pass || '' });
}

function wizardScanStatusText() {
  const sc = WZ.scan;
  if (sc.error) return '';
  if (sc.resolving) return `${sc.scanned} / ${sc.total} scanned · ${sc.results.length} found · trying saved credentials on ${sc.resolving} camera${sc.resolving !== 1 ? 's' : ''}…`;
  if (sc.scanning || sc.done) {
    const found = sc.results.length;
    return `${sc.scanned} / ${sc.total} host${sc.total !== 1 ? 's' : ''} scanned · ${found} found`;
  }
  return '';
}

function wizardScanProgressBar() {
  const sc = WZ.scan;
  if (!sc.scanning && !sc.done) return '';
  const pct = sc.total ? Math.min(100, Math.round(sc.scanned / sc.total * 100)) : 0;
  return `<div style="height:6px;border-radius:3px;background:var(--border);overflow:hidden">
    <div style="height:100%;width:${pct}%;background:var(--accent);transition:width .2s"></div>
  </div>`;
}

/* Refresh only the live scan bits without rebuilding the whole step (so the input
   focus / typed creds aren't lost mid-scan). */
function wizardScanRefresh() {
  const btn = $('wz-scan-go'); if (btn) { btn.disabled = WZ.scan.scanning; btn.textContent = WZ.scan.scanning ? 'Scanning…' : (WZ.scan.done ? 'Scan again' : 'Scan'); }
  const stt = $('wz-scan-status'); if (stt) stt.textContent = wizardScanStatusText();
  const pr = $('wz-scan-progress'); if (pr) pr.innerHTML = wizardScanProgressBar();
  const rt = $('wz-scan-results'); if (rt) rt.innerHTML = wizardScanResultsTable();
  const em = $('wz-scan-msg'); if (em) em.textContent = WZ.scan.error || '';
}

/* A discovered stream URL is "usable" only if it has a real path, a bare
   rtsp://host[:port]/ from discovery is a placeholder that still needs creds. */
function wizardUsableMain(url) {
  if (!url) return false;
  const m = /^rtsp:\/\/[^/]+(\/.*)?$/i.exec(String(url).trim());
  if (!m) return false;
  return (m[1] || '').replace(/^\/+/, '').length > 0;
}
function wizardScanResultsTable() {
  const sc = WZ.scan;
  let msg = '';
  if (sc.error) msg = `<div class="form-msg err" style="display:block">${esc(sc.error)}</div>`;
  if (sc.done && !sc.results.length && !sc.error) {
    return `<div class="empty-state"><div class="empty-icon">${icon('search',32)}</div>
      <p>No cameras found in that range. Check the range and (for ONVIF) the credentials.
      If your cameras are on a separate VLAN, make sure the Crumb server can route to it.</p></div>`;
  }
  if (!sc.results.length) return `<div id="wz-scan-msg" style="color:var(--danger);font-size:13px">${esc(sc.error || '')}</div>`;
  // Render IP-sorted, but keep each row's TRUE array index (i), WZ.rows /
  // selection / credsOpen are all keyed by array position, which merge-scan keeps
  // stable, so we sort the DISPLAY only, never the underlying array.
  const order = sc.results.map((c, i) => i).sort((a, b) => wizardIpKey(sc.results[a].ip) - wizardIpKey(sc.results[b].ip));
  const rows = order.map(i => {
    const c = sc.results[i];
    const already = wizardAlreadyAdded(c.ip);
    const silent = !!(sc.noResp && sc.noResp.has(c.ip));   // seen before, quiet this pass
    const dim = already ? 'opacity:.5' : (silent ? 'opacity:.55' : '');
    const model = c.model
      ? `${esc(c.model)}${c.manufacturer ? ' <span style="color:var(--dim)">· ' + esc(c.manufacturer) + '</span>' : ''}`
      : (c.is_onvif ? '<span style="color:var(--dim)">ONVIF device</span>' : '<span style="color:var(--dim)">RTSP server</span>');
    const proto = c.is_onvif ? wizardPill('ONVIF', true) : wizardPill('RTSP', false);
    const usable = wizardUsableMain(c.rtsp_main);
    let stream;
    if (silent) stream = '<span style="font-size:12px;font-weight:600;color:var(--dim)">no response this pass</span>';
    else if (usable) stream = '<span style="font-size:12px;font-weight:600;color:var(--ok)">found</span>';
    else if (c.is_onvif) stream = '<span style="font-size:12px;font-weight:600;color:var(--warn)">needs credentials</span>';
    else stream = '<span style="font-size:12px;font-weight:600;color:var(--accent2)">needs path</span>';
    const credsOpen = !!(WZ.scan.credsOpen && WZ.scan.credsOpen[i]);
    // Per-row Rescan: single-IP /config/discover with the larger timeout so a slow
    // camera (Reolink busy) that dropped out this pass gets a patient retry.
    const rescanBtn = `<button class="sm ghost" onclick="wizardRescanRow(${i})" ${sc.rescanning === c.ip ? 'disabled' : ''} title="Re-probe just this camera, patiently">${sc.rescanning === c.ip ? '…' : 'Rescan'}</button>`;
    const status = already
      ? '<span style="font-size:12px;color:var(--dim)">Already added</span>'
      : `<div style="display:flex;gap:6px;justify-content:flex-end;align-items:center">${(c.is_onvif && !usable && !silent)
          ? `<button class="sm ghost" onclick="wizardToggleCreds(${i})" title="Enter this camera's credentials and re-read its stream URLs">${credsOpen ? 'Cancel' : 'Creds…'}</button>`
          : ''}${rescanBtn}</div>`;
    const canSel = !already;
    const checked = (WZ.rows[i] && WZ.rows[i].sel) ? 'checked' : '';
    const chk = canSel
      ? `<input type="checkbox" ${checked} onchange="wizardToggleRow(${i}, this.checked)" />`
      : '';
    const credsRow = credsOpen ? `<tr><td></td><td colspan="5" style="padding:6px 4px 12px">
      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
        <div><div class="field-label" style="margin:0 0 3px">Username</div><input id="wz-cred-user-${i}" value="${esc((wizardCredsClean()[0] || {}).user || 'admin')}" autocomplete="off" style="width:150px" /></div>
        <div><div class="field-label" style="margin:0 0 3px">Password</div><input id="wz-cred-pass-${i}" type="password" autocomplete="new-password" style="width:170px" /></div>
        <button class="sm" onclick="wizardApplyCreds(${i})">Try credentials</button>
        <span style="color:var(--dim);font-size:12px;padding-bottom:6px">Re-reads this camera's stream URLs with these credentials.</span>
      </div></td></tr>` : '';
    return `<tr style="${dim}">
      <td style="width:32px;text-align:center">${chk}</td>
      <td class="mono" style="font-size:12px">${esc(c.ip)}</td>
      <td>${model}<div style="font-size:11px;color:var(--dim);margin-top:2px">${esc(c.note || '')}</div></td>
      <td>${proto}</td>
      <td>${stream}</td>
      <td class="td-right">${status}</td>
    </tr>${credsRow}`;
  }).join('');
  const selectable = sc.results.filter(c => !wizardAlreadyAdded(c.ip)).length;
  const bulk = selectable ? `<div style="display:flex;gap:8px;margin:0 0 8px;flex-wrap:wrap">
      <button class="sm ghost" onclick="wizardSelectAllReady()">Select all ready</button>
      <button class="sm ghost" onclick="wizardSelectAll()">Select all</button>
      <button class="sm ghost" onclick="wizardSelectNone()">None</button>
      <div style="flex:1"></div>
      <button class="sm ghost" onclick="wizardClearResults()" title="Discard all discovered cameras and start the results list fresh">Clear results</button>
    </div>` : '';
  return `${bulk}
    <div class="table-wrap" style="border-top:1px solid var(--border)">
      <table>
        <thead><tr>
          <th style="width:32px"></th>
          <th style="width:18%">IP</th>
          <th style="width:34%">Model</th>
          <th style="width:12%">Protocol</th>
          <th style="width:16%">Stream</th>
          <th style="width:14%"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* Parse a scan range into a flat list of IPv4 strings (client-side), so we can
   chunk it. Mirrors what the backend `parse_range` accepts: CIDR, dash range, or
   single IP. Returns [] on anything unparseable (server would reject anyway). */
function wizardExpandRange(range) {
  const r = (range || '').trim();
  const toInt = (ip) => { const p = ip.split('.').map(Number); if (p.length !== 4 || p.some(n => isNaN(n) || n < 0 || n > 255)) return null; return ((p[0]<<24)>>>0) + (p[1]<<16) + (p[2]<<8) + p[3]; };
  const toIp = (n) => [(n>>>24)&255, (n>>>16)&255, (n>>>8)&255, n&255].join('.');
  const push = (lo, hi, out) => { if (lo == null || hi == null || hi < lo) return; if (hi - lo > 65535) hi = lo + 65535; for (let n = lo; n <= hi; n++) out.push(toIp(n)); };
  const out = [];
  if (r.includes('/')) {
    const [base, bitsStr] = r.split('/');
    const b = toInt(base), bits = parseInt(bitsStr, 10);
    if (b == null || isNaN(bits) || bits < 8 || bits > 32) return [];
    const mask = bits === 0 ? 0 : (0xFFFFFFFF << (32 - bits)) >>> 0;
    const net = (b & mask) >>> 0;
    const bcast = (net | (~mask >>> 0)) >>> 0;
    // Skip network + broadcast for /24 and wider host ranges; keep single-host /32.
    if (bits >= 31) push(net, bcast, out); else push((net + 1) >>> 0, (bcast - 1) >>> 0, out);
  } else if (r.includes('-')) {
    // "a.b.c.1-254" (last-octet) or "a.b.c.d-e.f.g.h" (full)
    const [lhs, rhs] = r.split('-').map(s => s.trim());
    if (rhs.includes('.')) { push(toInt(lhs), toInt(rhs), out); }
    else {
      const lo = toInt(lhs); const last = parseInt(rhs, 10);
      if (lo == null || isNaN(last) || last < 0 || last > 255) return [];
      const base = (lo & 0xFFFFFF00) >>> 0; push(lo, (base + last) >>> 0, out);
    }
  } else {
    const one = toInt(r); if (one != null) out.push(toIp(one));
  }
  return out;
}

/* Chunked scan (§3.2): split the range client-side into 48-IP blocks and call the
   existing synchronous POST /config/discover per block, appending rows as blocks
   return. Live progress bar; sidesteps the server's 60s wall-clock cap. */
const WZ_SCAN_CHUNK = 48;
/* Space successive auth attempts against the SAME ip so a slow/lockout-prone
   camera isn't hammered (per-ip serialization already exists; this just paces it). */
const WZ_AUTH_SPACING_MS = 300;
const wzSleep = (ms) => new Promise(r => setTimeout(r, ms));
/* Stable hash of a credential set for the credFail memo (never stores raw pass in
   a way that's read back, only compared). */
function wizardCredKey(ip, cr) {
  const u = ((cr && cr.user) || '').trim();
  const p = (cr && cr.pass) || '';
  // Cheap non-crypto hash; collisions here only risk a redundant skip, never a leak.
  let h = 0; const s = p; for (let n = 0; n < s.length; n++) { h = ((h << 5) - h + s.charCodeAt(n)) | 0; }
  return ip + '|' + u + '|' + (h >>> 0);
}
function wizardCredFailed(ip, cr) { return !!(WZ.scan.credFail && WZ.scan.credFail.has(wizardCredKey(ip, cr))); }
function wizardMarkCredFail(ip, cr) { WZ.scan.credFail = WZ.scan.credFail || new Set(); WZ.scan.credFail.add(wizardCredKey(ip, cr)); }
/* Index of an already-seen result by IP (merge scans update in place so the row
   index, and thus WZ.rows/selection/typed edits keyed by it, stays stable). */
function wizardResultIndexOf(ip) { return WZ.scan.results.findIndex(c => c && c.ip === ip); }
/* Order the remaining credential sets winner-first: the most-recently-successful
   set is tried before the rest, so a re-scan resolves siblings sharing that login
   in one attempt. */
function wizardCredOrder(sets) {
  const w = WZ.scan.lastWinner;
  if (!w) return sets.slice();
  const rest = sets.filter(cr => !((cr.user || '').trim() === (w.user || '').trim() && (cr.pass || '') === (w.pass || '')));
  const front = sets.filter(cr => (cr.user || '').trim() === (w.user || '').trim() && (cr.pass || '') === (w.pass || ''));
  return [...front, ...rest];
}
/* Hard reset (Clear results), wipes discovered cameras + selection but keeps the
   typed range and credential list. */
function wizardClearResults() {
  const sc = WZ.scan;
  sc.results = []; sc.scanned = 0; sc.total = 0; sc.done = false; sc.error = '';
  sc.seenIps = new Set(); sc.credOf = {}; sc.credFail = new Set(); sc.lastWinner = null;
  sc.noResp = new Set(); sc.resolving = 0; sc.credsOpen = {};
  WZ.rows = {};
  wizardHostRender();
}
async function wizardRunScan() {
  const sc = WZ.scan;
  if (sc.scanning) return;
  const range = (WZ.scan.range || '').trim();
  if (!range) { sc.error = 'Enter an IP range first.'; wizardScanRefresh(); return; }
  const ips = wizardExpandRange(range);
  if (!ips.length) { sc.error = 'That range didn\'t parse. Use 192.168.1.0/24 or 192.168.1.1-254.'; wizardScanRefresh(); return; }
  const creds = wizardCredsClean();
  const first = creds[0] || null;
  // MERGE, don't reset: previously-found cameras stay. Ones that respond again are
  // updated in place (index stable → selection + typed edits survive). A camera
  // seen before but silent this pass is flagged "no response this pass", not
  // dropped. `credOf` remembers which set resolved each IP; `seenIps` accumulates.
  const firstEver = !sc.done && !sc.results.length;
  sc.scanning = true; sc.error = ''; sc.scanned = 0; sc.total = ips.length; sc.resolving = 0;
  sc.seenIps = sc.seenIps || new Set();
  sc.credOf = sc.credOf || {};
  sc.credFail = sc.credFail || new Set();
  sc.noResp = sc.noResp || new Set();
  // This pass' responders, anything previously-seen but missing becomes "no resp".
  const respondedThisPass = new Set();
  wizardScanRefresh();
  for (let off = 0; off < ips.length; off += WZ_SCAN_CHUNK) {
    const chunk = ips.slice(off, off + WZ_SCAN_CHUNK);
    // Pass the chunk as an explicit dash-list range: first-last is contiguous by
    // construction from wizardExpandRange, so "first-last" covers exactly it.
    const body = { range: chunk.length === 1 ? chunk[0] : `${chunk[0]}-${chunk[chunk.length - 1]}` };
    if (first) { body.username = first.user; if (first.pass) body.password = first.pass; }
    try {
      const r = await api('/config/discover', { method: 'POST', body: JSON.stringify(body) });
      for (const cam of (r.cameras || [])) {
        respondedThisPass.add(cam.ip);
        sc.noResp.delete(cam.ip);
        const at = wizardResultIndexOf(cam.ip);
        if (at < 0) {
          sc.seenIps.add(cam.ip); sc.results.push(cam);
        } else {
          // Update in place, but never downgrade a usable stream we already have.
          const prev = sc.results[at];
          if (wizardUsableMain(prev.rtsp_main) && !wizardUsableMain(cam.rtsp_main)) {
            cam.rtsp_main = prev.rtsp_main; if (!cam.rtsp_sub && prev.rtsp_sub) cam.rtsp_sub = prev.rtsp_sub;
          }
          sc.results[at] = cam;
        }
        if (first && cam.is_onvif && wizardUsableMain(cam.rtsp_main) && !sc.credOf[cam.ip]) { sc.credOf[cam.ip] = first; sc.lastWinner = first; }
      }
    } catch (e) {
      sc.error = (e && e.message) ? e.message : String(e);
      sc.scanning = false; wizardScanRefresh(); return;
    }
    sc.scanned = Math.min(sc.total, off + chunk.length);
    wizardScanRefresh();
  }
  // Flag previously-seen cameras that didn't answer this pass (kept, muted).
  // Only mark ones whose IP fell within the range we actually swept.
  const sweptSet = new Set(ips);
  for (const c of sc.results) {
    if (!respondedThisPass.has(c.ip) && sweptSet.has(c.ip)) sc.noResp.add(c.ip);
  }
  // Phase 2 (commercial-VMS-style): cameras still without a usable stream URL get the
  // REMAINING credential sets tried one at a time, stopping at first success.
  await wizardResolveWithCredList(creds.slice(1));
  sc.scanning = false; sc.done = true;
  // First scan defaults to selecting all ready rows (unchanged happy path); a
  // re-scan preserves the operator's existing selection.
  if (firstEver) wizardSelectAllReady();
  wizardScanRefresh();
}

/* Try each credential set against each unresolved ONVIF camera (single-IP
   re-scans; the endpoint only sends creds to hosts that answered the ONVIF
   probe). Sequential per camera, stop at the first set that works, so a camera
   sees at most N auth attempts (N = list size; stays well under brand lockout
   thresholds). Up to 3 cameras resolve in parallel. */
async function wizardResolveWithCredList(sets) {
  const sc = WZ.scan;
  if (!sets.length) return;
  const pending = sc.results
    .map((c, i) => ({ c, i }))
    .filter(({ c }) => c.is_onvif && !wizardUsableMain(c.rtsp_main) && !wizardAlreadyAdded(c.ip) && !(sc.noResp && sc.noResp.has(c.ip)));
  if (!pending.length) return;
  sc.resolving = pending.length; wizardScanRefresh();
  const one = async ({ c, i }) => {
    // Winner-first: try the most-recently-successful set before the rest, so a
    // re-scan resolves siblings sharing that login in a single attempt. Skip any
    // (ip,cred) already known to bounce this session, the main thing that hammers
    // slow / lockout-prone cameras on repeated scans.
    const ordered = wizardCredOrder(sets);
    let firstAttempt = true;
    for (const cr of ordered) {
      if (wizardCredFailed(c.ip, cr)) continue;
      // Gentle pacing: space successive auth attempts against the SAME ip.
      if (!firstAttempt) await wzSleep(WZ_AUTH_SPACING_MS);
      firstAttempt = false;
      try {
        const body = { range: c.ip, username: cr.user, timeout_ms: 8000 };
        if (cr.pass) body.password = cr.pass;
        const r = await api('/config/discover', { method: 'POST', body: JSON.stringify(body) });
        const got = (r.cameras || []).find(x => x.ip === c.ip);
        if (got && wizardUsableMain(got.rtsp_main)) {
          const at = wizardResultIndexOf(c.ip); if (at >= 0) i = at;
          WZ.scan.results[i] = got;
          sc.credOf[c.ip] = cr; sc.lastWinner = cr;
          const rr = wizardEnsureRow(i, got);
          rr.main = got.rtsp_main; if (got.rtsp_sub) rr.sub = got.rtsp_sub;
          rr.onvif_user = cr.user; rr.onvif_password = cr.pass || null;
          break;
        }
        // Answered but didn't resolve a stream → this (ip,cred) is bad; remember it.
        wizardMarkCredFail(c.ip, cr);
      } catch { /* transient, do NOT memo (network blip, not a bad login) */ }
    }
    sc.resolving--; wizardScanRefresh();
  };
  // Small parallelism across cameras; strictly sequential sets per camera.
  const queue = pending.slice();
  const workers = Array.from({ length: Math.min(3, queue.length) }, async () => {
    while (queue.length) await one(queue.shift());
  });
  await Promise.all(workers);
  sc.resolving = 0;
}

/* Per-row Rescan (the disappearing-camera fix): re-probe just this IP with the
   larger timeout_ms so a slow camera that dropped out gets a patient retry. Uses
   whichever cred set previously resolved it (or the first cred set). Clears the
   "no response this pass" flag on success. */
async function wizardRescanRow(i) {
  const sc = WZ.scan;
  const c = sc.results[i]; if (!c || sc.rescanning) return;
  sc.rescanning = c.ip; wizardScanRefresh();
  const cr = sc.credOf[c.ip] || (wizardCredsClean()[0] || null);
  const body = { range: c.ip, timeout_ms: 8000 };
  if (cr && cr.user && !wizardCredFailed(c.ip, cr)) { body.username = cr.user; if (cr.pass) body.password = cr.pass; }
  try {
    const r = await api('/config/discover', { method: 'POST', body: JSON.stringify(body) });
    const got = (r.cameras || []).find(x => x.ip === c.ip);
    if (got) {
      sc.noResp && sc.noResp.delete(c.ip);
      const prev = sc.results[i];
      if (wizardUsableMain(prev.rtsp_main) && !wizardUsableMain(got.rtsp_main)) {
        got.rtsp_main = prev.rtsp_main; if (!got.rtsp_sub && prev.rtsp_sub) got.rtsp_sub = prev.rtsp_sub;
      }
      sc.results[i] = got;
      if (cr && got.is_onvif && wizardUsableMain(got.rtsp_main) && !sc.credOf[c.ip]) { sc.credOf[c.ip] = cr; sc.lastWinner = cr; }
      if (WZ.rows[i] && wizardUsableMain(got.rtsp_main)) { WZ.rows[i].main = got.rtsp_main; if (got.rtsp_sub) WZ.rows[i].sub = got.rtsp_sub; }
      toast(wizardUsableMain(got.rtsp_main) ? 'Camera answered, stream ready.' : 'Camera answered (still needs credentials).', 'ok');
    } else {
      toast('Still no response, the camera may be busy. Try again in a moment.', 'warn');
    }
  } catch (e) {
    toast('Rescan failed: ' + (e && e.message ? e.message : e), 'err');
  }
  sc.rescanning = null; wizardScanRefresh();
}
function wizardIpKey(ip) { const p = (ip || '').split('.').map(Number); return ((p[0]||0)<<24>>>0) + ((p[1]||0)<<16) + ((p[2]||0)<<8) + (p[3]||0); }

/* Per-device credentials (§3.2): an inline user/pass entry that re-reads just
   this IP's stream URLs, then stores the working creds on the row so the
   committed camera (and its ONVIF PTZ/redetect) uses them. */
function wizardToggleCreds(i) {
  WZ.scan.credsOpen = WZ.scan.credsOpen || {};
  WZ.scan.credsOpen[i] = !WZ.scan.credsOpen[i];
  wizardScanRefresh();
}
async function wizardApplyCreds(i) {
  const c = WZ.scan.results[i]; if (!c) return;
  const user = (($('wz-cred-user-' + i) || {}).value || '').trim();
  const pass = ($('wz-cred-pass-' + i) || {}).value || '';
  if (!user) { toast('Enter a username.', 'warn'); return; }
  const cr = { user, pass };
  // Patient single-IP probe (larger timeout so a slow camera isn't dropped).
  const body = { range: c.ip, username: user, timeout_ms: 8000 };
  if (pass) body.password = pass;
  try {
    const r = await api('/config/discover', { method: 'POST', body: JSON.stringify(body) });
    const got = (r.cameras || []).find(x => x.ip === c.ip);
    if (got && wizardUsableMain(got.rtsp_main)) {
      WZ.scan.results[i] = got;
      WZ.scan.credOf = WZ.scan.credOf || {}; WZ.scan.credOf[c.ip] = cr; WZ.scan.lastWinner = cr;
      if (WZ.scan.noResp) WZ.scan.noResp.delete(c.ip);
      const rr = wizardEnsureRow(i, got);
      rr.main = got.rtsp_main; if (got.rtsp_sub) rr.sub = got.rtsp_sub;
      rr.onvif_user = user; rr.onvif_password = pass || null;
      rr.sel = true;
      WZ.scan.credsOpen[i] = false;
      // Remember the set for this session so sibling cameras with the same login
      // resolve on the next scan (or via the cred list) without retyping.
      wizardCredRemember(user, pass);
      toast('Credentials worked, stream URLs updated.', 'ok');
    } else {
      // Answered but no stream → memo this (ip,cred) so re-scans skip it.
      wizardMarkCredFail(c.ip, cr);
      toast("Those credentials didn't resolve a stream, check them, or add the URL manually.", 'warn');
    }
  } catch (e) { toast('Retry failed: ' + (e && e.message ? e.message : e), 'err'); }
  wizardScanRefresh();
}

/* ── Row selection helpers (shared find ⇄ select state) ── */
function wizardDefaultName(c) {
  const base = c.model || ('Camera ' + c.ip);
  // De-dup against names already chosen for OTHER selected rows.
  const taken = new Set();
  for (const k in WZ.rows) { const rr = WZ.rows[k]; if (rr && rr.sel && rr._ip !== c.ip && rr.name) taken.add(rr.name.toLowerCase()); }
  if (!taken.has(base.toLowerCase())) return base;
  for (let n = 2; n < 100; n++) { const cand = `${base} ${n}`; if (!taken.has(cand.toLowerCase())) return cand; }
  return base;
}
function wizardEnsureRow(i, c) {
  c = c || WZ.scan.results[i];
  if (!WZ.rows[i]) {
    // Store the credential set that actually RESOLVED this device (tracked in
    // scan.credOf), not blindly the shared set, which may be wrong for it.
    const cred = (WZ.scan.credOf && WZ.scan.credOf[c.ip]) || null;
    WZ.rows[i] = { sel: false, _ip: c.ip, name: '', main: c.rtsp_main || '', sub: c.rtsp_sub || '',
      onvif_host: c.is_onvif ? c.ip : null, onvif_port: null,
      onvif_user: cred ? cred.user : null, onvif_password: cred ? (cred.pass || null) : null,
      is_onvif: !!c.is_onvif, verify: null };
  }
  const rr = WZ.rows[i];
  if (!rr.name) rr.name = wizardDefaultName(c);
  if (!rr.main && c.rtsp_main) rr.main = c.rtsp_main;
  if (!rr.sub && c.rtsp_sub) rr.sub = c.rtsp_sub;
  return rr;
}
function wizardToggleRow(i, on) {
  const c = WZ.scan.results[i]; if (!c) return;
  const rr = wizardEnsureRow(i, c);
  rr.sel = !!on;
}
function wizardSelectAllReady() {
  WZ.scan.results.forEach((c, i) => { if (!wizardAlreadyAdded(c.ip) && wizardUsableMain(c.rtsp_main)) { wizardEnsureRow(i, c).sel = true; } });
  wizardScanRefresh();
}
function wizardSelectAll() {
  WZ.scan.results.forEach((c, i) => { if (!wizardAlreadyAdded(c.ip)) { wizardEnsureRow(i, c).sel = true; } });
  wizardScanRefresh();
}
function wizardSelectNone() {
  for (const k in WZ.rows) if (WZ.rows[k]) WZ.rows[k].sel = false;
  wizardScanRefresh();
}
/* Indices of currently-selected rows, in IP order. */
function wizardSelectedIdx() {
  return Object.keys(WZ.rows).map(Number).filter(i => WZ.rows[i] && WZ.rows[i].sel)
    .sort((a, b) => wizardIpKey((WZ.scan.results[a]||{}).ip) - wizardIpKey((WZ.scan.results[b]||{}).ip));
}

/* Verify-badge + thumbnail markup, shared by the full-body render and the
   in-place per-row updater (wizardRowPaint) so both produce identical HTML. */
function wizardVBadgeHtml(v) {
  return !v ? '<span style="font-size:11px;color:var(--dim2)">not verified yet</span>' :
    v.state === 'ok' ? `<span style="font-size:11px;color:var(--ok);font-weight:600">✓ ${esc(v.stats || 'stream ok')}</span>` :
    v.state === 'err' ? `<span style="font-size:11px;color:var(--danger);font-weight:600">✗ ${esc(v.error || 'probe failed')}</span>` :
    `<span style="font-size:11px;color:var(--dim)">verifying…</span>`;
}
function wizardVThumbHtml(v) {
  return (v && v.thumb)
    ? `<img src="${v.thumb}" alt="preview" style="width:128px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--border)" />`
    : `<div style="width:128px;height:72px;border-radius:6px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--dim2);text-align:center;padding:4px">preview appears after Verify</div>`;
}
/* Update only row i's badge + thumbnail in place (both hosts share the same ids).
   Concurrency-safe: touches nothing else, so overlapping verify/thumb workers
   can't clobber each other's whole-body snapshot. Falls back to a full-body
   refresh only if the row node isn't present (e.g. list changed under us). */
function wizardRowPaint(i) {
  if (wizardStepKey() !== 'cam-select') return;
  const rr = WZ.rows[i];
  const badge = document.getElementById('wz-vbadge-' + i);
  const thumb = document.getElementById('wz-vthumb-' + i);
  if (!badge || !thumb) { wizardScanRefresh2(); return; }
  badge.innerHTML = wizardVBadgeHtml(rr && rr.verify);
  thumb.innerHTML = wizardVThumbHtml(rr && rr.verify);
}

/* ── Select & configure step (§3.3) ── */
function wizardSelectBody() {
  const idxs = wizardSelectedIdx();
  const manual = (WZ.manualRows || []);
  if (!idxs.length && !manual.length) {
    return `<div class="login-sub">Nothing selected yet. Go <b>Back</b> to pick cameras from the scan, or add one by hand below.</div>
      ${wizardManualAddBlock()}`;
  }
  const fieldLbl = (t) => `<div style="font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--dim2);margin:0 0 2px 1px">${t}</div>`;
  const rows = idxs.map(i => {
    const c = WZ.scan.results[i]; const rr = WZ.rows[i];
    return `<div id="wz-vrow-${i}" style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
        <span class="mono" style="font-size:11px;color:var(--dim)">${esc(c.ip)}</span>
        ${rr.is_onvif ? wizardPill('ONVIF', true) : ''}
        <div id="wz-vbadge-${i}" style="min-width:0;flex:1">${wizardVBadgeHtml(rr.verify)}</div>
        <button class="sm ghost" onclick="wizardVerifyRow(${i})">Verify</button>
      </div>
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div id="wz-vthumb-${i}" style="flex:0 0 auto">${wizardVThumbHtml(rr.verify)}</div>
        <div style="flex:1;min-width:0">
          ${fieldLbl('Name')}
          <input value="${esc(rr.name)}" placeholder="Camera name" oninput="WZ.rows[${i}].name=this.value" style="width:100%;margin-bottom:6px" />
          ${fieldLbl('Main stream (records at full quality)')}
          <input class="mono" value="${esc(rr.main)}" placeholder="rtsp://user:pass@host:554/main" oninput="WZ.rows[${i}].main=this.value" style="width:100%;font-size:11px;margin-bottom:6px" />
          ${fieldLbl('Sub stream (low-res, for the live wall, optional)')}
          <input class="mono" value="${esc(rr.sub || '')}" placeholder="sub-stream URL (optional)" oninput="WZ.rows[${i}].sub=this.value" style="width:100%;font-size:11px" />
        </div>
      </div>
    </div>`;
  }).join('');
  const manualHtml = manual.map((m, k) => wizardManualRowHtml(m, k, fieldLbl)).join('');
  return `
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap">
      <button class="sm primary" onclick="wizardVerifyAll()">Verify all selected</button>
      <span style="font-size:12px;color:var(--dim)">${idxs.length + manual.length} camera${(idxs.length + manual.length) !== 1 ? 's' : ''} ready to add</span>
    </div>
    ${rows}${manualHtml}
    ${wizardManualAddBlock()}`;
}

/* ── Unified SMART manual entry ──────────────────────────────────────────────
   One manual path for BOTH hosts, reachable from the Find step ("Add by address
   instead of scanning") and the Choose step. Enter an IP + optional creds + pick
   a brand, press Discover → POST /config/discover/probe tries ONVIF then the
   brand's RTSP path patterns and validates with ffprobe, filling name/main/sub
   and storing creds on the row (so PTZ/redetect work). On failure it shows the
   `tried[]` list so the user can see what was attempted and fix a URL by hand.
   Manual rows commit through the SAME wizardCommitItems/wizardCreateCamera path.
   Degrades gracefully: if the probe endpoint 404s (WZ.probeOk === false) the
   Discover button hides and the plain name/main/sub fields remain. */
function wizardManualRowHtml(m, k, fieldLbl) {
  fieldLbl = fieldLbl || ((t) => `<div style="font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--dim2);margin:0 0 2px 1px">${t}</div>`);
  const st = m.probeState;               // undefined | 'run' | 'ok' | 'err'
  const showDiscover = WZ.probeOk !== false;
  const badge = st === 'run' ? '<span style="font-size:11px;color:var(--dim)">discovering…</span>'
    : st === 'ok' ? '<span style="font-size:11px;color:var(--ok);font-weight:600">✓ stream found</span>'
    : st === 'err' ? `<span style="font-size:11px;color:var(--danger);font-weight:600">✗ ${esc(m.probeError || 'nothing found')}</span>`
    : '';
  // "tried these paths" readout, shown after a probe returns (success or fail).
  const tried = Array.isArray(m.tried) && m.tried.length ? `
    <details style="margin:6px 0 2px" ${st === 'err' ? 'open' : ''}>
      <summary style="cursor:pointer;font-size:11px;color:var(--dim)">Tried these paths (${m.tried.length})</summary>
      <div style="margin-top:4px;display:flex;flex-direction:column;gap:2px">
        ${m.tried.map(t => `<div class="mono" style="font-size:10px;color:${t.ok ? 'var(--ok)' : 'var(--dim2)'}">${t.ok ? '✓' : '✗'} ${esc(t.url || '')}${t.error ? ' <span style="color:var(--danger)">· ' + esc(t.error) + '</span>' : ''}</div>`).join('')}
      </div>
    </details>` : '';
  const discoverRow = `
    <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px;margin-bottom:6px">
      <div>${fieldLbl('Camera IP / host')}<input value="${esc(m.ip || '')}" placeholder="192.168.1.50" class="mono" oninput="WZ.manualRows[${k}].ip=this.value" style="width:100%;font-size:12px" /></div>
      <div>${fieldLbl('Username (optional)')}<input value="${esc(m.user || '')}" placeholder="admin" autocomplete="off" oninput="WZ.manualRows[${k}].user=this.value" style="width:100%" /></div>
      <div>${fieldLbl('Password (optional)')}<input type="password" value="${esc(m.pass || '')}" autocomplete="new-password" oninput="WZ.manualRows[${k}].pass=this.value" style="width:100%" /></div>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px">
      <div>${fieldLbl('Brand')}<select oninput="WZ.manualRows[${k}].brand=this.value" onchange="WZ.manualRows[${k}].brand=this.value" style="min-width:150px">${wizardBrandOptions(m.brand)}</select></div>
      ${showDiscover ? `<button class="sm primary" onclick="wizardManualDiscover(${k})" ${st === 'run' ? 'disabled' : ''}>${st === 'run' ? 'Discovering…' : 'Discover the stream'}</button>` : ''}
      <div style="flex:1;min-width:0;padding-bottom:6px">${badge}</div>
    </div>
    ${tried}`;
  return `
    <div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <span style="font-size:11px;color:var(--dim)">Manual entry</span>
        <div style="flex:1"></div>
        <button class="sm ghost" onclick="wizardManualRemove(${k})">Remove</button>
      </div>
      ${discoverRow}
      ${fieldLbl('Name')}
      <input value="${esc(m.name || '')}" placeholder="Camera name" oninput="WZ.manualRows[${k}].name=this.value" style="width:100%;margin-bottom:6px" />
      ${fieldLbl('Main stream (records at full quality)')}
      <input class="mono" value="${esc(m.main || '')}" placeholder="rtsp://user:pass@host:554/main" oninput="WZ.manualRows[${k}].main=this.value" style="width:100%;font-size:11px;margin-bottom:6px" />
      ${fieldLbl('Sub stream (low-res, for the live wall, optional)')}
      <input class="mono" value="${esc(m.sub || '')}" placeholder="sub-stream URL (optional)" oninput="WZ.manualRows[${k}].sub=this.value" style="width:100%;font-size:11px" />
    </div>`;
}

function wizardManualAddBlock() {
  const hint = (WZ && wizardStepKey() === 'cam-find')
    ? 'Add by address instead of scanning, enter an IP, pick the brand, and Discover finds the stream.'
    : 'Camera the scan missed? Enter its IP, pick the brand, and Discover finds the stream.';
  return `<div style="margin-top:6px">
    <button class="sm ghost" onclick="wizardManualAdd()">＋ Add a camera by address</button>
    <span class="login-sub" style="margin-left:8px">${hint}</span>
  </div>`;
}
function wizardManualAdd() {
  WZ.manualRows = WZ.manualRows || [];
  // Seed creds from the shared scan cred list so the common case needs no retyping.
  const c0 = wizardCredsClean()[0] || {};
  WZ.manualRows.push({ name: '', main: '', sub: '', ip: '', user: c0.user || '', pass: c0.pass || '', brand: '' });
  wizardManualEnsureVisible();
  wizardHostRender();
}
function wizardManualRemove(k) { if (WZ.manualRows) { WZ.manualRows.splice(k, 1); wizardHostRender(); } }

/* The manual block lives inside the cam-select step's body. If the operator hits
   "Add by address" from the Find step, hop them to the Choose step so the new row
   is visible (its host-specific step pointer). Wizard uses WZ.i; console uses
   WZ.consoleStep. Only moves forward from cam-find; never disturbs cam-select. */
function wizardManualEnsureVisible() {
  if (wizardStepKey() !== 'cam-find') return;
  if (wizardHostConsole()) { WZ.consoleStep = 'cam-select'; }
  else { const idx = WZ.steps.findIndex(s => s.key === 'cam-select'); if (idx > 0) WZ.i = idx; }
}

/* Smart discover for a manual row: POST /config/discover/probe. On ok, fill
   name/main/sub and stash creds on the row for commit; on failure keep the tried[]
   list visible so the user can edit a URL by hand. 404 → feature-flag off (hide
   the button on the next render) and tell the user to fill the URL in manually. */
async function wizardManualDiscover(k) {
  const m = (WZ.manualRows || [])[k]; if (!m) return;
  const ip = (m.ip || '').trim();
  if (!ip) { toast('Enter the camera IP first.', 'warn'); return; }
  m.probeState = 'run'; m.probeError = ''; wizardManualRefresh();
  const payload = { ip };
  if ((m.user || '').trim()) payload.username = m.user.trim();
  if (m.pass) payload.password = m.pass;
  if ((m.brand || '').trim()) payload.brand = m.brand.trim();
  try {
    const res = await fetch('/config/discover/probe', { method: 'POST', headers: { 'Content-Type': 'application/json', ...(TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {}) }, body: JSON.stringify(payload) });
    if (res.status === 404) {
      WZ.probeOk = false;                 // endpoint absent → hide Discover henceforth
      m.probeState = undefined;
      toast('Auto-discover isn\'t available on this server, enter the stream URL by hand.', 'warn');
      wizardManualRefresh(); return;
    }
    WZ.probeOk = true;
    let r = {}; try { r = await res.json(); } catch (_) {}
    if (!res.ok) { m.probeState = 'err'; m.probeError = r.message || r.error || res.statusText || 'probe failed'; m.tried = Array.isArray(r.tried) ? r.tried : m.tried; wizardManualRefresh(); return; }
    m.tried = Array.isArray(r.tried) ? r.tried : [];
    if (r.ok && wizardUsableMain(r.rtsp_main)) {
      m.main = r.rtsp_main;
      m.sub = r.rtsp_sub || m.sub || '';
      if (!(m.name || '').trim()) m.name = r.model || ('Camera ' + ip);
      // Store creds so the committed camera (PTZ/redetect) uses them.
      m.onvif_host = r.is_onvif ? ip : (m.onvif_host || null);
      m.onvif_user = (m.user || '').trim() || null;
      m.onvif_password = m.pass || null;
      m.probeState = 'ok'; m.probeError = '';
      if ((m.user || '').trim()) wizardCredRemember(m.user.trim(), m.pass || '');
      toast('Stream found, review the name and URLs, then add.', 'ok');
    } else {
      m.probeState = 'err';
      m.probeError = r.note || 'No stream found, try a brand, or type the URL by hand.';
    }
  } catch (e) {
    m.probeState = 'err'; m.probeError = (e && e.message) ? e.message : 'probe failed';
  }
  wizardManualRefresh();
}
/* Re-render the manual block in place (both hosts render cam-select body). */
function wizardManualRefresh() { if (wizardStepKey() === 'cam-select') wizardBodySet(wizardSelectBody()); else wizardHostRender(); }

/* Fetch a one-frame snapshot for a row (kept on rr.verify.thumb). Shared by
   Verify and the auto-preview pass; best-effort, never throws. */
async function wizardFetchThumb(rr) {
  // Client-side timeout: one unresponsive camera must not wedge a verify/thumb
  // worker forever waiting on the test-frame fetch.
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 15000);
  try {
    const res = await fetch('/config/test-frame', { method: 'POST', headers: { 'Content-Type': 'application/json', ...(TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {}) }, body: JSON.stringify({ url: rr.main }), signal: ctrl.signal });
    if (res.ok) {
      const blob = await res.blob();
      // Only ADD the thumb; never reset/downgrade an existing verify object (an
      // overlapping verify pass may have already set state 'ok'/'err'). Object
      // identity is preserved, so a late verify write still lands on this row.
      rr.verify = rr.verify || {};
      rr.verify.thumb = URL.createObjectURL(blob);
    }
  } catch (_) { /* thumbnail optional (also swallows the abort on timeout) */ }
  finally { clearTimeout(timer); }
}

/* Auto-preview on entering the select step: fetch a snapshot for every selected
   row that lacks one, 2 at a time (cameras drop RTSP past a few sessions), so
   the user can SEE which camera is which without pressing Verify. Stats stay
   on-demand via Verify. */
async function wizardAutoThumbs() {
  const idxs = wizardSelectedIdx().filter(i => {
    const rr = WZ.rows[i];
    // Skip rows the user is actively verifying or that already reached a terminal
    // state, auto-thumbs must never fight or downgrade a verify-all pass.
    return rr && wizardUsableMain(rr.main)
      && !(rr.verify && (rr.verify.thumb || rr.verify.state === 'run' || rr.verify.state === 'ok' || rr.verify.state === 'err'));
  });
  if (!idxs.length) return;
  let cursor = 0;
  const worker = async () => {
    while (cursor < idxs.length) {
      const i = idxs[cursor++]; const rr = WZ.rows[i];
      // Re-check just before fetching: a verify-all click may have started on
      // this row while we were awaiting an earlier one.
      if (rr.verify && (rr.verify.state === 'run' || rr.verify.state === 'ok' || rr.verify.state === 'err')) continue;
      await wizardFetchThumb(rr);
      wizardRowPaint(i);
    }
  };
  await Promise.all(Array.from({ length: Math.min(2, idxs.length) }, worker));
}

/* Per-row verify: test-frame (thumbnail) + test-stream (res/codec/fps). Failed
   probes get a red badge but stay addable (camera may be busy). */
async function wizardVerifyRow(i) {
  const rr = WZ.rows[i]; if (!rr || !rr.main) { if (rr) { rr.verify = { state: 'err', error: 'no URL' }; wizardRowPaint(i); } return; }
  const keptThumb = rr.verify && rr.verify.thumb;
  rr.verify = { state: 'run', thumb: keptThumb }; wizardRowPaint(i);
  // Snapshot first (strongest "is this the right view" signal), then stats.
  await wizardFetchThumb(rr);
  wizardRowPaint(i);
  try {
    const st = await api('/config/test-stream', { method: 'POST', body: JSON.stringify({ url: rr.main }) });
    if (st.ok) {
      const parts = [];
      if (st.width && st.height) parts.push(`${st.width}×${st.height}`);
      if (st.codec) parts.push(st.codec);
      if (st.fps) parts.push(`${st.fps.toFixed(0)} fps`);
      rr.verify = Object.assign(rr.verify || {}, { state: 'ok', stats: parts.join(' · ') || 'stream ok' });
    } else {
      rr.verify = Object.assign(rr.verify || {}, { state: 'err', error: st.error || 'probe failed' });
    }
  } catch (e) {
    rr.verify = Object.assign(rr.verify || {}, { state: 'err', error: (e && e.message) ? e.message : 'probe failed' });
  }
  wizardRowPaint(i);
}
/* Re-render just the cam-select body (verify updates) without losing typed input:
   only the badges/thumbs change, and inputs re-render from WZ state which we keep
   in sync via oninput, so a full body rebuild is safe here. */
function wizardScanRefresh2() { if (wizardStepKey() === 'cam-select') wizardBodySet(wizardSelectBody()); }

/* "Verify all selected", throttled to ~3 concurrent (cameras drop RTSP past a
   few sessions). */
async function wizardVerifyAll() {
  const idxs = wizardSelectedIdx().filter(i => WZ.rows[i] && WZ.rows[i].main);
  const LIMIT = 3; let cursor = 0;
  async function worker() { while (cursor < idxs.length) { const i = idxs[cursor++]; await wizardVerifyRow(i); } }
  await Promise.all(Array.from({ length: Math.min(LIMIT, idxs.length) }, worker));
  // Authoritative final paint: every row's terminal state is now in WZ.rows, so a
  // single full-body rebuild can't reflect a mid-flight snapshot. This is what
  // guarantees the green ✓ lands even if an in-place paint was missed.
  wizardScanRefresh2();
}

/* ── Review & add step (§3.5) ── */
function wizardCommitBody() {
  const items = wizardCommitItems();
  if (!items.length) return '<div class="login-sub">No cameras selected. Go Back to pick some, or Skip to finish without adding any.</div>';
  // Recording-target copy (§3.4).
  const dp = WZ.defaultPolicy || {};
  const stName = (WZ.defaultStorage && (WZ.defaultStorage.name || WZ.defaultStorage.path)) || 'the default disk';
  const days = dp.live_retention_hours ? Math.round(dp.live_retention_hours / 24) : null;
  const capGb = dp.live_max_bytes ? Math.round(dp.live_max_bytes / 1e9) : null;
  const targetLine = `Ungrouped cameras record continuously to <b>${esc(stName)}</b>${days ? `, keeping ${days} day${days !== 1 ? 's' : ''}` : ''}${capGb ? ` / ${capGb} GB` : ''} (the default policy). Grouped cameras follow their group's policy.`;
  const groupCtl = wizardGroupBar();
  const rows = items.map((it, k) => {
    const cr = WZ.commit ? WZ.commit[it.key] : null;
    const res = !cr ? '' :
      cr.state === 'ok' ? '<span style="color:var(--ok);font-weight:600">✓ added</span>' :
      cr.state === 'run' ? '<span style="color:var(--dim)">adding…</span>' :
      `<span style="color:var(--danger);font-weight:600">✗ ${esc(cr.error || 'failed')}</span>`
        + (cr.conflict ? ` <button class="sm ghost" onclick="wizardRetryConflict('${esc(it.key)}')">Retry as “${esc(cr.suggestName || (it.name + ' 2'))}”</button>` : '');
    // Once a row is committed its grouping has been applied, show it read-only.
    const gCell = (cr && cr.state === 'ok')
      ? `<span style="font-size:12px;color:var(--dim)">${esc((WZ.groups || []).find(x => x.id === WZ.groupOf[it.key])?.name || '—')}</span>`
      : wizardGroupSelect(it.key);
    return `<tr>
      <td>${esc(it.name)}</td>
      <td class="mono" style="font-size:12px">${esc(it.ip || '—')}</td>
      <td>${it.main ? '<span style="color:var(--ok);font-size:12px">stream set</span>' : '<span style="color:var(--warn);font-size:12px">no URL</span>'}</td>
      <td>${gCell}</td>
      <td class="td-right">${res}</td>
    </tr>`;
  }).join('');
  return `
    <div class="login-sub" style="margin-top:0;margin-bottom:10px">${targetLine}</div>
    ${groupCtl}
    <div class="table-wrap" style="border-top:1px solid var(--border);margin-top:12px">
      <table>
        <thead><tr><th>Name</th><th style="width:16%">IP</th><th style="width:13%">Stream</th><th style="width:22%">Group</th><th style="width:20%" class="td-right">Result</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="login-sub" style="margin-top:10px">Adding ${items.length} camera${items.length !== 1 ? 's' : ''}. Already-added devices are skipped automatically.</div>`;
}

/* The flat list of cameras to create: selected scan rows + manual rows. Keyed so
   per-row commit results survive re-render. */
function wizardCommitItems() {
  const out = [];
  wizardSelectedIdx().forEach(i => {
    const c = WZ.scan.results[i]; const rr = WZ.rows[i];
    if (!rr) return;
    out.push({ key: 's' + i, name: (rr.name || '').trim() || ('Camera ' + c.ip), ip: c.ip, main: (rr.main || '').trim(), sub: (rr.sub || '').trim(),
      onvif_host: rr.onvif_host, onvif_port: rr.onvif_port, onvif_user: rr.onvif_user, onvif_password: rr.onvif_password,
      ptz: (c.note || '').toLowerCase().includes('ptz') });
  });
  (WZ.manualRows || []).forEach((m, k) => {
    if (!(m.name || '').trim() && !(m.main || '').trim()) return;
    out.push({ key: 'm' + k, name: (m.name || '').trim(), ip: (m.ip || '').trim() || hostOfUrl(m.main), main: (m.main || '').trim(), sub: (m.sub || '').trim(),
      onvif_host: m.onvif_host || null, onvif_port: null, onvif_user: m.onvif_user || null, onvif_password: m.onvif_password || null });
  });
  return out;
}

/* Per-camera group assignment (commercial-VMS-style): each row picks its own group
   in the review table, some cameras can go in a "motion" group, others in an
   "always record" group, in one batch. The bar offers a "set all" convenience
   and inline group creation (created eagerly so it appears in every dropdown). */
function wizardGroupBar() {
  const groups = WZ.groups || [];
  const opts = groups.map(x => `<option value="${esc(x.id)}">${esc(x.name)}</option>`).join('');
  return `<div style="margin-top:4px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:13px;color:var(--dim)">Group <span style="color:var(--dim2)">(optional, a group applies one recording policy, e.g. motion-only vs always-record)</span>:</span>
      <select onchange="wizardGroupSetAll(this.value)">
        <option value="__hdr" selected>set all to…</option>
        <option value="">No group</option>
        ${opts}
      </select>
      <button class="sm ghost" onclick="wizardGroupNewToggle()">${WZ.groupNewOpen ? 'Cancel' : '＋ New group'}</button>
      ${WZ.groupNewOpen ? `<input id="wz-group-new-name" placeholder="Group name (e.g. Motion only)" style="width:190px" onkeydown="if(event.key==='Enter'){event.preventDefault();wizardGroupCreate();}" />
        <button class="sm" onclick="wizardGroupCreate()">Create</button>` : ''}
    </div>
    ${wizardGroupManager(groups)}
    <div class="login-sub" style="margin-top:6px">Pick per camera in the table below, different cameras can go in different groups. Policies are edited later under <b>Recording</b>.</div>
  </div>`;
}

/* Created-groups manager: a compact chip list of the existing groups so the
   operator can SEE what they've made this session, rename a typo, or delete one
   they didn't mean to create, without leaving the review step. Rename uses
   PUT /config/groups/:id; delete uses DELETE /config/groups/:id (both already
   exist). WZ.groupRenaming holds the id currently in inline-edit. */
function wizardGroupManager(groups) {
  groups = groups || [];
  if (!groups.length) return '';
  const chips = groups.map(g => {
    if (WZ.groupRenaming === g.id) {
      return `<span style="display:inline-flex;align-items:center;gap:4px;border:1px solid var(--accent);border-radius:12px;padding:2px 4px 2px 8px;background:var(--panel)">
        <input id="wz-group-rn-${esc(g.id)}" value="${esc(g.name)}" style="font-size:12px;width:130px;border:none;background:transparent;padding:2px"
          onkeydown="if(event.key==='Enter'){event.preventDefault();wizardGroupRenameCommit('${esc(g.id)}');}else if(event.key==='Escape'){event.preventDefault();wizardGroupRenameCancel();}" />
        <button class="sm" onclick="wizardGroupRenameCommit('${esc(g.id)}')" style="padding:1px 7px">Save</button>
        <button class="sm ghost" onclick="wizardGroupRenameCancel()" style="padding:1px 7px">✕</button>
      </span>`;
    }
    const memberCount = ((g.camera_ids || []).length);
    return `<span style="display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:12px;padding:3px 6px 3px 10px;background:var(--panel)">
      <span style="font-size:12px;color:var(--text)">${esc(g.name)}</span>
      ${memberCount ? `<span style="font-size:10px;color:var(--dim2)">${memberCount} cam${memberCount !== 1 ? 's' : ''}</span>` : ''}
      ${WZ.groupRenameOk !== false ? `<button class="sm ghost" title="Rename" onclick="wizardGroupRenameStart('${esc(g.id)}')" style="padding:0 5px;font-size:12px">✎</button>` : ''}
      <button class="sm ghost" title="Delete group" onclick="wizardGroupDelete('${esc(g.id)}')" style="padding:0 6px;font-size:13px;color:var(--danger)">×</button>
    </span>`;
  }).join('');
  return `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px">
    <span style="font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.4px;font-weight:600">Groups</span>
    ${chips}
  </div>`;
}
function wizardGroupSetAll(v) {
  if (v === '__hdr') return;
  for (const it of wizardCommitItems()) WZ.groupOf[it.key] = v;
  if (wizardStepKey() === 'cam-commit') wizardBodySet(wizardCommitBody());
}
function wizardGroupNewToggle() {
  WZ.groupNewOpen = !WZ.groupNewOpen;
  if (wizardStepKey() === 'cam-commit') wizardBodySet(wizardCommitBody());
  const inp = $('wz-group-new-name'); if (inp) inp.focus();
}
async function wizardGroupCreate() {
  const name = (($('wz-group-new-name') || {}).value || '').trim();
  if (!name) { wizardMsg('Enter a group name.'); return; }
  try {
    const created = await api('/config/groups', { method: 'POST', body: JSON.stringify({ name }) });
    WZ.groups = [...(WZ.groups || []), created];
    WZ.groupNewOpen = false;
    if (wizardStepKey() === 'cam-commit') wizardBodySet(wizardCommitBody());
    toast(`Group “${name}” created, assign cameras to it below.`);
  } catch (e) { wizardMsg('Create group failed: ' + (e && e.message ? e.message : e)); }
}

/* Host-correct re-render of the review step (wizardBodySet dispatches to the
   right container, #wizard-body for the wizard, #ca-disc-body for the console). */
function wizardGroupMgrRefresh() {
  if (wizardStepKey() === 'cam-commit') wizardBodySet(wizardCommitBody());
}
function wizardGroupRenameStart(id) {
  WZ.groupRenaming = id;
  wizardGroupMgrRefresh();
  const inp = $('wz-group-rn-' + id); if (inp) { inp.focus(); inp.select(); }
}
function wizardGroupRenameCancel() { WZ.groupRenaming = null; wizardGroupMgrRefresh(); }
async function wizardGroupRenameCommit(id) {
  const inp = $('wz-group-rn-' + id);
  const name = ((inp && inp.value) || '').trim();
  const g = (WZ.groups || []).find(x => x.id === id);
  if (!name) { wizardMsg('Group name can\'t be blank.'); return; }
  if (g && g.name === name) { WZ.groupRenaming = null; wizardGroupMgrRefresh(); return; }
  try {
    const updated = await api('/config/groups/' + id, { method: 'PUT', body: JSON.stringify({ name }) });
    WZ.groups = (WZ.groups || []).map(x => x.id === id ? Object.assign({}, x, updated || { name }) : x);
    WZ.groupRenaming = null;
    wizardGroupMgrRefresh();
    toast(`Group renamed to “${name}”.`);
  } catch (e) {
    // Feature-detect: if PUT-rename isn't available on this server, degrade to
    // delete-only so the manager still works.
    const msg = (e && e.message) ? e.message : String(e);
    if (/404|405|not found|method not allowed/i.test(msg)) {
      WZ.groupRenameOk = false; WZ.groupRenaming = null; wizardGroupMgrRefresh();
      wizardMsg('Renaming groups isn\'t supported on this server, you can still delete and recreate.');
    } else {
      wizardMsg('Rename failed: ' + msg);
    }
  }
}
async function wizardGroupDelete(id) {
  const g = (WZ.groups || []).find(x => x.id === id);
  const memberCount = (g && g.camera_ids || []).length;
  // Guard: a group that already has members needs confirmation; a brand-new empty
  // group deletes freely.
  if (memberCount > 0 && !confirm(`Delete “${(g && g.name) || 'this group'}”? Its ${memberCount} camera${memberCount !== 1 ? 's' : ''} will keep recording but revert to the default policy.`)) return;
  try {
    await api('/config/groups/' + id, { method: 'DELETE' });
    WZ.groups = (WZ.groups || []).filter(x => x.id !== id);
    // Don't strand a WZ.groupOf pointer at the now-deleted group.
    for (const k of Object.keys(WZ.groupOf || {})) { if (WZ.groupOf[k] === id) WZ.groupOf[k] = ''; }
    if (WZ.groupRenaming === id) WZ.groupRenaming = null;
    wizardGroupMgrRefresh();
    toast(`Group “${(g && g.name) || ''}” deleted.`);
  } catch (e) { wizardMsg('Delete group failed: ' + (e && e.message ? e.message : e)); }
}
function wizardGroupSelect(key) {
  const groups = WZ.groups || [];
  const sel = WZ.groupOf[key] || '';
  return `<select onchange="WZ.groupOf['${esc(key)}']=this.value" style="font-size:12px;max-width:170px">
    <option value="">No group</option>
    ${groups.map(x => `<option value="${esc(x.id)}" ${sel === x.id ? 'selected' : ''}>${esc(x.name)}</option>`).join('')}
  </select>`;
}

/* POST one camera. Returns { ok } or { conflict } or { error }. Uses a raw fetch
   so we can distinguish HTTP 409 (name/stream conflict) for the suffix-retry. */
async function wizardCreateCamera(it) {
  const payload = { name: it.name, source_url: it.main, source_sub_url: it.sub || null };
  if (it.onvif_host) { payload.onvif_host = it.onvif_host; if (it.onvif_port) payload.onvif_port = it.onvif_port; if (it.onvif_user) payload.onvif_user = it.onvif_user; if (it.onvif_password) payload.onvif_password = it.onvif_password; }
  if (it.ptz) payload.camera_type = 'ptz';
  const res = await fetch('/config/cameras', { method: 'POST', headers: { 'Content-Type': 'application/json', ...(TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {}) }, body: JSON.stringify(payload) });
  if (res.ok) { let body = null; try { body = await res.json(); } catch (_) {} return { ok: true, id: body && body.id }; }
  let msg = res.statusText; try { const j = await res.json(); msg = j.message || j.error || msg; } catch (_) {}
  if (res.status === 409) return { conflict: true, error: msg };
  return { error: msg };
}

/* Commit (§3.5): sequential POST per selected camera, per-row result rendered in
   place, one failure never aborts the rest; already-committed rows are skipped on
   re-run (idempotent). Then apply group membership once. Returns true (advance)
   only when every item ended OK. */
async function wizardCommit() {
  const items = wizardCommitItems();
  if (!items.length) return true; // nothing to add → acts as Skip
  WZ.commit = WZ.commit || {};
  for (const it of items) {
    const prev = WZ.commit[it.key];
    if (prev && prev.state === 'ok') continue; // idempotent
    WZ.commit[it.key] = { state: 'run' };
    wizardBodySet(wizardCommitBody());
    const r = await wizardCreateCamera(it);
    if (r.ok) { WZ.commit[it.key] = { state: 'ok', id: r.id }; }
    else if (r.conflict) { WZ.commit[it.key] = { state: 'err', error: r.error || 'name already in use', conflict: true, suggestName: it.name + ' 2' }; }
    else { WZ.commit[it.key] = { state: 'err', error: r.error || 'failed' }; }
    wizardBodySet(wizardCommitBody());
  }
  // Apply per-camera group membership for everything that DID get created —
  // even when some rows failed, the successful ones get their grouping.
  try { await wizardApplyGroups(items); }
  catch (e) { wizardMsg('Cameras added, but grouping failed: ' + (e && e.message ? e.message : e)); }
  const failed = items.filter(it => { const c = WZ.commit[it.key]; return !c || c.state !== 'ok'; });
  if (failed.length) {
    // (The console host has no Skip button, same code path, host-fitted copy.)
    wizardMsg(`${items.length - failed.length} of ${items.length} added. Fix the failures below${wizardHostConsole() ? '.' : ' (or Skip to finish).'}`);
    return false; // stay on the review step so the user can retry/skip
  }
  // Refresh existing-camera list so a re-run greys the new ones.
  try { WZ.existing = await api('/config/cameras'); } catch (_) {}
  return true;
}

/* Apply each successfully-created camera's chosen group (§3.4, per-camera):
   bucket new ids by group, then one members-PUT per group (existing ∪ new).
   Rows already grouped on a previous pass are skipped via _grouped. */
async function wizardApplyGroups(items) {
  const byGroup = {};
  for (const it of items) {
    const cr = WZ.commit[it.key];
    const gid = WZ.groupOf[it.key];
    if (!cr || cr.state !== 'ok' || !cr.id || cr._grouped || !gid) continue;
    (byGroup[gid] = byGroup[gid] || []).push(it.key);
  }
  for (const gid of Object.keys(byGroup)) {
    const grp = (WZ.groups || []).find(x => x.id === gid);
    const existingMembers = (grp && grp.camera_ids) || [];
    const ids = byGroup[gid].map(k => WZ.commit[k].id);
    const members = Array.from(new Set([...existingMembers, ...ids]));
    await api('/config/groups/' + gid + '/members', { method: 'PUT', body: JSON.stringify({ camera_ids: members }) });
    if (grp) grp.camera_ids = members; // keep the local copy current for the next bucket/pass
    for (const k of byGroup[gid]) WZ.commit[k]._grouped = true;
  }
}

/* Retry a name-conflicted create under a suffixed name. */
async function wizardRetryConflict(key) {
  const items = wizardCommitItems();
  let it = items.find(x => x.key === key); if (!it) return;
  const cr = WZ.commit[key];
  it = Object.assign({}, it, { name: (cr && cr.suggestName) || (it.name + ' 2') });
  WZ.commit[key] = { state: 'run' };
  wizardBodySet(wizardCommitBody());
  const r = await wizardCreateCamera(it);
  if (r.ok) {
    WZ.commit[key] = { state: 'ok', id: r.id };
    // Apply this camera's chosen group too (self-filters via _grouped).
    try { await wizardApplyGroups(items); } catch (_) { /* surfaced on next commit pass */ }
  }
  else if (r.conflict) WZ.commit[key] = { state: 'err', error: r.error, conflict: true, suggestName: it.name + ' 2' };
  else WZ.commit[key] = { state: 'err', error: r.error || 'failed' };
  wizardBodySet(wizardCommitBody());
}

function wizardMsg(m, ok) { const e = $(wizardHostConsole() ? 'ca-disc-msg' : 'wizard-msg'); if (!e) return; e.style.color = ok ? 'var(--dim)' : 'var(--danger)'; e.textContent = m || ''; }

async function wizardSave(key) {
  if (key === 'terms') {
    const cb = $('wz-terms-agree');
    if (!cb || !cb.checked) { wizardMsg('Please read and accept the tester terms to continue.'); return false; }
    WZ.termsAgreed = true;
    // On a fresh install there's no admin/token yet, so acceptance is recorded at
    // the 'done' step (a token exists by then). When the wizard is re-run on an
    // already-authenticated server (e.g. after a terms-version bump), record now.
    if (TOKEN) await api('/config/beta-terms', { method: 'PUT', body: JSON.stringify({ accept: true }) });
    return true;
  }
  if (key === 'admin') {
    const u = $('wz-user').value.trim(), p = $('wz-pass').value, p2 = $('wz-pass2').value;
    if (!u) { wizardMsg('Username is required.'); return false; }
    if (p.length < 8) { wizardMsg('Password must be at least 8 characters.'); return false; }
    if (p !== p2) { wizardMsg('Passwords do not match.'); return false; }
    const data = await api('/auth/bootstrap', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
    TOKEN = data.token; localStorage.setItem('crumb_admin_token', TOKEN);
    try { WZ.server = await api('/config/server'); } catch { WZ.server = {}; }
    return true;
  }
  if (key === 'server') {
    const addr = $('wz-addr').value.trim(), rtsp = $('wz-rtsp').value.trim();
    // NOTE: do NOT write crumb_api_base here. That field is Crumb's go2rtc REST
    // base (default http://go2rtc:1984), NOT the console address, writing `addr`
    // into it pointed the frame/live/notification proxies at the Crumb API itself
    // and broke them on every wizard-installed system.
    const body = Object.assign(wizardServerBody(), { server_address: addr, crumb_rtsp_base: rtsp });
    await api('/config/server', { method: 'PUT', body: JSON.stringify(body) });
    WZ.server = await api('/config/server');
    return true;
  }
  if (key === 'storage') {
    // Preflight the recording path FIRST: refuse to advance when the disk isn't
    // writable or has no free space, so the wizard can't set up a system that
    // silently records nothing. `warn` (low/unknown free) is shown live but not
    // blocking; only `error` stops here. Degrades to a no-op on an older server.
    const chk = await wizardStorageCheck();
    if (chk && chk.status === 'error') {
      wizardMsg(chk.message || 'This recording folder can\'t be used, pick a writable disk with free space.');
      return false;
    }
    // 1) Storage path (only PUT if changed). 2) Default-policy size cap + retention.
    const pathEl = $('wz-storage-path');
    if (pathEl && WZ._storageId) {
      const st = (WZ.storages || []).find(s => s.id === WZ._storageId) || {};
      const path = pathEl.value.trim();
      if (path && path !== st.path) {
        await api('/config/storages/' + WZ._storageId, { method: 'PUT', body: JSON.stringify({ name: st.name, path, icon: st.icon || null }) });
      }
    }
    const capEl = $('wz-storage-cap'), daysEl = $('wz-storage-days');
    if (capEl || daysEl) {
      const body = {};
      // Point the default policy at this disk so "the default disk" is real (§4.4).
      if (WZ._storageId) body.live_storage_id = WZ._storageId;
      if (capEl) {
        const gb = parseFloat(capEl.value);
        body.live_max_bytes = (capEl.value.trim() === '' || isNaN(gb) || gb <= 0) ? null : Math.round(gb * 1e9);
      }
      if (daysEl) {
        const d = parseInt(daysEl.value, 10);
        if (!isNaN(d) && d > 0) body.live_retention_hours = d * 24;
      }
      await api('/config/policy/default', { method: 'PUT', body: JSON.stringify(body) });
      try { WZ.defaultPolicy = await api('/config/policy/default'); } catch (_) {}
    }
    return true;
  }
  if (key === 'cam-find') {
    // Guard: a typed range that was never scanned means the user almost
    // certainly meant to press Scan, don't silently sail past an empty list.
    // (Skip remains the explicit "no cameras now" path.)
    const range = (WZ.scan.range || '').trim();
    if (range && !WZ.scan.done && !WZ.scan.scanning) {
      // (The console host has no Skip button, same code path, host-fitted copy.)
      wizardMsg('You entered a range but haven\'t scanned it, press Scan' + (wizardHostConsole() ? ' first.' : ' (or Skip to add cameras later).'));
      return false;
    }
    if (WZ.scan.scanning) { wizardMsg('Scan still running, one moment…'); return false; }
    return true;
  }
  if (key === 'cam-select') {
    // Validate each selected/manual row has a name + main URL before review.
    for (const i of wizardSelectedIdx()) {
      const rr = WZ.rows[i];
      if (!(rr.name || '').trim() || !(rr.main || '').trim()) { wizardMsg('Every selected camera needs a name and a main stream URL.'); return false; }
    }
    for (const m of (WZ.manualRows || [])) {
      // A row is "in use" once it has any identifying input. It must end up with
      // both a name and a main URL, press Discover (or type the URL) to fill them.
      const hasAny = (m.name || '').trim() || (m.main || '').trim() || (m.ip || '').trim();
