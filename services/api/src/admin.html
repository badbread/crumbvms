      if (hasAny && (!(m.name || '').trim() || !(m.main || '').trim())) { wizardMsg('Each manually-added camera needs a name and a main stream URL, press Discover to find it, or type the URL (or remove the empty row).'); return false; }
    }
    // Load groups for the recording-target control on the next step.
    if (WZ.groups === null) { try { WZ.groups = await api('/config/groups'); } catch { WZ.groups = []; } }
    return true;
  }
  if (key === 'cam-commit') {
    return await wizardCommit();
  }
  if (key === 'frigate') {
    const go2 = ($('wz-frg-go2rtc').value || '').trim(), http = ($('wz-frg-http').value || '').trim();
    const body = Object.assign(wizardServerBody(), { frigate_go2rtc_api_base: go2, frigate_http_api_base: http, frigate_api_base: go2 });
    await api('/config/server', { method: 'PUT', body: JSON.stringify(body) });
    WZ.server = await api('/config/server');
    return true;
  }
  if (key === 'detect-hw') {
    const pick = WZ.hwPick || (WZ.server || {}).motion_hwaccel || 'auto';
    const dev = $('wz-hw-vaapi-device') ? $('wz-hw-vaapi-device').value.trim() : '';
    // Same rule as the 'server' step: spread wizardServerBody() and override
    // ONLY the fields this step edits, never touch crumb_api_base & friends.
    const body = Object.assign(wizardServerBody(), {
      motion_hwaccel: pick,
      motion_vaapi_device: pick === 'vaapi' ? (dev || '/dev/dri/renderD128') : ((WZ.server || {}).motion_vaapi_device || ''),
    });
    await api('/config/server', { method: 'PUT', body: JSON.stringify(body) });
    WZ.server = await api('/config/server');
    return true;
  }
  if (key === 'notify') {
    // Empty form = nothing to configure (acts like Skip); partial form = error;
    // filled form = create/update the channel via the console's channels API.
    try { await wizardNotifyEnsure(); }
    catch (e) { wizardMsg(e && e.message ? e.message : String(e)); return false; }
    return true;
  }
  if (key === 'users') return true; // users are created inline by their own button
  if (key === 'done') {
    // Record beta-terms acceptance at the last authenticated choke point every
    // completing run passes through (idempotent server-side, the first
    // acceptance timestamp is preserved), then mark setup complete.
    if (WZ.termsAgreed) { try { await api('/config/beta-terms', { method: 'PUT', body: JSON.stringify({ accept: true }) }); } catch (_) {} }
    await api('/config/setup-complete', { method: 'PUT', body: JSON.stringify({ complete: true }) });
    try { sessionStorage.removeItem(WIZARD_STEP_SS_KEY); } catch {}
    enterApp();
    return true;
  }
  return true;
}

async function wizardNext() {
  const step = WZ.steps[WZ.i];
  const btn = $('wizard-next'); btn.disabled = true;
  try {
    const ok = await wizardSave(step.key);
    if (ok === false) { btn.disabled = false; return; }
    if (step.key === 'done') return; // wizardSave already entered the app
    WZ.i++; btn.disabled = false; wizardRender();
  } catch (e) {
    wizardMsg(e && e.message ? e.message : String(e));
    btn.disabled = false;
  }
}
function wizardSkip() {
  const step = WZ.steps[WZ.i];
  if (step.key === 'done' || !step.skippable) return;
  WZ.i++; wizardRender();
}
function wizardBack() {
  if (WZ.i > 0 && WZ.steps[WZ.i - 1].key !== 'admin') { WZ.i--; wizardRender(); }
}
/* Terms step: keep WZ.termsAgreed in sync with the checkbox (so Back/forward
   re-renders it checked) and enable/disable the "I agree and continue" button. */
function wizardTermsToggle() {
  const cb = $('wz-terms-agree');
  WZ.termsAgreed = !!(cb && cb.checked);
  $('wizard-next').disabled = !(cb && cb.checked);
}

/* Re-open the guided setup from Server settings: clear the completed flag, then
   launch the wizard (admin already exists, so it starts at the Server step). */
async function rerunSetup() {
  try { await api('/config/setup-complete', { method: 'PUT', body: JSON.stringify({ complete: false }) }); }
  catch (e) { toast('Could not reopen setup: ' + (e && e.message ? e.message : e)); return; }
  // An explicit re-run starts from the first step, drop any resumed-step state.
  try { sessionStorage.removeItem(WIZARD_STEP_SS_KEY); } catch {}
  let status = {};
  try { status = await fetch('/auth/setup-status').then(r => r.ok ? r.json() : {}); } catch (_) { /* ignore */ }
  openWizard(status);
}

/* Test a CONFIGURED camera's stream from the editor.

   For an EXISTING MANAGED camera (one Crumb restreams), ALWAYS probe the go2rtc
   RESTREAM, never the raw camera source. Probing the raw source opens a SECOND
   concurrent connection to the camera, which Hikvision/Reolink (and ONVIF, which
   ffprobe can't even speak) refuse, that was the "Test does nothing / probe
   broken on driveway/backyard/garage/familyroom" bug. The restream is the exact
   stream `/play/live` and the recorder use, is always `rtsp://`, always reachable,
   and never contends with the camera's connection budget. We resolve it from
   GET /cameras/{id}/streams (canonical, same as /play/live), falling back to the
   camera's stored restream URL if that call fails.

   The direct-probe-of-typed-URL path is reserved for the add-camera "test this
   URL before saving" flow (which calls testStream() directly, not this). */
async function testCameraStream(camId, slot) {
  const c = CAMS.find(x => x.id === camId); if (!c) return;
  const managed = !!c.source_url;
  // Unmanaged/external rows have no Crumb restream; fall back to probing the typed
  // (already-a-restream) URL directly, as before.
  if (!managed) {
    const el = slot === 'sub' ? $('ce-src-sub') : $('ce-src');
    const typed = ((el && el.value) || '').trim();
    if (typed) { testStream(typed, camId); return; }
    toast('No stream URL to test.', 'warn');
    return;
  }
  // Managed camera: resolve the canonical restream URL and probe THAT.
  let restream = slot === 'sub' ? (c.sub_url || null) : (c.main_url || null);
  try {
    const s = await api(`/cameras/${encodeURIComponent(camId)}/streams`);
    if (s) {
      const u = slot === 'sub' ? s.rtsp_sub_url : s.rtsp_main_url;
      if (u) restream = u;
    }
  } catch { /* fall back to the stored restream URL below */ }
  if (restream) { testStream(restream, camId); return; }
  toast(slot === 'sub'
    ? 'This camera has no sub-stream restream to test.'
    : 'No restream available yet, save the camera first, then test.', 'warn');
}

/* ── Stream test (preserved) ── */
let stestActive = false, stestUrl = '', stestObjUrl = null, stestCamId = null;
function testStream(url, camId) {
  url = (url || '').trim();
  if (!url) { toast('Enter a stream URL first.', 'warn'); return; }
  stestUrl = url; stestActive = true; stestCamId = camId || null;
  $('stest-url').textContent = redact(url);
  $('stest-stats').innerHTML = '<div class="stat-chip" style="color:var(--dim)">Probing…</div>';
  setMsg('stest-err', '');
  $('stest-frame').removeAttribute('src');
  // Reset the preview to its visible "connecting" state (never a black void).
  $('stest-frame').style.display = 'none';
  const sw = $('stest-wait'); if (sw) { sw.style.display = ''; sw.textContent = 'Connecting to stream… the first frame can take a few seconds.'; }
  const sn = $('stest-note'); if (sn) { sn.style.display = 'none'; sn.textContent = ''; }
  $('stest-modal').classList.remove('hidden');
  api('/config/test-stream', { method: 'POST', body: JSON.stringify({ url }) })
    .then(r => {
      if (!stestActive) return;
      if (r.ok) {
        const chips = [];
        if (r.width && r.height) chips.push(`<div class="stat-chip"><b>${r.width}×${r.height}</b></div>`);
        if (r.codec) chips.push(`<div class="stat-chip">${esc(r.codec)}</div>`);
        if (r.fps) chips.push(`<div class="stat-chip">${r.fps.toFixed(1)} fps</div>`);
        if (r.bitrate_kbps) chips.push(`<div class="stat-chip">${(r.bitrate_kbps/1000).toFixed(1)} Mbps</div>`);
        if (r.audio_codec) chips.push(`<div class="stat-chip">audio: ${esc(r.audio_codec)}</div>`);
        $('stest-stats').innerHTML = chips.length ? chips.join('') : '<div class="stat-chip" style="color:var(--ok)">Connected</div>';
        // HEVC can't be decoded by the browser <img> pipeline in real time, the
        // server grabs periodic stills instead. Expected; say so quietly.
        if (r.codec && /hevc|h\.?265/i.test(String(r.codec))) {
          const n = $('stest-note');
          if (n) { n.textContent = 'HEVC stream, the preview uses periodic snapshots (that\'s expected).'; n.style.display = ''; }
        }
        if (r.bitrate_kbps && stestCamId) { cacheBitrate(stestCamId, r.bitrate_kbps); renderRetentionHint(); }
        // Feed the probed details into the camera Info tab readout (#75 workaround).
        if (stestCamId) recordProbe(stestCamId, stestUrl, r);
      } else {
        $('stest-stats').innerHTML = '';
        setMsg('stest-err', r.error || 'Could not read the stream.', 'err');
        // Stop promising a frame the probe says isn't coming.
        const w = $('stest-wait'); if (w && w.style.display !== 'none') w.textContent = 'No preview, see the error above.';
      }
    })
    .catch(e => {
      if (stestActive) {
        $('stest-stats').innerHTML = '';
        setMsg('stest-err', e.message, 'err');
        const w = $('stest-wait'); if (w && w.style.display !== 'none') w.textContent = 'No preview, see the error above.';
      }
    });
  stestFrameLoop();
}
async function stestFrameLoop() {
  let fails = 0, gotFrame = false;
  while (stestActive) {
    try {
      const res = await fetch('/config/test-frame', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
        body: JSON.stringify({ url: stestUrl }),
      });
      if (!stestActive) break;
      if (res.ok) {
        const blob = await res.blob();
        if (!stestActive) break;
        if (blob.size > 0) {
          const u = URL.createObjectURL(blob);
          $('stest-frame').src = u;
          // First frame: swap the "connecting…" placeholder for the image.
          $('stest-frame').style.display = 'block';
          const w = $('stest-wait'); if (w) w.style.display = 'none';
          if (stestObjUrl) URL.revokeObjectURL(stestObjUrl);
          stestObjUrl = u;
          gotFrame = true; fails = 0;
          // Clear any earlier "still loading the preview" note once a frame lands.
          if (!$('stest-err').textContent.startsWith('Could')) setMsg('stest-err', '');
        }
      } else {
        // Don't swallow the failure into a black box, surface why after a couple
        // of tries (the probe can succeed while the keyframe grab is still failing).
        fails++;
        if (!gotFrame && fails >= 2) {
          let msg = 'Could not grab a preview frame.';
          try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {}
          setMsg('stest-err', msg, 'err');
          const w = $('stest-wait'); if (w && w.style.display !== 'none') w.textContent = 'No preview frame yet, see the error above. Retrying…';
        }
      }
    } catch (_) { fails++; }
    await new Promise(r => setTimeout(r, 1200));
  }
}
function closeStreamTest() {
  stestActive = false;
  $('stest-modal').classList.add('hidden');
  if (stestObjUrl) { URL.revokeObjectURL(stestObjUrl); stestObjUrl = null; }
}

/* ── Probed camera-info cache (Info tab "Camera info (probed)" readout) ──
   Until the dedicated probe endpoint (#75) lands, we cache the most recent
   Test-stream result per camera+stream-role this session and surface it in the
   Info tab. Keyed by camera id, with main/sub sub-slots. */
const CAM_PROBES = {};
/* How long a probe result (success OR failure) is considered fresh, re-clicking
   a camera within this window reuses the cache instead of re-probing, so browsing
   between cameras never causes a probe storm. */
const PROBE_TTL_MS = 90_000;
/* In-flight probes, keyed `${camId}:${slot}`, so we never double-probe. */
const PROBE_INFLIGHT = new Set();

function cacheProbe(camId, slot, r) {
  CAM_PROBES[camId] = CAM_PROBES[camId] || {};
  CAM_PROBES[camId][slot] = {
    width: r.width, height: r.height, fps: r.fps, codec: r.codec,
    bitrate_kbps: r.bitrate_kbps, _ts: Date.now(),
  };
}
function cacheProbeError(camId, slot, msg) {
  CAM_PROBES[camId] = CAM_PROBES[camId] || {};
  CAM_PROBES[camId][slot] = { _error: msg || 'No response', _ts: Date.now() };
}
/* Fresh if probed (ok or error) within the TTL, gates auto-probing. */
function probeFresh(camId, slot) {
  const d = CAM_PROBES[camId] && CAM_PROBES[camId][slot];
  return !!(d && d._ts && (Date.now() - d._ts) < PROBE_TTL_MS);
}

/* Legacy entry point used by the modal "Test stream" path, caches + refreshes. */
function recordProbe(camId, url, r) {
  const c = CAMS.find(x => x.id === camId);
  const slot = (c && url && (url === (c.source_sub_url || c.sub_url))) ? 'sub' : 'main';
  cacheProbe(camId, slot, r);
  if (selKind === 'camera' && selId === camId && activeCamTab === 'info') renderProbeReadout(camId);
}

/* Headless probe (no modal) of a camera's stream for one slot. De-duped by the
   in-flight set; caches the result (or error) with a timestamp and refreshes the
   readout if the camera is still showing. */
async function probeStreamSilent(camId, slot, url) {
  const key = camId + ':' + slot;
  if (!url || PROBE_INFLIGHT.has(key)) return;
  PROBE_INFLIGHT.add(key);
  if (selKind === 'camera' && selId === camId && activeCamTab === 'info') renderProbeReadout(camId);
  try {
    const r = await api('/config/test-stream', { method: 'POST', body: JSON.stringify({ url }) });
    if (r && r.ok) {
      cacheProbe(camId, slot, r);
      if (r.bitrate_kbps) { cacheBitrate(camId, r.bitrate_kbps); renderRetentionHint(); }
    } else {
      cacheProbeError(camId, slot, (r && r.error) || 'No video stream found');
    }
  } catch (e) {
    cacheProbeError(camId, slot, e.message);
  } finally {
    PROBE_INFLIGHT.delete(key);
    if (selKind === 'camera' && selId === camId && activeCamTab === 'info') renderProbeReadout(camId);
  }
}

/* Auto-probe a camera's main (+ sub) on the Info tab, debounced so clicking
   THROUGH cameras doesn't fire a probe for each one passed, and TTL-gated so a
   recently-probed camera is reused. Probes the go2rtc restream (always rtsp /
   reachable; raw onvif:// sources can't be probed directly). */
let probeDebounce = null;
function autoProbeCamera(c) {
  clearTimeout(probeDebounce);
  const camId = c.id;
  const slots = [['main', c.main_url]];
  if (c.sub_url) slots.push(['sub', c.sub_url]);
  probeDebounce = setTimeout(() => {
    if (!(selKind === 'camera' && selId === camId && activeCamTab === 'info')) return;
    slots.forEach(([slot, url]) => {
      if (url && !probeFresh(camId, slot)) void probeStreamSilent(camId, slot, url);
    });
  }, 450);
}

/* ═══════════════════════════════════════════════════════════════════════════
   UNIT WIDGETS (dur + size, preserved) + human formatters
═══════════════════════════════════════════════════════════════════════════ */
const DUR_UNITS  = [['1','Hours'],['24','Days'],['168','Weeks']];
const SIZE_UNITS = [['1','GB'],['1000','TB']];

function makeDurWidget(id, placeholder) {
  return `<div class="dur-wrap"><input id="${id}" type="number" min="1" placeholder="${placeholder||''}" /><select id="${id}-unit">${DUR_UNITS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select></div>`;
}
function makeSizeWidget(id, placeholder) {
  return `<div class="dur-wrap"><input id="${id}" type="number" min="0" step="0.1" placeholder="${placeholder||'No cap'}" /><select id="${id}-unit">${SIZE_UNITS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select></div>`;
}
function setDur(id, hours) {
  const num = $(id), unit = $(id + '-unit'); if (!num) return;
  if (hours === '' || hours == null) { num.value = ''; if (unit) unit.value = '1'; return; }
  const h = Number(hours);
  let f = 1;
  for (const c of [168, 24, 1]) { if (h !== 0 && h % c === 0) { f = c; break; } }
  num.value = h / f;
  if (unit) unit.value = String(f);
}
function getDur(id) {
  const num = $(id), unit = $(id + '-unit');
  const v = ((num && num.value) || '').trim();
  if (v === '') return '';
  return Number(v) * Number(unit ? unit.value : 1);
}
function setSize(id, bytes) {
  const num = $(id), unit = $(id + '-unit'); if (!num) return;
  if (bytes == null) { num.value = ''; if (unit) unit.value = '1'; return; }
  const gb = bytes / GB;
  let f = 1;
  if (gb >= 1000 && gb % 1000 === 0) f = 1000;
  num.value = gb / f;
  if (unit) unit.value = String(f);
}
function getSize(id) {
  const num = $(id), unit = $(id + '-unit');
  const v = ((num && num.value) || '').trim();
  if (v === '') return null;
  return Math.round(Number(v) * Number(unit ? unit.value : 1) * GB);
}

/* Human-readable duration, replaces all raw hours+'h' display. */
function fmtDur(hours) {
  if (hours == null || hours === '') return 'Forever';
  const h = Number(hours);
  if (!h) return 'Forever';
  if (h % 168 === 0) { const n = h/168; return `${n} week${n !== 1 ? 's' : ''}`; }
  if (h % 24 === 0)  { const n = h/24;  return `${n} day${n !== 1 ? 's' : ''}`; }
  return `${h} hour${h !== 1 ? 's' : ''}`;
}
/* Human-readable byte count (decimal). */
function fmtBytes(b) {
  if (b == null) return '—';
  if (b >= 1e12) return (b/1e12).toFixed(1)+' TB';
  if (b >= 1e9)  return (b/1e9).toFixed(1)+' GB';
  if (b >= 1e6)  return (b/1e6).toFixed(0)+' MB';
  return b+' B';
}

/* ═══════════════════════════════════════════════════════════════════════════
   SCHEDULE ↔ CRON  (cron-free schedule control, all UI-side)
═══════════════════════════════════════════════════════════════════════════ */
const EVERY_N_DIVISORS = [1,2,3,4,6,8,12]; // divisors of 24
const WEEK_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; // index = cron DOW (0=Sun)

/* Generate a 5-field cron string from picker state, or null (no archiving). */
function buildCron(s) {
  if (!s || s.type === 'none') return null;
  if (s.type === 'hourly')  return '0 * * * *';
  if (s.type === 'every-n') return s.n === 1 ? '0 * * * *' : `0 */${s.n} * * *`;
  if (s.type === 'daily')   return `${s.minute} ${s.hour24} * * *`;
  if (s.type === 'weekly') {
    const days = (s.days && s.days.length) ? s.days : [6,0];
    return `${s.minute} ${s.hour24} * * ${days.join(',')}`;
  }
  return null;
}

/* Parse a stored cron string back into friendly picker state.
   Unrecognized → {type:'custom', raw} (preserved, de-emphasized, no data loss). */
function parseCronToFriendly(cron) {
  if (!cron || !String(cron).trim()) return { type: 'none' };
  cron = String(cron).trim();
  if (cron === '0 * * * *') return { type: 'hourly' };
  let m = cron.match(/^0 \*\/(\d+) \* \* \*$/);
  if (m && EVERY_N_DIVISORS.includes(+m[1])) return { type: 'every-n', n: +m[1] };
  m = cron.match(/^(\d{1,2}) (\d{1,2}) \* \* \*$/);
  if (m) { const mn=+m[1], hr=+m[2]; if (mn<60 && hr<24) return { type: 'daily', minute: mn, hour24: hr }; }
  m = cron.match(/^(\d{1,2}) (\d{1,2}) \* \* ([0-7](?:,[0-7])*)$/);
  if (m) {
    const mn=+m[1], hr=+m[2];
    const days = m[3].split(',').map(Number).map(d => d === 7 ? 0 : d);
    const uniq = [...new Set(days)].sort((a,b)=>a-b);
    if (mn<60 && hr<24) return { type: 'weekly', minute: mn, hour24: hr, days: uniq };
  }
  return { type: 'custom', raw: cron };
}

/* Human-readable schedule for table cells / roster cards. */
function fmtSchedule(cron) {
  const s = parseCronToFriendly(cron);
  if (s.type === 'none')   return 'No schedule';
  if (s.type === 'hourly') return 'Every hour';
  if (s.type === 'every-n') return `Every ${s.n} hours`;
  if (s.type === 'daily')  return `Daily at ${fmtClock(s.hour24, s.minute)}`;
  if (s.type === 'weekly') return `Weekly (${s.days.map(d=>WEEK_DAYS[d]).join(', ')}) at ${fmtClock(s.hour24, s.minute)}`;
  return 'Custom';
}
function fmtClock(h24, m) {
  const ap = h24 < 12 ? 'AM' : 'PM';
  const hd = (h24 % 12) || 12;
  return `${hd}:${String(m).padStart(2,'0')} ${ap}`;
}

/* Plain-English schedule summary (for the schedule control preview note). */
function describeSchedule(s) {
  if (s.type === 'none')   return 'No automatic archiving. Footage still moves to archive when the live storage size cap is reached, set a size cap to control this.';
  if (s.type === 'hourly') return 'Archive runs every hour, at the top of the hour, Pacific.';
  if (s.type === 'every-n') {
    if (s.n === 1) return 'Archive runs every hour, at the top of the hour, Pacific.';
    const hrs = []; for (let h = 0; h < 24; h += s.n) hrs.push(fmtClock(h, 0));
    return `Archive runs every ${s.n} hours (${hrs.join(', ')}) Pacific.`;
  }
  if (s.type === 'daily')  return `Archive runs daily at ${fmtClock(s.hour24, s.minute)} Pacific.`;
  if (s.type === 'weekly') {
    const full = s.days.map(d => ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d]);
    return `Archive runs every ${full.join(' and ')} at ${fmtClock(s.hour24, s.minute)} Pacific.`;
  }
  return 'Custom schedule.';
}

/* "Next run" preview computed in America/Los_Angeles wall-clock time. */
function nextRunPreview(s) {
  if (!s || s.type === 'none' || s.type === 'custom') return '';
  // Current Pacific wall-clock components.
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Los_Angeles', hour12: false,
    weekday: 'short', hour: '2-digit', minute: '2-digit'
  }).formatToParts(new Date());
  const get = t => parts.find(p => p.type === t)?.value;
  let H = parseInt(get('hour'), 10); if (H === 24) H = 0;
  const M = parseInt(get('minute'), 10);
  const wdShort = get('weekday');
  const dow = WEEK_DAYS.findIndex(d => d === wdShort);
  const nowMin = H * 60 + M;

  // Build the set of (dayOffset, hour, minute) candidate fire times, find the soonest.
  let fires = []; // {offset, h, m}
  if (s.type === 'hourly' || (s.type === 'every-n' && s.n === 1)) {
    for (let off = 0; off <= 1; off++) for (let h = 0; h < 24; h++) fires.push({ offset: off, h, m: 0 });
  } else if (s.type === 'every-n') {
    for (let off = 0; off <= 1; off++) for (let h = 0; h < 24; h += s.n) fires.push({ offset: off, h, m: 0 });
  } else if (s.type === 'daily') {
    for (let off = 0; off <= 1; off++) fires.push({ offset: off, h: s.hour24, m: s.minute });
  } else if (s.type === 'weekly') {
    for (let off = 0; off <= 7; off++) {
      const d = (dow + off) % 7;
      if (s.days.includes(d)) fires.push({ offset: off, h: s.hour24, m: s.minute });
    }
  }
  // Pick the soonest strictly-after-now fire.
  let best = null;
  for (const f of fires) {
    const total = f.offset * 1440 + f.h * 60 + f.m;
    const delta = total - nowMin;
    if (delta > 0 && (best === null || delta < best.delta)) best = { ...f, delta };
  }
  if (!best) return '';
  let when;
  if (best.offset === 0) when = 'today';
  else if (best.offset === 1) when = 'tomorrow';
  else { const d = (dow + best.offset) % 7; when = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d]; }
  return `Next run: ${when} at ${fmtClock(best.h, best.m)} Pacific.`;
}

/* ── Schedule control: render + wire + read ───────────────────────────────── */
/* pfx namespaces all element ids so multiple controls never collide. */
function renderSchedControl(pfx, cron) {
  const s = parseCronToFriendly(cron);
  const hourOpts = (sel) => Array.from({length:12}, (_,i)=>i+1).map(h=>`<option value="${h}" ${h===sel?'selected':''}>${String(h).padStart(2,'0')}</option>`).join('');
  const minOpts = (sel) => [0,5,10,15,20,25,30,35,40,45,50,55].map(m=>`<option value="${m}" ${m===sel?'selected':''}>${String(m).padStart(2,'0')}</option>`).join('');
  const ampmOpts = (sel) => ['AM','PM'].map(a=>`<option value="${a}" ${a===sel?'selected':''}>${a}</option>`).join('');
  const everyOpts = (sel) => EVERY_N_DIVISORS.map(n=>`<option value="${n}" ${n===sel?'selected':''}>${n}</option>`).join('');

  // Defaults for sub-fields (so a control with no current value still has sane fields).
  const d = (s.type === 'daily') ? s : { hour24: 2, minute: 0 };
  const w = (s.type === 'weekly') ? s : { hour24: 2, minute: 0, days: [6,0] };
  const nval = (s.type === 'every-n') ? s.n : 4;
  const to12 = h24 => ({ h: (h24 % 12) || 12, ap: h24 < 12 ? 'AM' : 'PM' });
  const d12 = to12(d.hour24), w12 = to12(w.hour24);
  const sel = type => s.type === type ? 'checked' : '';

  let customRow = '';
  if (s.type === 'custom') {
    customRow = `
      <div class="sched-option-row">

        <label for="${pfx}-s-custom" style="color:var(--dim2)">Custom (advanced)</label>
        <input id="${pfx}-sched-raw" class="mono" value="${esc(s.raw)}" style="width:auto;font-size:12px;padding:3px 7px" oninput="schedChanged('${pfx}')" />
      </div>`;
  }

  $(pfx + '-sched-control').innerHTML = `
    <div class="sched-radio-group">
      <div class="sched-option-row">
        <input type="radio" name="${pfx}-sched" id="${pfx}-s-hourly" value="hourly" ${sel('hourly')} onchange="schedChanged('${pfx}')" />
        <label for="${pfx}-s-hourly">Every hour</label>
      </div>

      <div>
        <div class="sched-option-row">
          <input type="radio" name="${pfx}-sched" id="${pfx}-s-every-n" value="every-n" ${sel('every-n')} onchange="schedChanged('${pfx}')" />
          <label for="${pfx}-s-every-n">Every</label>
          <select id="${pfx}-sched-n" onchange="schedSetType('${pfx}','every-n')">${everyOpts(nval)}</select>
          <span style="color:var(--dim)">hours</span>
        </div>
        <div class="sched-sub" id="${pfx}-every-help"><span style="font-size:11px;color:var(--dim2)">Only intervals that divide evenly into 24 are listed.</span></div>
      </div>

      <div>
        <div class="sched-option-row">
          <input type="radio" name="${pfx}-sched" id="${pfx}-s-daily" value="daily" ${sel('daily')} onchange="schedChanged('${pfx}')" />
          <label for="${pfx}-s-daily">Daily at</label>
          <select id="${pfx}-daily-h" onchange="schedSetType('${pfx}','daily')">${hourOpts(d12.h)}</select>
          <span style="color:var(--dim)">:</span>
          <select id="${pfx}-daily-m" onchange="schedSetType('${pfx}','daily')">${minOpts(d.minute)}</select>
          <select id="${pfx}-daily-ap" onchange="schedSetType('${pfx}','daily')">${ampmOpts(d12.ap)}</select>
        </div>
      </div>

      <div>
        <div class="sched-option-row">
          <input type="radio" name="${pfx}-sched" id="${pfx}-s-weekly" value="weekly" ${sel('weekly')} onchange="schedChanged('${pfx}')" />
          <label for="${pfx}-s-weekly">Weekly on</label>
        </div>
        <div class="sched-sub" id="${pfx}-weekly-sub" style="flex-direction:column;align-items:flex-start;gap:6px">
          <div class="sched-days">
            ${WEEK_DAYS.map((dn,i)=>`<span class="sched-day-btn ${w.days.includes(i)?'active':''}" data-d="${i}" onclick="schedToggleDay('${pfx}',${i})">${dn}</span>`).join('')}
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;color:var(--dim)">at</span>
            <select id="${pfx}-weekly-h" onchange="schedSetType('${pfx}','weekly')">${hourOpts(w12.h)}</select>
            <span style="color:var(--dim)">:</span>
            <select id="${pfx}-weekly-m" onchange="schedSetType('${pfx}','weekly')">${minOpts(w.minute)}</select>
            <select id="${pfx}-weekly-ap" onchange="schedSetType('${pfx}','weekly')">${ampmOpts(w12.ap)}</select>
          </div>
        </div>

      <div class="sched-option-row">
        <input type="radio" name="${pfx}-sched" id="${pfx}-s-none" value="none" ${sel('none')} onchange="schedChanged('${pfx}')" />

      </div>
      ${customRow}

    <div class="sched-preview" id="${pfx}-sched-preview"></div>
    <div class="sched-tz">Schedules run in America/Los_Angeles time.</div>`;

/* When a day button is clicked: toggle it + activate weekly. */
function schedToggleDay(pfx, i) {
  const el = $(pfx + '-sched-control').querySelector(`.sched-day-btn[data-d="${i}"]`);
  if (el) el.classList.toggle('active');
  schedSetType(pfx, 'weekly');
}
/* Selecting a sub-control implies its parent radio. */
function schedSetType(pfx, type) {
  const r = $(`${pfx}-s-${type === 'every-n' ? 'every-n' : type}`);
  if (r) r.checked = true;
  schedChanged(pfx);
}
/* Re-read the picker, mute inactive sub-fields, refresh preview. */
function schedChanged(pfx) {
  const state = readSchedState(pfx);
  // Mute non-selected sub-rows.
  const muteIf = (id, on) => { const e = $(id); if (e) e.classList.toggle('muted', !on); };
  muteIf(pfx + '-every-help', state.type === 'every-n');
  muteIf(pfx + '-weekly-sub', state.type === 'weekly');
  // Preview.
  const prev = $(pfx + '-sched-preview');
  if (prev) {
    if (state.type === 'custom') {
      prev.innerHTML = `<div class="warn-note">This profile uses a custom schedule that doesn't match a standard option. The raw value is preserved as-is. Pick a standard option above to replace it.</div>`;
    } else if (state.type === 'none') {
      prev.innerHTML = `<div class="info-note">${esc(describeSchedule(state))}</div>`;
    } else {
      const nr = nextRunPreview(state);
      prev.innerHTML = `<div class="info-note">${esc(describeSchedule(state))}${nr ? '<br><strong>' + esc(nr) + '</strong>' : ''}</div>`;
    }
  }
}
/* Read the picker into a state object. */
function readSchedState(pfx) {
  const checked = $(pfx + '-sched-control').querySelector(`input[name="${pfx}-sched"]:checked`);
  const type = checked ? checked.value : 'none';
  if (type === 'hourly') return { type: 'hourly' };
  if (type === 'none')   return { type: 'none' };
  if (type === 'custom') return { type: 'custom', raw: ($(pfx + '-sched-raw')?.value || '').trim() };
  if (type === 'every-n') return { type: 'every-n', n: +$(pfx + '-sched-n').value };
  if (type === 'daily') {
    const h12 = +$(pfx + '-daily-h').value, ap = $(pfx + '-daily-ap').value;
    return { type: 'daily', hour24: to24(h12, ap), minute: +$(pfx + '-daily-m').value };
  }
  if (type === 'weekly') {
    const h12 = +$(pfx + '-weekly-h').value, ap = $(pfx + '-weekly-ap').value;
    const days = [...$(pfx + '-sched-control').querySelectorAll('.sched-day-btn.active')].map(e => +e.dataset.d).sort((a,b)=>a-b);
    return { type: 'weekly', hour24: to24(h12, ap), minute: +$(pfx + '-weekly-m').value, days };
  }
  return { type: 'none' };
}
function to24(h12, ap) {
  let h = h12 % 12;
  if (ap === 'PM') h += 12;
  return h;
}
/* Read the picker and return a cron string (or null), validating weekly days. */
function readSchedCron(pfx) {
  const s = readSchedState(pfx);
  if (s.type === 'custom') return s.raw || null;
  if (s.type === 'weekly' && (!s.days || !s.days.length)) {
    throw new Error('Pick at least one day for the weekly archive schedule.');
  }
  return buildCron(s);
}

/* ═══════════════════════════════════════════════════════════════════════════
   DATA LOADERS
═══════════════════════════════════════════════════════════════════════════ */
async function ensurePolicies() {
  try { POLICIES = await api('/config/policies'); } catch { POLICIES = []; }
  return POLICIES;
}
async function ensureDefaultPolicy() {
  try { DEFAULT_POLICY = await api('/config/policy/default'); } catch { DEFAULT_POLICY = null; }
  return DEFAULT_POLICY;
}
async function ensureStorages() {
  try { STORAGES = await api('/config/storages'); } catch { STORAGES = []; }
  return STORAGES;
}
async function ensureGroups() {
  try { GROUPS = await api('/config/groups'); } catch { GROUPS = []; }
  return GROUPS;
}
async function ensureCams() {
  try { CAMS = await api('/config/cameras'); } catch { CAMS = []; }
  return CAMS;
}
async function ensureUsers() {
  try { USERS = await api('/config/users'); } catch { USERS = []; }
  return USERS;
}
async function ensureRoles() {
  try { ROLES = await api('/config/roles'); } catch { ROLES = []; }
  return ROLES;
}
function groupOfCamera(camId) { return (GROUPS || []).find(g => (g.camera_ids || []).includes(camId)) || null; }
function groupName(camId) { const g = groupOfCamera(camId); return g ? g.name : null; }

/* All assignable profiles (Default first, then named) for selects/roster. */
function allProfiles() {
  const named = (POLICIES || []).filter(p => p.name && !p.is_default);
  const def = DEFAULT_POLICY || (POLICIES || []).find(p => p.is_default) || null;
  return def ? [def, ...named] : named;
}
function profileById(id) { return allProfiles().find(p => p.id === id) || (POLICIES||[]).find(p=>p.id===id) || null; }

/* Effective policy: own → group → default. Returns {policy, via, groupName}. */
function effectivePolicy(cam) {
  if (cam.policy_id) {
    const own = profileById(cam.policy_id);
    if (own) return { policy: own, via: 'own', groupName: null };
  }
  const grp = groupOfCamera(cam.id);
  if (grp && grp.policy_id) {
    const gp = profileById(grp.policy_id);
    if (gp) return { policy: gp, via: 'group', groupName: grp.name };
  }
  // The camera's resolved DTO policy is authoritative for "custom" forks too.
  if (cam.policy && cam.policy.name == null && !cam.policy.is_default) {
    return { policy: cam.policy, via: 'custom', groupName: null };
  }
  const def = DEFAULT_POLICY || (POLICIES || []).find(p => p.is_default) || cam.policy || null;
  return { policy: def, via: 'default', groupName: null };
}

/* Phase 4: resolve the live + archive storage *names* a policy records to,
   falling back to the global Default profile when a tier id is unset (a policy
   with null live_storage_id records to the default location). Returns
   {live, archive} of human-readable names ('—' when truly unknown). */
function policyStorageNames(pol) {
  const def = DEFAULT_POLICY || (POLICIES || []).find(p => p.is_default) || null;
  const liveId = (pol && pol.live_storage_id) || (def && def.live_storage_id) || null;
  const archId = (pol && pol.archive_enabled) ? (pol.archive_storage_id || (def && def.archive_storage_id) || null) : null;
  return {
    live: liveId ? stName(liveId) : '(default location)',
    archive: archId ? stName(archId) : null, // null ⇒ archiving off / not applicable
  };
}

/* Like policyStorageNames but returns the resolved storage IDS (default-fallback),
   for accurate change-detection that can't false-negative if two distinct disks
   happen to share a display name. */
function policyStorageIds(pol) {
  const def = DEFAULT_POLICY || (POLICIES || []).find(p => p.is_default) || null;
  const liveId = (pol && pol.live_storage_id) || (def && def.live_storage_id) || null;
  const archId = (pol && pol.archive_enabled) ? (pol.archive_storage_id || (def && def.archive_storage_id) || null) : null;
  return { live: liveId, archive: archId };
}

/* Phase 4: when a camera/group reassignment would change the EFFECTIVE storage
   disk of the affected cameras, warn first, informatively and footage-safely.
   There is NO per-camera migration (the drain is per-policy), so we do NOT offer
   a move here: we just confirm that new footage lands on the new disk while
   existing footage stays on the old disk and drains under retention (nothing is
   deleted; segments resolve by their own storage_id). `scope` describes who is
   affected (e.g. 'this camera' / 'the N cameras in this group'). Returns true to
   proceed (no change, or operator confirmed), false to abort. */
function confirmStorageReassign(fromPol, toPol, scope) {
  const a = policyStorageNames(fromPol), b = policyStorageNames(toPol);
  // Detect change by storage ID (not display name) so two distinct disks sharing
  // a name can't suppress a real warning; show names in the message.
  const ai = policyStorageIds(fromPol), bi = policyStorageIds(toPol);
  const liveChanged = ai.live !== bi.live;
  const archChanged = (ai.archive || null) !== (bi.archive || null);
  if (!liveChanged && !archChanged) return true; // effective disk unchanged → no warning
  const lines = [];
  if (liveChanged) lines.push(`• Live: ${a.live} → ${b.live}`);
  if (archChanged) {
    const from = a.archive || 'off', to = b.archive || 'off';
    lines.push(`• Archive: ${from} → ${to}`);
  }
  const msg =
    `This changes where ${scope} records footage:\n\n` +
    lines.join('\n') +
    `\n\nNew footage will record to the new disk. Existing footage stays on the ` +
    `current disk and drains there under its retention, nothing is deleted, and ` +
    `it remains viewable. (To actively move existing footage to another disk, use ` +
    `a recording profile's "Change storage…" option.)\n\nProceed?`;
  return confirm(msg);
}

/* Count cameras whose EFFECTIVE policy is `profileId`. */
function camCountForProfile(profileId, isDefault) {
  return (CAMS || []).filter(c => {
    const eff = effectivePolicy(c);
    if (!eff.policy) return false;
    if (eff.via === 'custom') return false;
    if (isDefault) return eff.via === 'default' || eff.policy.id === profileId;
    return eff.policy.id === profileId;
  }).length;
}
/* Count cameras DIRECTLY assigned (own policy_id) to a profile. */
function directCamsForProfile(profileId) {
  return (CAMS || []).filter(c => c.policy_id === profileId);
}

/* Load everything, then render the tree + restore selection. */
async function loadAll() {
  await ensureStorages(); await ensurePolicies(); await ensureDefaultPolicy();
  await ensureGroups(); await ensureCams(); await ensureUsers(); await ensureRoles();
  // LPR config gates the Plates nav entry; fail-soft so a config hiccup never
  // blanks the tree (Plates simply stays hidden).
  try { LPR_CONFIG = await api('/config/lpr'); } catch { LPR_CONFIG = null; }
  renderTree();
  // Deep-link / refresh restore: a #/section route in the URL wins; else the
  // last route this tab was on (sessionStorage, survives the desktop embed's
  // token-hash handshake, which scrubs the URL fragment); else empty selection.
  const bootRoute = (location.hash && location.hash.startsWith('#/'))
    ? location.hash.slice(1)
    : (sessionStorage.getItem(ROUTE_SS_KEY) || '');
  if (bootRoute && bootRoute !== '/') { routeApply(bootRoute); routeWrite(true); }
  else restoreSelection();
}

/* ═══════════════════════════════════════════════════════════════════════════
   SELECTION + ROUTING
   selKind ∈ 'camera' | 'group' | 'profile' | 'storage' | 'user' | 'cameras-root'
            | 'storage-root' | 'add-camera' | null

   Every selection is mirrored into the URL hash as #/<section>/<item?>/<tab?>
   (e.g. #/cameras/<uuid>/storage, #/recording/<id>, #/storage, #/server) so a
   refresh, back/forward, or a copy-pasted link lands on the exact pane. The
   desktop-embed SSO fragment (#token=…&embed=1) never starts with "#/", so the
   router ignores it (bootSSO consumes + scrubs it before the app loads).
═══════════════════════════════════════════════════════════════════════════ */
let selKind = null, selId = null;
let activeCamTab = 'info';
const ROUTE_SS_KEY = 'crumb_admin_route';
let ROUTE_APPLYING = false; // suppress hash writes while applying a route

/* Current selection → route string. */
function routeFor() {
  if (selKind === 'camera' && selId)  return '/cameras/' + selId + '/' + activeCamTab;
  if (selKind === 'group' && selId)   return '/groups/' + selId;
  if (selKind === 'profile' && selId) return '/recording/' + selId;
  if (selKind === 'storage' && selId) return '/storage/' + selId;
  if (selKind === 'user' && selId)    return '/security/users/' + selId;
  if (selKind === 'role' && selId)    return '/security/roles/' + selId;
  if (selKind === 'cameras-root')     return '/cameras';
  if (selKind === 'add-camera')       return '/cameras/add';
  if (selKind === 'profiles-root')    return '/recording';
  if (selKind === 'security-root')    return '/security';
  if (selKind === 'storage-root')     return '/storage';
  if (selKind === 'detection-root')   return '/detection';
  if (selKind === 'plates-root')      return '/plates';
  if (selKind === 'notifications-root') return '/notifications';
  if (selKind === 'server-root')      return '/server';
  return '/';
}
/* Mirror the selection into the hash + sessionStorage (embed-safe fallback).
   replace=true rewrites the current history entry instead of pushing a new one
   (used for the boot-time restore so Back still leaves the page cleanly). */
function routeWrite(replace) {
  const r = routeFor();
  try { sessionStorage.setItem(ROUTE_SS_KEY, r); } catch {}
  if (ROUTE_APPLYING && !replace) return;
  const want = '#' + r;
  if (location.hash === want || (r === '/' && !location.hash)) return;
  if (replace) {
    try { history.replaceState(null, '', location.pathname + location.search + want); return; }
    catch { /* fall through to a plain hash write */ }
  }
  // location.hash assignment adds a history entry → back/forward walk panes.
  location.hash = want;
}
/* Route string → selection. Unknown or stale ids fall back to the section root. */
function routeApply(r) {
  const parts = String(r || '/').split('/').filter(Boolean);
  const sec = parts[0] || '';
  ROUTE_APPLYING = true;
  try {
    if (sec === 'cameras') {
      if (!parts[1]) return select('cameras-root');
      if (parts[1] === 'add') return select('add-camera');
      const cam = CAMS.find(c => c.id === parts[1]);
      if (!cam) return select('cameras-root');
      if (parts[2] && camTabsAvailable().includes(parts[2])) activeCamTab = parts[2];
      return select('camera', cam.id);
    }
    if (sec === 'groups') {
      const g = (GROUPS || []).find(x => x.id === parts[1]);
      return g ? select('group', g.id) : select('cameras-root');
    }
    if (sec === 'recording') {
      const p = parts[1] ? profileById(parts[1]) : null;
      if (p) return select('profile', p.id);
      return select('profiles-root');
    }
    if (sec === 'storage') {
      if (parts[1] && STORAGES.find(s => s.id === parts[1])) return select('storage', parts[1]);
      return select('storage-root');
    }
    if (sec === 'security') {
      if (parts[1] === 'users' && USERS.find(u => u.id === parts[2])) return select('user', parts[2]);
      if (parts[1] === 'roles' && ROLES.find(x => x.id === parts[2])) return select('role', parts[2]);
      return select('security-root');
    }
    if (sec === 'detection')     return select('detection-root');
    // Plates deep-link only resolves while LPR is enabled; otherwise fall through.
    if (sec === 'plates' && LPR_CONFIG && LPR_CONFIG.enabled) return select('plates-root');
    if (sec === 'notifications') return select('notifications-root');
    if (sec === 'server')        return select('server-root');
    return selectNone();
  } finally { ROUTE_APPLYING = false; }
}
function selectNone() {
  selKind = null; selId = null;
  renderTree(); renderWelcome(); renderBottom();
  routeWrite();
}
/* Back/forward + hand-edited deep links while the app is open. */
window.addEventListener('hashchange', () => {
  const h = location.hash || '';
  if (!h.startsWith('#/')) return;                    // not a route (or scrubbed)
  const app = document.getElementById('app');
  if (!app || app.classList.contains('hidden')) return; // not in the console yet
  const r = h.slice(1);
  if (r === routeFor()) return;                       // our own write, ignore
  routeApply(r);
});

function restoreSelection() {
  if (selKind === 'camera') {
    if (CAMS.find(c => c.id === selId)) { renderCamera(selId); renderBottom(); routeWrite(); return; }
  } else if (selKind === 'group') {
    if ((GROUPS||[]).find(g => g.id === selId)) { renderGroup(selId); renderBottom(); routeWrite(); return; }
  } else if (selKind === 'profile') {
    if (profileById(selId)) { renderProfile(selId); renderBottom(); routeWrite(); return; }
  } else if (selKind === 'storage') {
    if (STORAGES.find(s => s.id === selId)) { renderStorage(selId); renderBottom(); routeWrite(); return; }
  } else if (selKind === 'user') {
    if (USERS.find(u => u.id === selId)) { renderUser(selId); renderBottom(); routeWrite(); return; }
  } else if (selKind === 'role') {
    if (ROLES.find(r => r.id === selId)) { renderRole(selId); renderBottom(); routeWrite(); return; }
  } else if (selKind === 'add-camera') {
    renderAddCamera(); renderBottom(); routeWrite(); return;
  }
  // Nothing valid selected → land on the Cameras list (the default section).
  return select('cameras-root');
}

/* Valid camera tabs for the current context, Motion is dropped when embedded in
   the desktop (the host has its own motion tuner, item #4). */
function camTabsAvailable() {
  return isEmbedded() ? ['info', 'storage'] : ['info', 'motion', 'storage'];
}

function select(kind, id) {
  selKind = kind; selId = id || null;
  // Close the mobile slide-in drawer whenever a nav item is selected.
  closeTree();
  // Tab PERSISTENCE: switching cameras KEEPS the active tab (Motion on Backyard →
  // click Driveway → still Motion). Only coerce to a valid tab, e.g. when the
  // persisted tab isn't available in the current context (embed hides Motion).
  if (kind === 'camera' && !camTabsAvailable().includes(activeCamTab)) activeCamTab = 'info';
  renderTree();
  if (kind === 'camera') renderCamera(id);
  else if (kind === 'group') renderGroup(id);
  else if (kind === 'profile') renderProfile(id);
  else if (kind === 'storage') renderStorage(id);
  else if (kind === 'user') renderUser(id);
  else if (kind === 'role') renderRole(id);
  else if (kind === 'add-camera') renderAddCamera();
  else if (kind === 'detection-root') renderDetectionClips();
  else if (kind === 'plates-root') renderPlates();
  else if (kind === 'notifications-root') renderNotifications();
  else if (kind === 'server-root') renderServerSettings();
  else renderWelcome();
  renderBottom();
  routeWrite();
}

/* Collapse state for the roots + per-group folders, persisted in localStorage
   so the tree's expansion survives refreshes AND new sessions (native feel). */
const TREE_COLLAPSE = JSON.parse(localStorage.getItem('crumb_tree_collapse') || sessionStorage.getItem('crumb_tree_collapse') || '{}');
function toggleCollapse(key) {
  TREE_COLLAPSE[key] = !TREE_COLLAPSE[key];
  localStorage.setItem('crumb_tree_collapse', JSON.stringify(TREE_COLLAPSE));

}

/* Keyboard activation for tree rows (role=button): Enter / Space fire the click.
   Inline-friendly so it can sit in the row's onkeydown attribute. */
function treeKey(ev, el) {
  if (ev.key === 'Enter' || ev.key === ' ' || ev.key === 'Spacebar') {
    ev.preventDefault();
    el.click();
  }
}

/* Sections-only rail (Frigate model): the rail carries just the seven sections,
   grouped under three eyebrows. Selecting a section renders its list/detail in
   the content pane — cameras, profiles, storages, users are NO LONGER nested in
   the rail; they live in each section's content view. Active state highlights
   the section whose family (root OR any item under it) is currently open. */
function renderTree() {
  const camActive = ['cameras-root','camera','group','add-camera'].includes(selKind);
  const recActive = ['profiles-root','profile'].includes(selKind);
  const stoActive = ['storage-root','storage'].includes(selKind);
  const detActive = selKind === 'detection-root';

  const secActive = ['security-root','user','role'].includes(selKind);

  const item = (onclick, ic, label, active, count) => {
    const badge = (count != null) ? `<span class="tw-count">${count}</span>` : '';
    return `<div class="tree-root"><div class="tree-root-head leaf ${active?'selected':''}" role="button" tabindex="0" onclick="${onclick}" onkeydown="treeKey(event,this)">

/* ── Storage advisor (item #5) ── fetch GET /stats/storage and render a card per
   storage: usage gauge, fill rate, eviction-aware days-until-full, top
   contributors, and actionable suggestions. Admin-only endpoint; degrades to a
   note on error so the add-location form is never blocked. */
async function loadStorageAdvisor() {
  const host = $('storage-advisor'); if (!host) return;
  host.innerHTML = `<div class="card-hint" style="padding:6px 2px">Loading storage analytics…</div>`;
  let data;
  try {
    data = await api('/stats/storage');
  } catch (e) {
    host.innerHTML = `<div class="card-hint" style="padding:6px 2px;color:var(--dim2)">Storage analytics unavailable (${esc(e.message)}).</div>`;
    return;
  }
  const list = (data && Array.isArray(data.storages)) ? data.storages : [];
  if (!list.length) {
    host.innerHTML = `<div class="card-hint" style="padding:6px 2px;color:var(--dim2)">No storage analytics yet, the recorder needs a day of footage to estimate fill rates.</div>`;
    return;
  }
  // Guard: $('storage-advisor') may have been replaced if the user navigated away
  // while the fetch was in flight.
  if (!$('storage-advisor')) return;
  host.innerHTML = list.map(advStorageCard).join('');
}

/* Distinct colours for profile segments in the stacked utilization bar. Assigned
   by index; wraps if there are more profiles than colours. */
const STK_PALETTE = ['#38BDD6', '#E8A33D', '#34C759', '#A78BFA', '#F472B6', '#60A5FA', '#FBBF24', '#2DD4BF'];

/* Build the stacked-by-profile utilization bar + legend for a storage card.
   Falls back to a plain single-fill bar when no per-profile data is available
   (e.g. an empty disk or a pre-upgrade backend that doesn't send usage_by_policy). */
function advStackedBar(s, m) {
  const { used, free, total, pct, barCls } = m;
  const usage = Array.isArray(s.usage_by_policy) ? s.usage_by_policy.filter(u => Number(u.bytes) > 0) : [];
  const meta = `<div class="cap-bar-meta"><span>${used==null?'—':fmtBytes(used)+' used'}</span><span>${free==null?'':fmtBytes(free)+' free'}</span></div>`;

  // No per-profile breakdown → keep the original flat bar.
  if (!usage.length || !total) {
    return `<div class="cap-bar-wrap">
      <div class="cap-bar-track"><div class="cap-bar-fill ${barCls}" style="width:${pct}%"></div></div>
      ${meta}
    </div>`;
  }

  const tracked = usage.reduce((a, u) => a + Number(u.bytes), 0);
  const otherBytes = (used != null) ? Math.max(0, used - tracked) : 0;
  // Each segment's width is a fraction of the WHOLE drive (so free space is the
  // visible remainder of the track).
  const seg = (bytes, color) => {
    const w = Math.max(0, bytes / total * 100);
    if (w <= 0) return '';
    return `<span class="stk-seg" style="width:${w}%;background:${color}" title="${esc(fmtBytes(bytes))}"></span>`;
  };
  const segs = usage.map((u, i) => seg(Number(u.bytes), STK_PALETTE[i % STK_PALETTE.length])).join('')
             + seg(otherBytes, 'var(--surface3)');

  const li = (color, label, bytes) =>
    `<span class="stk-li"><span class="stk-dot" style="background:${color}"></span>${esc(label)} <b>${esc(fmtBytes(bytes))}</b></span>`;
  const legend = usage.map((u, i) => li(STK_PALETTE[i % STK_PALETTE.length], u.policy_name || 'Profile', Number(u.bytes))).join('')
    + (otherBytes > 0 ? li('var(--surface3)', 'Other (non-Crumb)', otherBytes) : '')
    + (free != null && free > 0 ? `<span class="stk-li"><span class="stk-dot" style="background:transparent;border:1px solid var(--border)"></span>Free <b>${esc(fmtBytes(free))}</b></span>` : '');

  return `<div class="cap-bar-wrap">
    <div class="stk-track">${segs}</div>
    ${meta}
    <div class="stk-legend">${legend}</div>
  </div>`;
}

/* Render one storage advisor card. All interpolated values are esc()'d. */
function advStorageCard(s) {
  const total = s.total_bytes || 0;
  const free = s.free_bytes == null ? null : s.free_bytes;
  const used = (s.used_bytes != null) ? s.used_bytes : (free != null && total ? Math.max(0, total - free) : null);
  const pct = (used != null && total) ? Math.round(used / total * 100) : 0;
  const barCls = pct > 90 ? 'crit' : pct > 70 ? 'warn' : '';

  // State badge: steady (eviction keeping pace), filling (with ETA), or filling-no-ETA.
  let badge;
  if (s.at_steady_state) {
    badge = `<span class="adv-badge steady">At steady state</span>`;
  } else if (s.days_until_full != null) {
    const d = Number(s.days_until_full);
    const cls = d <= 14 ? 'crit' : 'filling';
    badge = `<span class="adv-badge ${cls}">Full in ~${esc(advDays(d))}</span>`;
  } else {
    badge = `<span class="adv-badge">Stable</span>`;
  }

  // Stat tiles.
  const rate24 = s.fill_rate_bytes_per_day_24h;
  const rate7 = s.fill_rate_bytes_per_day_7d;
  const fmtRate = r => (r == null || !isFinite(r)) ? '—' : `${fmtBytes(r)}<small>/day</small>`;
  const effRet = s.effective_retention_days != null ? advDays(s.effective_retention_days) : '—';
  const cfgRet = s.configured_retention_days != null ? advDays(s.configured_retention_days) : null;
  const sugRet = s.suggested_retention_days != null ? advDays(s.suggested_retention_days) : null;
  const dtf = s.at_steady_state
    ? `Steady, evicting<small> ~${effRet} window</small>`
    : (s.days_until_full != null ? advDays(s.days_until_full) : '—');

  const stats = [
    ['Used', `${fmtBytes(used)}<small> of ${fmtBytes(total)} · ${pct}%</small>`],
    ['Fill rate (24h)', fmtRate(rate24)],
    ['Fill rate (7d)', fmtRate(rate7)],
    ['Footage fits', effRet === '—' ? '—' : `${esc(effRet)}`],
    ['Days until full', dtf],
    ['Retention (configured)', cfgRet ? esc(cfgRet) : '<small>none, capacity-bound</small>'],
  ].map(([k, v]) => `<div class="adv-stat"><div class="as-k">${esc(k)}</div><div class="as-v">${v}</div></div>`).join('');

  // Top contributors (bytes/day), bar-scaled to the largest.
  const contribs = Array.isArray(s.top_contributors) ? s.top_contributors.slice(0, 5) : [];
  const maxBpd = contribs.reduce((m, c) => Math.max(m, Number(c.bytes_per_day) || 0), 0) || 1;
  const contribHTML = contribs.length ? `
    <div class="adv-contrib">
      <div class="adv-contrib-title">Top contributors</div>
      ${contribs.map(c => {
        const bpd = Number(c.bytes_per_day) || 0;
        const w = Math.max(2, Math.round(bpd / maxBpd * 100));
        const meta = [c.stream, c.mode].filter(Boolean).map(esc).join(' · ');
        return `<div class="adv-contrib-row">
          <span class="acr-name" title="${esc(c.camera || '')}">${esc(c.camera || '—')}</span>
          <span class="acr-bar"><span class="acr-fill" style="width:${w}%"></span></span>
          <span class="acr-val">${fmtBytes(bpd)}/day</span>
          ${meta ? `<span class="acr-mode">${meta}</span>` : ''}
        </div>`;
      }).join('')}
    </div>` : '';

  // Suggestions (actionable strings from the backend) + a synthesized retention nudge.
  const sug = Array.isArray(s.suggestions) ? s.suggestions.slice() : [];
  if (sugRet && s.configured_retention_days != null && Number(s.suggested_retention_days) > Number(s.configured_retention_days)) {
    sug.unshift(`Retention could be raised to ~${advDays(s.suggested_retention_days)} at the current fill rate.`);
  }
  const sugHTML = sug.length ? `
    <div class="adv-suggest">
      ${sug.map(t => `<div class="adv-suggest-item"><span class="asi-ico">${icon('idea', 13)}</span><span>${esc(t)}</span></div>`).join('')}
    </div>` : '';

  // Stacked-by-profile utilization bar: split the drive's used space into one
  // segment per recording profile, plus an "Other" slice for footage Crumb didn't
  // write (used − tracked), with the remainder of the track being free space.
  const barHTML = advStackedBar(s, { used, free, total, pct, barCls });

  return `<div class="adv-card">
    <div class="adv-card-head">
      <div style="min-width:0">
        <div class="adv-card-title">
          <span class="ac-ico">${icon(storageIcon(s.name, s.icon), 18)}</span>
          <span class="ac-name">${esc(s.name)}</span>
        </div>
        <div class="adv-card-path">${esc(s.path || '')}</div>
      </div>
      ${badge}
    </div>
    ${barHTML}
    <div class="adv-stats">${stats}</div>
    ${contribHTML}
    ${sugHTML}
  </div>`;
}

/* Friendly day count for the advisor (rounds, pluralizes, promotes to weeks/months
   for large windows). Input is a number of days. */
function advDays(d) {
  const n = Number(d);
  if (!isFinite(n) || n <= 0) return '—';
  if (n >= 60) { const m = Math.round(n / 30); return `${m} month${m !== 1 ? 's' : ''}`; }
  if (n >= 14) { const w = Math.round(n / 7); return `${w} week${w !== 1 ? 's' : ''}`; }
  const r = n < 10 ? Math.round(n * 10) / 10 : Math.round(n);
  return `${r} day${r !== 1 ? 's' : ''}`;
}

/* ── Add-camera pane: discovery-first (#/cameras/add) ────────────────────────
   Hosts the setup wizard's find → choose → add machinery (see "Discovery-flow

   battle-tested flow as first-run setup: credential list, per-device Creds…,
   auto-filled stream URLs, thumbnails + verify, per-camera groups, bulk add.
   A collapsed "Add manually" single-camera form is kept underneath. */
const CONSOLE_DISC_ORDER = ['cam-find', 'cam-select', 'cam-commit'];

/* Fresh console-hosted discovery state, unless one is already in progress
   (navigating away and back keeps the in-memory scan results; that's fine). */
function consoleDiscEnsure() {
  if (WZ && WZ.host === 'console') return;
  WZ = {
    host: 'console', consoleStep: 'cam-find',
    steps: [], i: 0, server: null, suggested: {},
    storages: null, _storageId: null, defaultPolicy: null, defaultStorage: null,
    scan: wizardFreshScan(),
    rows: {}, existing: null, groups: null,
    groupOf: {}, groupNewOpen: false, commit: null,
    brands: null, probeOk: null,
  };
  wizardLoadBrands();
  // Same Host-derived /24 scan-range guess the wizard gets (public endpoint).
  fetch('/auth/setup-status').then(r => r.ok ? r.json() : null).then(s => {
    if (!s || !WZ || WZ.host !== 'console') return;
    WZ.suggested = s;
    if (!WZ.scan.range && s.suggested_scan_range) {
      WZ.scan.range = s.suggested_scan_range;
      const ri = $('wz-scan-range'); if (ri && !ri.value) ri.value = WZ.scan.range;
    }
  }).catch(() => { /* prefill is best-effort */ });
}
function consoleDiscRestart() { WZ = null; renderAddCamera(); }

function renderAddCamera() {
  consoleDiscEnsure();
  const key = WZ.consoleStep;
  const at = CONSOLE_DISC_ORDER.indexOf(key);

  const labels = ['Find', 'Choose', 'Add'];
  const stepper = CONSOLE_DISC_ORDER.map((k, idx) => `
      <span style="display:inline-flex;align-items:center;gap:6px">

        <span style="font-size:12px;font-weight:600;color:${idx === at ? 'var(--text)' : 'var(--dim2)'}">${labels[idx]}</span>
      </span>${idx < CONSOLE_DISC_ORDER.length - 1 ? '<span style="flex:0 0 26px;height:2px;background:var(--border);border-radius:1px"></span>' : ''}`).join('');

    const ri = $('wz-scan-range'); if (ri) ri.value = WZ.scan.range;

function consoleDiscBack() {
  const at = CONSOLE_DISC_ORDER.indexOf(WZ.consoleStep);
  if (at > 0) { WZ.consoleStep = CONSOLE_DISC_ORDER[at - 1]; renderAddCamera(); }
}

/* Advance the console flow, validation and the commit itself are the wizard's
   own wizardSave()/wizardCommit(), so behavior is one code path. */
async function consoleDiscNext() {
  const key = WZ.consoleStep;
  const btn = $('ca-disc-next'); if (btn) btn.disabled = true;
  try {
    const ok = await wizardSave(key);
    if (ok === false) { if (btn) btn.disabled = false; return; }
    if (key === 'cam-find') WZ.consoleStep = 'cam-select';
    else if (key === 'cam-select') { await consoleDiscTargets(); WZ.consoleStep = 'cam-commit'; }
    else { await consoleDiscFinish(); return; }
    renderAddCamera();
  } catch (e) {
    wizardMsg(e && e.message ? e.message : String(e));
    if (btn) btn.disabled = false;
  }
}

/* Best-effort load of the default policy + its storage so the review step's
   recording-target line is real (the wizard learns these on its storage step,
   which the console never visits). */
async function consoleDiscTargets() {
  if (WZ.defaultPolicy === null) { try { WZ.defaultPolicy = await api('/config/policy/default'); } catch { WZ.defaultPolicy = {}; } }
  if (WZ.storages === null) { try { WZ.storages = await api('/config/storages'); } catch { WZ.storages = []; } }
  const wantId = WZ.defaultPolicy && WZ.defaultPolicy.live_storage_id;
  WZ.defaultStorage = (WZ.storages || []).find(s => s.id === wantId) || (WZ.storages || [])[0] || null;
}

/* Every selected camera committed OK: refresh the tree and land the operator on
   the first camera just added (or the Cameras root when nothing was selected). */
async function consoleDiscFinish() {
  let firstId = null, added = 0;
  for (const it of wizardCommitItems()) {
    const cr = WZ.commit && WZ.commit[it.key];
    if (cr && cr.state === 'ok' && cr.id) { added++; if (!firstId) firstId = cr.id; }
  }
  WZ = null; // done, the next visit to Add cameras starts a fresh flow
  if (added) toast(`${added} camera${added !== 1 ? 's' : ''} added, recording starts within ~30 seconds.`);
  await ensureCams(); await ensureGroups();
  renderTree();
  if (firstId) select('camera', firstId);
  else select('cameras-root');
}

/* ── REMOVE: camera (allowed; confirm with footage warning) ── */
async function delCamera(id) {
  // Look the name up from the in-memory model by UUID, never thread an
  // admin-controlled string through the onclick HTML attribute (stored-XSS sink).
  const cam = CAMS.find(x => x.id === id);
  const name = cam ? cam.name : id;
  if (!confirm(`Delete camera "${name}"?\n\nThis permanently removes the camera AND all of its recorded footage. This cannot be undone.`)) return;
  try {
    await api('/config/cameras/' + id, { method: 'DELETE' });
    // Only clear the selection AFTER the delete actually succeeds, otherwise a
    // 409/500 would leave the user staring at an empty pane with no idea the
    // camera is still there.
    toast(`Deleted "${name}"`);
    selKind = null; selId = null;
    await ensureCams(); await ensureGroups();
    renderTree();
    restoreSelection();
  } catch (e) {
    // Keep focus in the current pane: show the reason inline (ce-msg is mounted
    // by renderCamera) as well as a toast for visibility. Selection is untouched.
    setMsg('ce-msg', e.message, 'err');
    toast(e.message, 'err', 5000);
  }
}
