    <div class="card-hint" style="margin-top:12px;padding:0 2px">Storage sizes use decimal units (1 GB = 1,000,000,000 bytes), matching the server's reported free space.</div>`;
}

function capForStorage(storageId) {
  const s = STORAGES.find(x => x.id === storageId);
  if (!s || !(s.total_bytes || s.fs_total_bytes)) return '';
  return `<div class="tier-field">${capBarHTML(s)}</div>`;
}
function capBarHTML(s) {
  const total = s.total_bytes || s.fs_total_bytes;
  if (!total) return '';
  const free = s.free_bytes == null ? null : s.free_bytes;
  const used = free == null ? null : Math.max(0, total - free);
  const pct = used == null ? 0 : Math.round(used / total * 100);
  const cls = pct > 90 ? 'crit' : pct > 70 ? 'warn' : '';
  return `<div class="cap-bar-wrap">
    <div class="cap-bar-track"><div class="cap-bar-fill ${cls}" style="width:${pct}%"></div></div>
    <div class="cap-bar-meta"><span>${used==null?'—':fmtBytes(used)+' used'}</span><span>${free==null?'':fmtBytes(free)+' free'}</span></div>
  </div>`;
}

function renderProfileEdit(p) {
  const isNew = !p;
  const isDefault = p && p.is_default;
  // Same proactive delete guard as the read view: a profile bound to cameras /
  // groups can't be removed (the API 409s), so disable Remove here too.
  const peDirect = (!isNew && p) ? directCamsForProfile(p.id).length : 0;
  const peGroups = (!isNew && p) ? (GROUPS||[]).filter(g => g.policy_id === p.id).length : 0;
  const peRemoveDisabled = (!isNew && !isDefault) && (peDirect > 0 || peGroups > 0);
  $('right-pane').innerHTML = `
    <div class="rp-head">
      <div class="rp-head-left">
        <span class="rp-head-icon">${icon(isDefault?'star':'profiles',22)}</span>
        <div class="rp-head-titles">
          ${isDefault
            ? `<div class="rp-head-title">Default</div>
               <div class="rp-head-sub">Default profile · Name cannot be changed.</div>`
            : `<input id="pe-name" value="${p?esc(p.name||''):''}" placeholder="Profile name" style="font-size:16px;font-weight:600;width:280px" />`}
        </div>
      </div>
      <div class="rp-head-actions">
        <button class="primary" onclick="saveProfile()">Save</button>
        <button class="ghost" onclick="cancelProfileEdit()">Cancel</button>
        ${(!isNew && !isDefault) ? `<button class="danger-ghost" onclick="delProfile('${esc(p.id)}')" ${peRemoveDisabled?'disabled title="Reassign its cameras/groups to another profile before deleting"':''}>Remove</button>` : ''}
      </div>
    </div>
    <div id="pe-form-body"></div>
    <div id="pe-msg" class="form-msg"></div>`;

  // Phase 4: editing an EXISTING profile locks the storage selects (read-only +
  // Change-storage button); creating a NEW profile keeps editable selects so the
  // initial disk can be chosen (no footage exists yet → nothing to migrate).
  const peBase = p || (DEFAULT_POLICY || {});
  const lockOpts = isNew ? null : { lockStorage: true, policyId: peBase.id };
  renderProfileFields('pe', 'pe-form-body', lockOpts);
  fillProfileFields('pe', peBase);
  ['pe-live-ret','pe-arch-ret'].forEach(id => { const e=$(id); if(e) e.addEventListener('blur', ()=>validateRetention('pe')); });
}

function cancelProfileEdit() {
  profileEditMode = false;
  if (selId === '__new__') {
    const list = allProfiles();
    selId = list.length ? list[0].id : null;
    selKind = selId ? 'profile' : null;
  }
  renderTree();
  if (selKind === 'profile' && selId) renderProfile(selId);
  else renderWelcome();
}

async function saveProfile() {
  setMsg('pe-msg', '');
  if (!validateRetention('pe')) { setMsg('pe-msg', 'Fix the archive retention before saving.', 'err'); return; }
  if (!validateAdvanced('pe')) { setMsg('pe-msg', 'Fix the breathing-room buffer before saving.', 'err'); return; }
  try { readSchedCron('pe'); } catch (e) { setMsg('pe-msg', e.message, 'err'); return; }
  const fields = readProfileFields('pe');
  const isNew = selId === '__new__';
  const cur = isNew ? null : profileById(selId);
  const isDefault = cur && cur.is_default;
  try {
    if (isDefault) {
      await api('/config/policy/default', { method: 'PUT', body: JSON.stringify(fields) });
    } else if (isNew) {
      const name = ($('pe-name').value || '').trim();
      if (!name) { setMsg('pe-msg', 'Profile name is required.', 'err'); return; }
      const created = await api('/config/policies', { method: 'POST', body: JSON.stringify(Object.assign({ name }, fields)) });
      selId = created.id;
    } else {
      const name = ($('pe-name').value || '').trim();
      if (!name) { setMsg('pe-msg', 'Profile name is required.', 'err'); return; }
      await api('/config/policies/' + selId, { method: 'PUT', body: JSON.stringify(Object.assign({ name }, fields)) });
    }
    toast('Profile saved.');
    profileEditMode = false;
    await ensurePolicies(); await ensureDefaultPolicy();
    renderTree();
    renderProfile(selId);
  } catch (e) { setMsg('pe-msg', e.message, 'err'); }
}

/* ── REMOVE: profile (refuse while cameras/groups use it; show API reason) ── */
async function delProfile(id) {
  // Resolve the name from the loaded model by UUID (avoids passing admin-set
  // strings through the onclick attribute, stored-XSS sink).
  const prof = POLICIES.find(x => x.id === id) || (DEFAULT_POLICY && DEFAULT_POLICY.id === id ? DEFAULT_POLICY : null);
  const name = prof ? prof.name : id;
  if (!confirm(`Remove profile "${name}"?`)) return;
  try {
    await api('/config/policies/' + id, { method: 'DELETE' });
    toast(`Removed profile "${name}".`);
    if (selId === id) { selKind = null; selId = null; }
    profileEditMode = false;
    await ensurePolicies(); await ensureDefaultPolicy(); await ensureCams(); await ensureGroups();
    renderTree();
    restoreSelection();
  } catch (e) {
    // 409: still referenced by cameras/groups, the API's message is now
    // self-contained (it breaks down the count by kind and says to reassign), so
    // surface it verbatim inline + as a toast.
    setMsg('pe-msg', e.message, 'err');
    toast(e.message, 'err', 5000);
  }
}

/* ── Assign-cameras inline panel (preserved) ── */
function openAssignPanel(profileId) {
  const panel = $('assign-panel-' + profileId);
  if (!panel) return;
  if (panel.dataset.open === '1') { panel.innerHTML=''; panel.dataset.open='0'; return; }
  panel.dataset.open = '1';
  const assigned = (CAMS||[]).filter(c => c.policy_id === profileId);
  const assignedIds = new Set(assigned.map(c => c.id));
  const available = (CAMS||[]).filter(c => !assignedIds.has(c.id));
  const row = c => {
    const grp = groupName(c.id);
    // A grouped camera follows its GROUP's profile and cannot be pinned to a
    // profile directly (the server rejects it), render it disabled with a pointer
    // to assign the group instead, so a save can't silently fail on it.
    if (grp) {
      return `<label class="chk" style="padding:3px 0;opacity:.5" title="Controlled by group ${esc(grp)}, assign the group to a profile instead"><input type="checkbox" disabled/> ${esc(c.name)} <span style="color:var(--dim2);font-size:11px">· follows group ${esc(grp)}</span></label>`;
    }
    return `<label class="chk" style="padding:3px 0"><input type="checkbox" value="${c.id}" ${assignedIds.has(c.id)?'checked':''}/> ${esc(c.name)}</label>`;
  };
  panel.innerHTML = `
    <div class="inline-expander">
      <div style="font-size:13px;font-weight:500;margin-bottom:6px">Assign cameras directly to this profile</div>
      <input id="assign-filter-${profileId}" oninput="filterAssign('${profileId}')" placeholder="Filter cameras…" style="font-size:13px;padding:6px 10px" />
      <div class="two-col-checklist">
        <div>
          <div class="checklist-col-title">Currently assigned (${assigned.length})</div>
          <div class="checklist-box" id="assign-cur-${profileId}">${assigned.map(row).join('') || '<span style="color:var(--dim2);font-size:12px">None</span>'}</div>
        </div>
        <div>
          <div class="checklist-col-title">Available (${available.length})</div>
          <div class="checklist-box" id="assign-avail-${profileId}">${available.map(row).join('') || '<span style="color:var(--dim2);font-size:12px">None</span>'}</div>
        </div>
      </div>
      <div class="card-hint" style="margin-top:8px">Assigning a camera here pins it directly to this profile (overriding any group inheritance).</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="primary sm" onclick="saveAssign('${profileId}')">Save assignment</button>
        <button class="ghost sm" onclick="openAssignPanel('${profileId}')">Cancel</button>
      </div>
      <div id="assign-msg-${profileId}" class="form-msg"></div>
    </div>`;
}
function filterAssign(pid) {
  const f = ($('assign-filter-'+pid).value||'').toLowerCase();
  ['assign-cur-'+pid,'assign-avail-'+pid].forEach(boxId => {
    const box = $(boxId); if (!box) return;
    const labels = box.querySelectorAll('label.chk');
    let visible = 0;
    labels.forEach(l => {
      const show = l.textContent.toLowerCase().includes(f);
      l.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    // Show a "no matches" hint when the filter hides every camera in this column
    // (only when there were cameras to begin with, empty columns keep "None").
    let empty = box.querySelector('.filter-empty');
    if (labels.length && visible === 0) {
      if (!empty) {
        empty = document.createElement('span');
        empty.className = 'filter-empty';
        empty.style.cssText = 'color:var(--dim2);font-size:12px';
        empty.textContent = 'No cameras match the filter';
        box.appendChild(empty);
      }
    } else if (empty) {
      empty.remove();
    }
  });
}
async function saveAssign(profileId) {
  setMsg('assign-msg-'+profileId, '');
  const checked = new Set();
  ['assign-cur-'+profileId,'assign-avail-'+profileId].forEach(boxId => {
    $(boxId).querySelectorAll('input[type=checkbox]:checked').forEach(cb => checked.add(cb.value));
  });
  const wasAssigned = new Set((CAMS||[]).filter(c => c.policy_id === profileId).map(c => c.id));
  const toAssign = [...checked].filter(id => !wasAssigned.has(id));
  const toClear  = [...wasAssigned].filter(id => !checked.has(id));
  try {
    for (const id of toAssign) await api('/config/cameras/' + id, { method: 'PUT', body: JSON.stringify({ policy_id: profileId }) });
    for (const id of toClear)  await api('/config/cameras/' + id, { method: 'PUT', body: JSON.stringify({ policy_id: null }) });
    toast('Assignment updated.');
    await ensureCams();
    renderTree();
    renderProfile(profileId);
  } catch (e) { setMsg('assign-msg-'+profileId, e.message, 'err'); }
}

/* Assign whole camera GROUPS to a profile (sets each group's policy_id). This is
   the correct way to put grouped cameras on a profile, grouped cameras can't be
   pinned individually. Mirrors openAssignPanel/saveAssign but operates on groups. */
function openAssignGroupPanel(profileId) {
  const panel = $('assign-group-panel-' + profileId);
  if (!panel) return;
  if (panel.dataset.open === '1') { panel.innerHTML = ''; panel.dataset.open = '0'; return; }
  panel.dataset.open = '1';
  const groups = (GROUPS || []).slice().sort((a, b) => (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase()));
  if (!groups.length) {
    panel.innerHTML = `<div class="inline-expander"><div style="color:var(--dim2);font-size:12px">No camera groups exist yet, create one from the Cameras section.</div>
      <div style="margin-top:10px"><button class="ghost sm" onclick="openAssignGroupPanel('${profileId}')">Close</button></div></div>`;
    return;
  }
  const row = g => {
    const n = (g.camera_ids || []).length;
    return `<label class="chk" style="padding:3px 0"><input type="checkbox" value="${g.id}" ${g.policy_id === profileId ? 'checked' : ''}/> ${esc(g.name)} <span style="color:var(--dim2);font-size:11px">· ${n} camera${n !== 1 ? 's' : ''}</span></label>`;
  };
  panel.innerHTML = `
    <div class="inline-expander">
      <div style="font-size:13px;font-weight:500;margin-bottom:6px">Assign camera groups to this profile</div>
      <div class="checklist-box" id="assign-group-box-${profileId}">${groups.map(row).join('')}</div>
      <div class="card-hint" style="margin-top:8px">Every camera in a checked group records with this profile. Unchecking a group makes it inherit the global default.</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="primary sm" onclick="saveGroupAssign('${profileId}')">Save</button>
        <button class="ghost sm" onclick="openAssignGroupPanel('${profileId}')">Cancel</button>
      </div>
      <div id="assign-group-msg-${profileId}" class="form-msg"></div>
    </div>`;
}

async function saveGroupAssign(profileId) {
  setMsg('assign-group-msg-' + profileId, '');
  const box = $('assign-group-box-' + profileId);
  if (!box) return;
  const checked = new Set();
  box.querySelectorAll('input[type=checkbox]:checked').forEach(cb => checked.add(cb.value));
  const wasAssigned = new Set((GROUPS || []).filter(g => g.policy_id === profileId).map(g => g.id));
  const toAssign = [...checked].filter(id => !wasAssigned.has(id));
  const toClear = [...wasAssigned].filter(id => !checked.has(id));
  if (!toAssign.length && !toClear.length) { setMsg('assign-group-msg-' + profileId, 'No changes.'); return; }
  try {
    for (const id of toAssign) {
      const g = (GROUPS || []).find(x => x.id === id);
      await api('/config/groups/' + id, { method: 'PUT', body: JSON.stringify({ name: g.name, policy_id: profileId }) });
    }
    for (const id of toClear) {
      const g = (GROUPS || []).find(x => x.id === id);
      await api('/config/groups/' + id, { method: 'PUT', body: JSON.stringify({ name: g.name, policy_id: null }) });
    }
    toast('Group assignment updated.');
    await ensureGroups(); await ensureCams();
    renderTree();
    renderProfile(profileId);
  } catch (e) { setMsg('assign-group-msg-' + profileId, e.message, 'err'); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   STORAGE, single config form
═══════════════════════════════════════════════════════════════════════════ */
function renderStorage(id) {
  selKind = 'storage'; selId = id;
  const s = STORAGES.find(x => x.id === id);
  if (!s) { renderWelcome(); return; }
  const profs = allProfiles();
  const liveUsers = profs.filter(p => p.live_storage_id === s.id).map(p => p.name || 'Default');
  const archUsers = profs.filter(p => p.archive_enabled && p.archive_storage_id === s.id).map(p => p.name || 'Default');
  // Proactive delete guard: if any profile uses this location, disable Remove and
  // explain why up front (the API will also 409, but don't make the user click
  // blindly to find out). Footage that blocks deletion is enforced server-side.
  const blockers = [...new Set([...liveUsers, ...archUsers])];
  const removeDisabled = blockers.length > 0;
  $('right-pane').innerHTML = `
    <div class="rp-head">
      <div class="rp-head-left">
        <span class="rp-head-icon">${icon(storageIcon(s.name, s.icon),22)}</span>
        <div class="rp-head-titles">
          <button class="rp-back" onclick="select('storage-root')" title="Back to storage">‹ Storage</button>
          <div class="rp-head-title">${esc(s.name)}</div>
          <div class="rp-head-sub mono">${esc(s.path)}</div>
        </div>
      </div>
      <div class="rp-head-actions">
        <button class="primary" onclick="saveStorage('${s.id}')">Save</button>
        <button class="danger-ghost" onclick="delStorage('${esc(s.id)}')" ${removeDisabled?`disabled title="Used by ${esc(blockers.join(', '))}, reassign before deleting"`:''}>Remove</button>
      </div>
    </div>

    <div class="policy-section" style="margin-top:0">
      <div class="policy-section-title">Location</div>
      <div class="form-grid">
        <label class="fg-label" for="st-edit-name">Name</label>
        <div class="fg-ctl"><input id="st-edit-name" value="${esc(s.name)}" style="max-width:320px" /></div>
        <label class="fg-label" for="st-edit-path">Filesystem path</label>
        <div class="fg-ctl"><input id="st-edit-path" class="mono" value="${esc(s.path)}" />${fsbBtn('st-edit-path')}</div>
        <label class="fg-label" for="st-edit-icon">Disk icon <span id="st-icon-preview" class="ce-icon-preview"></span></label>
        <div class="fg-ctl"><select id="st-edit-icon" style="font-size:13px;max-width:220px" onchange="stPreviewIcon()" title="Auto detects SSD vs hard disk from the name; override if it guesses wrong.">${storageIconOpts(s.icon)}</select></div>
      </div>
    </div>

    <div class="policy-section">
      <div class="policy-section-title">Capacity</div>
      ${(s.total_bytes || s.fs_total_bytes) ? capBarHTML(s) : '<div style="font-size:12px;color:var(--dim2)">Free space unavailable for this path.</div>'}
    </div>

    <div class="policy-section">
      <div class="policy-section-title">Profiles using this location</div>
      <div style="font-size:13px;color:var(--dim)">Live storage for: ${liveUsers.length?esc(liveUsers.join(', ')):'<span style="color:var(--dim2)">none</span>'}</div>
      <div style="font-size:13px;color:var(--dim);margin-top:2px">Archive for: ${archUsers.length?esc(archUsers.join(', ')):'<span style="color:var(--dim2)">none</span>'}</div>
      ${removeDisabled?`<div class="warn-note">This location can't be removed while ${esc(blockers.join(', '))} ${blockers.length===1?'uses':'use'} it. Reassign those profiles to another location first. (Stored footage on this location, if any, must also be cleared.)</div>`:''}
    </div>
    <div id="st-edit-msg" class="form-msg"></div>`;
  stPreviewIcon();
}

/* Build the storage disk-icon <option> set; '' = Auto (infer from name). */
function storageIconOpts(current) {
  return [['','Auto (from name)'],['ssd','SSD / NVMe'],['hdd','Hard disk (HDD)'],['disk','Generic']]
    .map(([v,l]) => `<option value="${v}" ${(current||'')===v?'selected':''}>${l}</option>`).join('');
}
/* Live-update the small glyph next to the storage Disk-icon picker. Mirrors
   storageIcon(name, override). */
function stPreviewIcon() {
  const el = $('st-icon-preview'); if (!el) return;
  const override = $('st-edit-icon') ? $('st-edit-icon').value : '';
  const name = $('st-edit-name') ? $('st-edit-name').value : '';
  el.innerHTML = icon(storageIcon(name, override), 15);
}

/* Add a storage from the storage-root form. */
async function addStorage() {
  setMsg('st-msg', '');
  const name = $('st-name').value.trim(), path = $('st-path').value.trim();
  if (!name || !path) { setMsg('st-msg', 'Name and path are required.', 'err'); return; }
  try {
    const created = await api('/config/storages', { method: 'POST', body: JSON.stringify({ name, path }) });
    toast(`Location "${name}" added.`);
    await ensureStorages();
    renderTree();
    if (created && created.id) select('storage', created.id);
    else select('storage-root');
  } catch (e) { setMsg('st-msg', e.message, 'err'); }
}
async function saveStorage(id) {
  setMsg('st-edit-msg', '');
  try {

/* ── REMOVE: storage (refuse while segments OR policies reference it) ── */
async function delStorage(id) {
  // Resolve the name from the loaded model by UUID (avoids passing admin-set

    toast(e.message, 'err', 5000);

}

/** Build the role dropdown options for user forms.
 *  The built-in Administrator entry is synthetic (value "admin"; no role_id).
 *  Non-admin roles come from ROLES. selectedRoleId = currently assigned role id
 *  (null/undefined = admin or no role yet). isAdmin = whether the user is admin. */
function userRoleOptions(selectedRoleId, isAdmin) {
  const adminSel = (!selectedRoleId && isAdmin) ? ' selected' : '';
  let html = `<option value="admin"${adminSel}>Administrator, full access including this console</option>`;
  const nonAdmin = (ROLES || []).filter(r => !r.is_admin);
  if (nonAdmin.length) {
    nonAdmin.forEach(r => {
      const sel = (r.id === selectedRoleId && !isAdmin) ? ' selected' : '';
      html += `<option value="${esc(r.id)}"${sel}>${esc(r.name)}</option>`;
    });
  } else {
    html += `<option value="" disabled>No roles defined, create one first</option>`;
  }
  return html;
}

/* Camera-access multi-select for a viewer user. `pfx` = field prefix ('us' for the
   add form, 'ue' for the edit form). Renders a camera checklist + a group
   checklist; selecting a group grants access to all its members on save. Hidden
   for admins (who implicitly see everything). `selectedIds` pre-checks cameras. */
function cameraAccessUI(pfx, selectedIds) {
  const sel = new Set(selectedIds || []);
  const camItems = (CAMS || []).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''))
    .map(c => `<label class="chk"><input type="checkbox" name="${pfx}-cam" value="${c.id}" ${sel.has(c.id)?'checked':''}/> ${esc(c.name)}</label>`).join('')
    || '<span style="color:var(--dim2);font-size:12px">No cameras yet.</span>';
  // A group is pre-checked only if ALL its members are already selected (display inference).
  const grpItems = (GROUPS || []).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''))
    .map(g => {
      const members = g.camera_ids || [];
      const allIn = members.length > 0 && members.every(id => sel.has(id));
      return `<label class="chk"><input type="checkbox" name="${pfx}-grp" value="${g.id}" ${allIn?'checked':''}/> ${esc(g.name)} <span style="color:var(--dim2)">(${members.length})</span></label>`;
    }).join('') || '<span style="color:var(--dim2);font-size:12px">No groups.</span>';
  return `<div id="${pfx}-cam-access" class="hidden" style="margin-top:14px">
      <label class="field-label" style="margin-top:0">Extra cameras <span style="color:var(--dim2);font-weight:400">(granted to this user on top of the role's cameras)</span></label>
      <div class="two-col-checklist">
        <div>
          <div class="checklist-col-title">Cameras</div>
          <div class="checklist-box" id="${pfx}-cams">${camItems}</div>
        </div>
        <div>
          <div class="checklist-col-title">Groups <span style="color:var(--dim2)">(grants all members)</span></div>
          <div class="checklist-box" id="${pfx}-groups">${grpItems}</div>
        </div>
      </div>
    </div>`;
}
/* Show the extra-cameras selector for any non-admin role (admins see everything). */
function usRoleChanged(pfx) {
  const roleEl = pfx === 'ue' ? $('ue-role') : $('us-role');
  const box = $(pfx + '-cam-access');
  if (box) box.classList.toggle('hidden', !(roleEl && roleEl.value !== 'admin'));
}
/* Resolve the selected camera_ids: union of checked cameras + members of checked
   groups. Returns [] for admins (they implicitly have full access). */
function collectCameraIds(pfx, role) {
  if (role !== 'viewer') return [];
  const ids = new Set();
  document.querySelectorAll(`input[name="${pfx}-cam"]:checked`).forEach(el => ids.add(el.value));
  document.querySelectorAll(`input[name="${pfx}-grp"]:checked`).forEach(el => {
    const g = (GROUPS || []).find(x => x.id === el.value);
    (g && g.camera_ids || []).forEach(id => ids.add(id));
  });
  return [...ids];
}

      ${cameraAccessUI('ue', u.camera_ids || [])}

      <div id="ue-msg" class="form-msg"></div>
    </div>`;
  usRoleChanged('ue');
}

async function addUser() {
  setMsg('us-msg', '');
  const username = ($('us-name') || {}).value?.trim();
  const password = ($('us-pass') || {}).value;
  const roleVal  = ($('us-role') || {}).value;
  if (!username || !password) { setMsg('us-msg', 'Username and password are required.', 'err'); return; }
  // 'admin' maps to the built-in administrator; anything else is a role_id UUID.
  const isAdmin = roleVal === 'admin';
  const body = { username, password, role: isAdmin ? 'admin' : 'viewer' };
  if (!isAdmin && roleVal) {
    body.role_id = roleVal;
    body.camera_ids = collectCameraIds('us', 'viewer');
  }
  try {
    const created = await api('/config/users', { method: 'POST', body: JSON.stringify(body) });
    toast(`User "${username}" created.`);
    await ensureUsers();
    renderTree();
    if (created && created.id) select('user', created.id);
    else select(null);
  } catch (e) { setMsg('us-msg', e.message, 'err'); }
}
async function saveUser(id) {
  setMsg('ue-msg', '');
  const username = ($('ue-name') || {}).value?.trim();
  const roleVal  = ($('ue-role') || {}).value;
  if (!username) { setMsg('ue-msg', 'Username is required.', 'err'); return; }
  const isAdmin = roleVal === 'admin';
  const body = { username, role: isAdmin ? 'admin' : 'viewer' };
  if (!isAdmin && roleVal) {
    body.role_id = roleVal;
    body.camera_ids = collectCameraIds('ue', 'viewer');
  }
  const pw = ($('ue-pass') || {}).value;
  if (pw) body.password = pw;
  try {
    await api('/config/users/' + id, { method: 'PUT', body: JSON.stringify(body) });
    toast('User updated.');
    await ensureUsers();
    renderTree();
    renderUser(id);
  } catch (e) { setMsg('ue-msg', e.message, 'err'); }
}
/* ── REMOVE: user (refuse removing the last administrator; show API reason) ── */
async function delUser(id) {
  // Resolve the name from the loaded model by UUID (avoids passing admin-set
  // strings through the onclick attribute, stored-XSS sink).
  const u = USERS.find(x => x.id === id);
  const name = u ? u.username : id;
  const adminCount = USERS.filter(x => x.role === 'admin').length;
  if (u && u.role === 'admin' && adminCount <= 1) {
    setMsg('ue-msg', 'Cannot remove the last administrator, create another admin first.', 'err');
    return;
  }
  if (!confirm(`Remove user "${name}"?`)) return;
  try {
    await api('/config/users/' + id, { method: 'DELETE' });
    toast(`Removed user "${name}".`);
    if (selId === id) { selKind = null; selId = null; }
    await ensureUsers();
    renderTree();
    restoreSelection();
  } catch (e) {
    // The API also guards the last-admin case (409), surface its precise reason.
    setMsg('ue-msg', e.message, 'err');
    toast(e.message, 'err', 5000);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   ROLES, list / create / edit / delete
   REST: GET/POST /config/roles  ·  GET/PUT/DELETE /config/roles/:id

                 manage_views,bookmarks}, camera_ids:[uuid], created_at }
═══════════════════════════════════════════════════════════════════════════ */

/* Capability checkboxes rendered in the role editor. */
const ROLE_CAP_FIELDS = [
  { key: 'playback',     label: 'Playback',      hint: 'Access recorded footage on the Playback tab.' },
  { key: 'clips',        label: 'Clips',          hint: 'Browse and play motion / detection clips.' },
  { key: 'export',       label: 'Export',         hint: 'Build and download export batches.' },
  { key: 'ptz',          label: 'PTZ control',    hint: 'Operate pan / tilt / zoom on PTZ cameras.' },
  { key: 'manage_views', label: 'Manage views',   hint: 'Create, edit and delete saved live-wall views.' },
  { key: 'view_plates',  label: 'View license plates', hint: 'Sensitive: see recognised license-plate reads and search the plate database for this role’s cameras.' },
];

/** Build the capability checkboxes + bookmarks selector for a role form. pfx = field prefix. */
function roleCapUI(pfx, caps) {
  caps = caps || {};
  const boxes = ROLE_CAP_FIELDS.map(f =>
    `<label class="chk" title="${esc(f.hint)}"><input type="checkbox" id="${pfx}-cap-${f.key}" ${caps[f.key]?'checked':''}/> ${esc(f.label)}</label>`
  ).join('');
  const bk = caps.bookmarks || 'none';
  return `<div style="margin-top:10px">
    <label class="field-label" style="margin-top:0">Capabilities</label>
    <div style="display:flex;flex-wrap:wrap;gap:10px 24px;margin-top:4px">${boxes}</div>
    <div style="margin-top:10px">
      <label class="field-label" style="margin-top:0">Bookmarks</label>
      <select id="${pfx}-cap-bookmarks" style="max-width:280px">
        <option value="none"    ${bk==='none'    ?'selected':''}>None, no bookmark access</option>
        <option value="own"     ${bk==='own'     ?'selected':''}>Own, create &amp; view their own bookmarks</option>
        <option value="viewall" ${bk==='viewall' ?'selected':''}>View all, manage own, see everyone's, edit/delete only their own</option>
        <option value="all"     ${bk==='all'     ?'selected':''}>All, view and manage everyone's bookmarks</option>
      </select>
    </div>
  </div>`;
}

/** Read capability values out of a role form into a capabilities object. */
function collectRoleCaps(pfx) {
  const caps = {};
  ROLE_CAP_FIELDS.forEach(f => {
    caps[f.key] = !!(document.getElementById(`${pfx}-cap-${f.key}`) || {}).checked;
  });
  const bkEl = document.getElementById(`${pfx}-cap-bookmarks`);
  caps.bookmarks = bkEl ? bkEl.value : 'none';
  return caps;
}

    if (bkEl) bkEl.disabled = true;

async function addRole() {
  setMsg('ro-msg', '');

  if (!name) { setMsg('ro-msg', 'Role name is required.', 'err'); return; }
  const capabilities = collectRoleCaps('ro');

  try {
    const created = await api('/config/roles', { method: 'POST', body: JSON.stringify({ name, capabilities, camera_ids }) });
    toast(`Role "${name}" created.`);
    await ensureRoles();
    renderTree();
    if (created && created.id) select('role', created.id);
    else select(null);

async function saveRole(id) {
  setMsg('re-msg', '');
  const name = ($('re-name') || {}).value?.trim();
  if (!name) { setMsg('re-msg', 'Role name is required.', 'err'); return; }
  const capabilities = collectRoleCaps('re');
  const camera_ids   = collectCameraIds('re', 'viewer');
  try {
    await api('/config/roles/' + id, { method: 'PUT', body: JSON.stringify({ name, capabilities, camera_ids }) });
    toast('Role updated.');
    await ensureRoles();
    renderTree();
    renderRole(id);
  } catch (e) { setMsg('re-msg', e.message, 'err'); }

async function delRole(id) {
  const r = ROLES.find(x => x.id === id);
  const name = r ? r.name : id;
  if (r && r.is_admin) {
    toast('The built-in Administrator role cannot be removed.', 'err', 4000);
    return;
  }
  if (!confirm(`Remove role "${name}"? Users assigned this role will lose it.`)) return;
  try {
    await api('/config/roles/' + id, { method: 'DELETE' });
    toast(`Removed role "${name}".`);
    if (selId === id) { selKind = null; selId = null; }
    await ensureRoles();
    renderTree();
    restoreSelection();
  } catch (e) {
    /* 409 = role still in use, surface the API's message. */
    setMsg('re-msg', e.message, 'err');
    toast(e.message, 'err', 5000);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   NOTIFICATIONS, destinations (channels) + notification options (rules)
   REST:
     GET/POST /notifications/channels
     PUT/DELETE /notifications/channels/{id}
     POST /notifications/channels/{id}/test
     GET /notifications/rules
     PUT /notifications/rules            (default row, camera_id null)
     PUT /notifications/rules/{camera_id}
═══════════════════════════════════════════════════════════════════════════ */

/* Module-level state so Configure panels can open/close without a full re-render. */
let NOTIF_CHANNELS = [];  /* loaded array of channel objects */
let NOTIF_RULES    = [];  /* loaded array of rule objects   */
let NOTIF_OPEN_CH  = null; /* id of channel whose Configure panel is open, or '__new__' */
let NOTIF_NEW_KIND = 'discord'; /* provider kind selected in the Add-destination row   */
let NOTIF_ENABLED  = true;  /* master on/off from GET /notifications/settings          */
let NOTIF_SYS_QUIET_START = null; /* system-alerts global quiet hours, from /notifications/settings */
let NOTIF_SYS_QUIET_END   = null;
let NOTIF_SYS_ALERTS = [];  /* loaded array of system_alert_rules rows (P0-HEALTH-NOTIFY) */

/* Human-readable title + short description for each system-alert event_key. */
const SYS_ALERT_META = {
  recorder_offline:     { title: 'Recorder offline',                  desc: 'The recorder process heartbeat has gone stale, recording may be down.', unit: 'secs' },
  camera_offline:       { title: 'Camera offline',                    desc: 'A camera has written no new footage for longer than the threshold.', unit: 'secs' },
  premature_rollover:   { title: 'Footage evicted early',             desc: 'Footage was deleted before its configured retention because a size cap or disk-full forced it, actual footage loss.', unit: null },
  low_disk:             { title: 'Low disk space',                    desc: 'A storage volume has dropped below its configured free-space floor.', unit: 'pct' },
  policy_over_cap:      { title: 'Recording policy over cap',         desc: 'A policy’s live or archive footage is at/over its configured byte cap.', unit: null },
  backup_failed:        { title: 'Database backup failed',            desc: 'The Postgres backup job reported a failure.', unit: null },
  frigate_disconnected: { title: 'Frigate / MQTT disconnected',       desc: 'The Frigate detection integration has lost its MQTT connection.', unit: 'secs' },
  stream_no_segments:   { title: 'Camera records nothing',            desc: 'A camera keeps connecting but never produces a recordable segment before the stall watchdog reconnects it, so no footage is saved. Usually a long/adaptive keyframe interval (smart codec, e.g. Hikvision/Dahua H.264+/H.265+) or very low fps, exceeding the segment-receipt timeout. Fix the camera’s I-frame interval / disable the smart codec, or raise SEGMENT_RECEIPT_TIMEOUT_SECS.', unit: null },
  storage_unwritable:   { title: 'Storage not writable',              desc: 'The recorder cannot create a camera’s media directory under the storage root (permission denied) — footage is NOT being saved. Usually the host media dir is root-owned while the recorder runs as non-root uid 1001; fix the media dir ownership/permissions.', unit: null },
  plate_watchlist_hit:  { title: 'License-plate watchlist hit',        desc: 'A watchlisted license plate was seen on a camera (managed in LPR → Watchlist).', unit: null },
  update_available:     { title: 'Crumb update available',             desc: 'A newer Crumb release is available on GitHub. Off by default and only fires when the update-available check is also enabled (Settings → Updates) — notify-only, no download or install. Fires once per new version.', unit: null },
};

/* ── watchlist match-fuzziness control (issue #141) ──
   Mirrors the desktop/Android fuzzy model exactly (edit-distance over an OCR
   confusion map) so the live "accepted misreads" preview matches what the
   server would actually accept. Lives here, next to the watchlist, because
   that is where watch/ignore matching is configured. Persists via the same
   PUT /config/lpr the LPR settings panel uses (watchlist_fuzz, 0..0.5). */
const OCR_CONFUSIONS = {
  '0':'O','O':'0','1':'I','I':'1','L':'1','2':'Z','Z':'2','5':'S','S':'5',
  '8':'B','B':'8','6':'G','G':'6','4':'A','A':'4','D':'0','Q':'O','7':'T',
};
function normPlate(s){ return (s||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }
function plateLev(a,b){
  if (a===b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  let prev=[...Array(b.length+1).keys()], cur=new Array(b.length+1).fill(0);
  for (let i=0;i<a.length;i++){
    cur[0]=i+1;
    for (let j=0;j<b.length;j++){
      const cost = a[i]===b[j] ? 0 : 1;
      cur[j+1]=Math.min(prev[j+1]+1, cur[j]+1, prev[j]+cost);
    }
    [prev,cur]=[cur,prev];
  }
  return prev[b.length];
}
function plateAllowedEdits(ref,fuzz){ return Math.floor(Math.max(0,Math.min(0.5,fuzz)) * normPlate(ref).length); }
function plateAcceptedMisreads(plate,allowed){
  const norm=normPlate(plate);
  if (!norm || allowed<=0) return [];
  const out=[];
  for (let i=0;i<norm.length && out.length<4;i++){
    const rep=OCR_CONFUSIONS[norm[i]]; if(!rep) continue;
    const cand=norm.slice(0,i)+rep+norm.slice(i+1);
    if (cand!==norm && out.indexOf(cand)<0 && plateLev(cand,norm)<=allowed) out.push(cand);
  }
  if (allowed>=2){
    for (let i=0;i<norm.length && out.length<4;i++){
      const r1=OCR_CONFUSIONS[norm[i]]; if(!r1) continue;
      for (let j=i+1;j<norm.length && out.length<4;j++){
        const r2=OCR_CONFUSIONS[norm[j]]; if(!r2) continue;
        const cand=norm.slice(0,i)+r1+norm.slice(i+1,j)+r2+norm.slice(j+1);
        if (cand!==norm && out.indexOf(cand)<0 && plateLev(cand,norm)<=allowed) out.push(cand);
      }
    }
  }
  return out;
}
function onWlFuzzInput(){
  const slider=$('wl-fuzz'); if(!slider) return;
  const pct=parseInt(slider.value,10)||0;
  const typed=normPlate(($('wl-plate')||{}).value||'');
  const basis=typed||'7ABC123';
  const allowed=plateAllowedEdits(basis, pct/100);
  const lbl=$('wl-fuzz-lbl');
  if (lbl) lbl.textContent = pct+'% · up to '+allowed+' char'+(allowed===1?'':'s');
  const host=$('wl-fuzz-examples'); if(!host) return;
  if (allowed<=0){ host.innerHTML=`<span class="card-hint">Exact match only.</span>`; return; }
  const ex=plateAcceptedMisreads(basis, allowed);
  if (!ex.length){ host.innerHTML=`<span class="card-hint">No sample misreads for this plate.</span>`; return; }
  const chip = (cand)=>{
    let spans='';
    for (let i=0;i<cand.length;i++){
      const diff=(i>=basis.length || cand[i]!==basis[i]);
      spans += `<span style="${diff?'color:var(--warn,#E8A33D);font-weight:800':'opacity:.65'}">${esc(cand[i])}</span>`;
    }
    return `<span style="font-family:var(--mono,monospace);border:1px solid var(--border,#2a2d35);border-radius:4px;padding:2px 6px;font-size:12px">${spans}</span>`;
  };
  host.innerHTML = ex.map(chip).join('') +
    (typed ? '' : `<span class="card-hint" style="align-self:center">example: ${esc(basis)}</span>`);
}
let _wlFuzzSaveT=null;
function saveWlFuzz(){
  const slider=$('wl-fuzz'); if(!slider) return;
  const pct=Math.max(0, Math.min(50, parseInt(slider.value,10)||0));
  clearTimeout(_wlFuzzSaveT);
  _wlFuzzSaveT=setTimeout(async ()=>{
    try{
      const body={
        enabled: !!(LPR_CONFIG && LPR_CONFIG.enabled),
        retention_days: (LPR_CONFIG && LPR_CONFIG.retention_days) || 90,
        watchlist_fuzz: pct/100,
      };
      LPR_CONFIG = await api('/config/lpr', { method:'PUT', body: JSON.stringify(body) });
      toast('Match fuzziness saved.');
    } catch(e){ toast('Could not save fuzziness: '+e.message); }
  }, 400);
}

/* ── plate watchlist (GET/POST/DELETE /lpr/watchlist) ── */
/* Watch/Ignore segmented toggle: sets the hidden #wl-kind value addWatch reads,
   and dims the "Alert on hit" checkbox for ignore (which drops the read before
   it could alert). Replaces a native <select> that would not open in the
   embedded webview. */
function setWlKind(k) {
  const el = $('wl-kind'); if (!el) return;
  el.value = k;
  const w = $('wl-kind-watch'), i = $('wl-kind-ignore');
  if (w) w.classList.toggle('active', k === 'watch');
  if (i) i.classList.toggle('active', k === 'ignore');
  const n = $('wl-notify');
  if (n && n.parentElement) n.parentElement.style.opacity = k === 'ignore' ? '0.4' : '1';
}
async function loadWatchlist() {
  const host = $('wl-list'); if (!host) return;
  let list;
  try { list = await api('/lpr/watchlist'); }
  catch (e) { host.innerHTML = `<div class="form-msg err">${esc(e.message)}</div>`; return; }
  if (selKind !== 'plates-root' || !$('wl-list')) return; // navigated away
  if (!list || !list.length) {
    host.innerHTML = `<div class="card-hint" style="padding:6px 2px">No plates on the watchlist yet.</div>`;
    return;
  }
  host.innerHTML = list.map(w => {
    const ignore = w.kind === 'ignore';
    const dot = ignore
      ? `<span title="Ignored — matching reads are dropped" style="color:var(--danger)">⊘</span>`
      : (w.notify
        ? `<span title="Alerts on hit" style="color:var(--ok)">●</span>`
        : `<span title="Silent (tracked, no alert)" style="color:var(--dim2)">○</span>`);
    const kindTag = ignore ? `<span class="pill" style="font-size:10px">ignore</span>` : '';
    const label = w.label ? `<span style="font-size:12px;color:var(--dim)">${esc(w.label)}</span>` : '';
    return `
    <div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border)">
      ${dot}
      <span style="flex:0 0 130px;font-weight:600;font-family:var(--mono,monospace)">${esc(w.plate)}</span>
      ${kindTag}
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</span>
      <button class="danger-ghost sm" onclick="delWatch('${esc(w.id)}','${esc(w.plate)}')">Remove</button>
    </div>`;
  }).join('');
}

async function addWatch() {
  setMsg('wl-msg', '');
  const plate = ($('wl-plate') || {}).value ? $('wl-plate').value.trim() : '';
  if (!plate) { setMsg('wl-msg', 'Enter a plate to watch.', 'err'); return; }
  const body = {
    plate,
    label: (($('wl-label') || {}).value || '').trim() || null,
    notify: !!($('wl-notify') || {}).checked,
    kind: ($('wl-kind') || {}).value || 'watch',
  };
  try {
    await api('/lpr/watchlist', { method: 'POST', body: JSON.stringify(body) });
    $('wl-plate').value = ''; $('wl-label').value = '';
    toast('Added to watchlist.');
    loadWatchlist();
  } catch (e) { setMsg('wl-msg', e.message, 'err'); }
}

async function delWatch(id, plate) {
  if (!confirm(`Remove ${plate} from the watchlist?`)) return;
  try {
    await api('/lpr/watchlist/' + encodeURIComponent(id), { method: 'DELETE' });
    toast('Removed from watchlist.');
    loadWatchlist();
  } catch (e) { toast(e.message, 'err'); }
}

/* Pre-fill the watchlist add box from a plate read row, then scroll to it. */
function watchPlate(plate) {
  const el = $('wl-plate'); if (!el) return;
  el.value = plate;
  el.focus();
  el.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

/* Fetch + paint the plate table from the current search box / match mode. */
async function loadPlates() {
  const host = $('plate-results'); if (!host) return;
  const q    = ($('plate-q') || {}).value ? $('plate-q').value.trim() : '';
  const match = ($('plate-match') || {}).value || 'contains';
  const camIds = (CAMS || []).map(c => c.id).join(',');
  host.innerHTML = `<div class="card-hint" style="padding:6px 2px">Loading…</div>`;
  const params = new URLSearchParams();
  if (camIds) params.set('camera_ids', camIds);
  if (q) { params.set('q', q); params.set('match', match); }
  params.set('limit', String(PLATES_LIMIT));
  let data;
  try { data = await api('/plates?' + params.toString()); }
  catch (e) { host.innerHTML = `<div class="form-msg err">${esc(e.message)}</div>`; return; }
  if (selKind !== 'plates-root' || !$('plate-results')) return; // navigated away mid-fetch
  renderPlateTable(host, data);
}

function renderPlateTable(host, data) {
  const plates = (data && data.plates) || [];
  if (!plates.length) {
    host.innerHTML = `<div class="card-hint" style="padding:6px 2px">No plate reads found.</div>`;
    return;
  }
  const camName = id => { const c = (CAMS || []).find(x => x.id === id); return c ? c.name : id; };
  const rows = plates.map(p => {
    const when = p.ts ? new Date(p.ts).toLocaleString() : '—';
    const conf = (p.confidence == null) ? '—' : Math.round(p.confidence * 100) + '%';
    const src  = p.source_id || '—';
    const rawNote = (p.plate_raw && p.plate_raw !== p.plate) ? ` title="raw: ${esc(p.plate_raw)}"` : '';
    return `
    <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);min-width:0">
      <span style="flex:0 0 130px;font-weight:600;font-family:var(--mono,monospace);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"${rawNote}>${esc(p.plate || '—')}</span>
      <span style="flex:0 0 170px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(camName(p.camera_id))}">${esc(camName(p.camera_id))}</span>
      <span style="flex:1;font-size:12px;color:var(--dim);white-space:nowrap">${esc(when)}</span>
      <span style="flex:0 0 60px;font-size:12px;color:var(--dim)">${esc(conf)}</span>
      <span style="flex:0 0 120px;font-size:12px;color:var(--dim2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(src)}">${esc(src)}</span>
    </div>`;
  }).join('');
  const more = (data && data.has_more)
    ? `<div class="card-hint" style="margin-top:8px">More reads exist, narrow your search to see them.</div>` : '';
  host.innerHTML = `
    <div style="display:flex;gap:10px;padding:2px 0 4px;font-size:11px;color:var(--dim2)">
      <span style="flex:0 0 130px">Plate</span><span style="flex:0 0 170px">Camera</span><span style="flex:1">Time</span><span style="flex:0 0 60px">Conf.</span><span style="flex:0 0 120px">Source</span>
    </div>
    ${rows}
    <div class="card-hint" style="margin-top:8px">${esc(String((data && data.total) != null ? data.total : plates.length))} total plate read${((data && data.total) === 1) ? '' : 's'}.</div>
    ${more}`;
}

async function renderNotifications() {
  selKind = 'notifications-root'; selId = null;
  $('right-pane').innerHTML = `
    <div class="rp-head">
      <div class="rp-head-left">
        <span class="rp-head-icon">${icon('bell',22)}</span>
        <div class="rp-head-titles">
          <div class="rp-head-title">Notifications</div>
          <div class="rp-head-sub">Loading…</div>
        </div>
      </div>
    </div>`;

  try {
    const [channels, rules, settings, sysAlerts] = await Promise.all([
      api('/notifications/channels').catch(() => []),
      api('/notifications/rules').catch(() => []),
      api('/notifications/settings').catch(() => ({ enabled: true })),
      api('/notifications/system-alerts').catch(() => []),
    ]);
    NOTIF_CHANNELS = channels;
    NOTIF_RULES    = rules;
    NOTIF_ENABLED  = settings && settings.enabled !== false;
    NOTIF_SYS_QUIET_START = settings ? (settings.system_quiet_start_hour ?? null) : null;
    NOTIF_SYS_QUIET_END   = settings ? (settings.system_quiet_end_hour ?? null)   : null;
    NOTIF_SYS_ALERTS = sysAlerts || [];
  } catch (e) {
    $('right-pane').innerHTML += `<div class="policy-section"><div class="form-msg err">${esc(e.message)}</div></div>`;
    return;
  }

  NOTIF_OPEN_CH = null;
  _renderNotificationsPane();
}

/* Toggle the master notifications on/off switch and persist via PUT /notifications/settings. */
async function notifToggleMaster(checked) {
  NOTIF_ENABLED = checked;
  /* Optimistically update the paused banner without a full re-render. */
  const banner = $('notif-paused-banner');
  if (banner) banner.style.display = checked ? 'none' : 'flex';
  try {
    await api('/notifications/settings', { method: 'PUT', body: JSON.stringify({ enabled: checked }) });
    toast(checked ? 'Notifications enabled.' : 'Notifications paused, no alerts will be sent.');
  } catch (e) {
    /* Roll back the optimistic state on failure. */
    NOTIF_ENABLED = !checked;
    const tog = $('notif-master-toggle');
    if (tog) tog.checked = !checked;
    if (banner) banner.style.display = !checked ? 'none' : 'flex';
    toast('Failed to save: ' + e.message, 'err');
  }
}

    ? NOTIF_CHANNELS.map(ch => {
        const isOpen = NOTIF_OPEN_CH === ch.id;

            <div class="td-actions" style="gap:5px">
              <button class="ghost xs" onclick="notifOpenConfigure('${esc(ch.id)}')">${isOpen?'Close':'Configure'}</button>
              <button class="ghost xs" id="notif-test-btn-${esc(ch.id)}" onclick="notifTestChannel('${esc(ch.id)}')">Test</button>
              <button class="danger-ghost xs" onclick="notifRemoveChannel('${esc(ch.id)}')">Remove</button>
            </div>
          </div>
          <div id="notif-cfg-${esc(ch.id)}" class="${isOpen?'':'hidden'}">${isOpen ? _renderConfigureForm(ch) : ''}</div>

  $('right-pane').innerHTML = `

      <div class="rp-head-left">

        <div class="rp-head-titles">

        </div>

      <span class="notif-master-label">${icon('bell',16)} Notifications</span>
      <label class="toggle-switch" title="${NOTIF_ENABLED ? 'Notifications are on, click to pause' : 'Notifications are paused, click to enable'}">
        <input type="checkbox" id="notif-master-toggle" ${NOTIF_ENABLED ? 'checked' : ''}
               onchange="notifToggleMaster(this.checked)" />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div id="notif-paused-banner" class="notif-paused-banner" style="display:${NOTIF_ENABLED ? 'none' : 'flex'}">
      ${icon('bell',14)}
      <span>All notifications are paused, no alerts will be sent until you turn them back on.</span>
    </div>

    <!-- ── Section 1: Destinations ── -->
    <div class="policy-section" style="margin-top:0">
      <div class="rp-section-head" style="margin-bottom:8px">
        <div class="policy-section-title" style="margin-bottom:0">Destinations</div>
      </div>
      <div class="card-hint" style="margin-bottom:10px">
        Where alerts are delivered. Each destination is a named channel (e.g. a Discord webhook
        or a Pushover push). Add as many as you like; each can cover all cameras or a subset.
      </div>

      <!-- Add-destination row -->
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
        <select id="notif-new-kind" style="width:auto" onchange="NOTIF_NEW_KIND=this.value">
          ${kindOpts}
        </select>
        <button class="primary sm" onclick="notifOpenConfigure('__new__')">Add destination</button>
      </div>

      <!-- New-channel configure form (hidden until Add is clicked) -->
      <div id="notif-cfg-__new__" class="${NOTIF_OPEN_CH==='__new__'?'':'hidden'}">${NOTIF_OPEN_CH==='__new__'?_renderConfigureForm(null):''}
      </div>

      <!-- Configured channels list -->
      <div id="notif-ch-list" style="display:flex;flex-direction:column;gap:6px">
        ${chRows}
      </div>
    </div>

    <!-- ── Section 2: Notification options ── -->
    <div class="policy-section" id="notif-rules-section">
      ${_renderRulesSection()}
    </div>

    <div id="notif-rules-msg" class="form-msg"></div>

    <!-- ── Section 3: System alerts (P0-HEALTH-NOTIFY) ── -->
    <div class="policy-section" id="notif-sysalerts-section">
      ${_renderSystemAlertsSection()}
    </div>

    <div id="notif-sysalerts-msg" class="form-msg"></div>`;
}

/* ── System alerts section (footage-loss-critical + health events) ── */
function _renderSystemAlertsSection() {
  const rows = (NOTIF_SYS_ALERTS.length ? NOTIF_SYS_ALERTS : Object.keys(SYS_ALERT_META).map(k => ({ event_key:k, enabled:true, threshold_secs:null, threshold_fraction:null, bypass_quiet_hours:false, cooldown_secs:900 })))
    .map(r => {
      const meta = SYS_ALERT_META[r.event_key] || { title: r.event_key, desc: '', unit: null };
      let thresholdField = '';
      if (meta.unit === 'secs') {
        thresholdField = `<input type="number" min="0" class="sysalert-threshold" data-key="${esc(r.event_key)}" data-unit="secs"
          style="width:90px" value="${r.threshold_secs != null ? r.threshold_secs : ''}" placeholder="default" />
          <span class="card-hint" style="margin:0">secs</span>`;
      } else if (meta.unit === 'pct') {
        const pct = r.threshold_fraction != null ? Math.round(r.threshold_fraction * 100) : '';
        thresholdField = `<input type="number" min="0" max="100" class="sysalert-threshold" data-key="${esc(r.event_key)}" data-unit="pct"
          style="width:90px" value="${pct}" placeholder="default" />
          <span class="card-hint" style="margin:0">% free floor</span>`;
      } else {
        thresholdField = `<span class="card-hint" style="margin:0">—</span>`;
      }
      return `
      <tr data-key="${esc(r.event_key)}">
        <td style="min-width:220px">
          <div style="font-weight:600;font-size:13px">${esc(meta.title)}</div>
          <div class="card-hint" style="margin-top:2px;max-width:360px">${esc(meta.desc)}</div>
        </td>
        <td>
          <label class="toggle-switch" style="transform:scale(0.85)">
            <input type="checkbox" class="sysalert-enabled" data-key="${esc(r.event_key)}" ${r.enabled ? 'checked' : ''} />
            <span class="toggle-slider"></span>
          </label>
        </td>
        <td style="white-space:nowrap">${thresholdField}</td>
        <td>
          <label class="chk" style="font-size:12px" title="Fire even during quiet hours">
            <input type="checkbox" class="sysalert-bypass" data-key="${esc(r.event_key)}" ${r.bypass_quiet_hours ? 'checked' : ''} />
            Bypass quiet hours
          </label>
        </td>
      </tr>`;
    }).join('');

  return `
    <div class="rp-section-head" style="margin-bottom:8px">
      <div class="policy-section-title" style="margin-bottom:0">System alerts</div>
      <button class="primary sm" onclick="notifSaveSystemAlerts()">Save system alerts</button>
    </div>
    <div class="card-hint" style="margin-bottom:10px">
      Alerts on the things that LOSE footage, recorder/camera health, storage, and backups —
      routed through the same destinations above. "Bypass quiet hours" means the alert fires
      even during the quiet-hours window below (recommended for footage-loss-critical events).
    </div>

    <div class="grid2" style="gap:8px 16px;margin-bottom:12px">
      <div>
        <label class="field-label" style="margin-top:0">Quiet hours start (0–23) ${infoHint('Applies only to system alerts that do NOT bypass quiet hours. Leave blank to disable.')}</label>
        <input id="sysalert-quiet-start" type="number" min="0" max="23" placeholder="22"
               value="${NOTIF_SYS_QUIET_START != null ? NOTIF_SYS_QUIET_START : ''}" />
      </div>
      <div>
        <label class="field-label" style="margin-top:0">Quiet hours end (0–23)</label>
        <input id="sysalert-quiet-end" type="number" min="0" max="23" placeholder="7"
               value="${NOTIF_SYS_QUIET_END != null ? NOTIF_SYS_QUIET_END : ''}" />
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Event</th><th style="width:60px">On</th><th style="width:150px">Threshold</th><th style="width:160px">Quiet hours</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ── Save system alerts: per-row PUT /notifications/system-alerts/{event_key} + quiet hours via /notifications/settings ── */
async function notifSaveSystemAlerts() {
  setMsg('notif-sysalerts-msg', '');

  const rows = document.querySelectorAll('#notif-sysalerts-section tr[data-key]');
  const calls = [];
  rows.forEach(tr => {
    const key = tr.dataset.key;
    const enabled = tr.querySelector('.sysalert-enabled').checked;
    const bypass  = tr.querySelector('.sysalert-bypass').checked;
    const thrEl   = tr.querySelector('.sysalert-threshold');
    const body = { enabled, bypass_quiet_hours: bypass };
    if (thrEl) {
      const raw = thrEl.value;
      if (thrEl.dataset.unit === 'secs') {
        body.threshold_secs = raw !== '' ? parseInt(raw, 10) : null;
      } else if (thrEl.dataset.unit === 'pct') {
        body.threshold_fraction = raw !== '' ? (parseFloat(raw) / 100) : null;
      }
    }
    calls.push(api('/notifications/system-alerts/' + encodeURIComponent(key), { method: 'PUT', body: JSON.stringify(body) }));
  });

  const quietStart = ($('sysalert-quiet-start') || {}).value;
  const quietEnd    = ($('sysalert-quiet-end')   || {}).value;
  const settingsBody = {
    enabled: NOTIF_ENABLED,
    system_quiet_start_hour: quietStart !== '' ? parseInt(quietStart, 10) : null,
    system_quiet_end_hour:   quietEnd   !== '' ? parseInt(quietEnd, 10)   : null,
  };
  calls.push(api('/notifications/settings', { method: 'PUT', body: JSON.stringify(settingsBody) }));

  try {
    await Promise.all(calls);
    toast('System alerts saved.');
    NOTIF_SYS_ALERTS = await api('/notifications/system-alerts').catch(() => NOTIF_SYS_ALERTS);
    NOTIF_SYS_QUIET_START = settingsBody.system_quiet_start_hour;
    NOTIF_SYS_QUIET_END   = settingsBody.system_quiet_end_hour;
    const sec = $('notif-sysalerts-section');
    if (sec) sec.innerHTML = _renderSystemAlertsSection();
  } catch (e) {
    setMsg('notif-sysalerts-msg', e.message, 'err');
  }
}

/* Render the Configure form, either for a new channel (ch=null, uses NOTIF_NEW_KIND)
   or for an existing channel (ch = the channel object). Secrets are masked on edit:
   shows a placeholder "•••••••• (unchanged)" and the field is sent to the API only
   when the user actually types something (mirrors the Frigate password pattern). */
function _renderConfigureForm(ch) {
  const isNew  = !ch;
  const kind   = isNew ? NOTIF_NEW_KIND : ch.kind;
  const fields = NOTIF_PROVIDER_FIELDS[kind] || [];
  const saveFn = isNew ? 'notifSaveNew()' : `notifSaveEdit('${esc(ch.id)}')`;
  const cancelFn = isNew ? "notifCloseConfigure('__new__')" : `notifCloseConfigure('${esc(ch ? ch.id : '')}')`;

  /* Camera-scope checklist */
  const camChecks = CAMS.map(c => {
    const checked = ch && ch.camera_ids && ch.camera_ids.includes(c.id) ? 'checked' : '';
    return `<label class="chk" style="font-size:12px">
      <input type="checkbox" class="notif-cam-chk" value="${esc(c.id)}" ${checked} />
      ${esc(c.name)}
    </label>`;
  }).join('');

  /* Secret fields, for existing channels, show masked placeholder; blank = keep. */
  const secretFields = fields.map(f => {
    const inputType = f.type === 'password' ? 'password' : 'text';
    const placeholder = (!isNew && f.type === 'password')
      ? '•••••••• (unchanged)'
      : (f.hint || '');
    return `<div>
      <label class="field-label" style="margin-top:0">${esc(f.label)}${infoHint(f.hint)}</label>
      <input id="notif-f-${esc(kind)}-${esc(f.id)}" type="${inputType}" placeholder="${esc(placeholder)}" autocomplete="off" />
    </div>`;
  }).join('');

  const snapNote = NOTIF_ATTACHES_SNAP[kind]
    ? 'This provider attaches the snapshot image directly to the notification.'
    : 'This provider links to the snapshot rather than attaching it.';

  return `<div class="inline-expander" style="margin-top:8px" id="notif-form-${esc(isNew?'__new__':ch.id)}">
    <div class="policy-section-title" style="margin-bottom:10px">
      ${isNew ? 'Configure new ' + esc(NOTIF_KIND_LABEL[kind] || kind) + ' destination' : 'Configure: ' + esc(ch.name)}
    </div>

    <div class="grid2">
      <div style="grid-column:1/3">
        <label class="field-label" style="margin-top:0">Name</label>
        <input id="notif-f-name" placeholder="My ${esc(NOTIF_KIND_LABEL[kind]||kind)} alerts" value="${esc(isNew?'':ch.name)}" />
      </div>
      ${secretFields}
    </div>

    <div class="policy-section" style="margin-top:10px">
      <div class="policy-section-title">Camera scope</div>
      <div class="card-hint" style="margin-bottom:8px">Leave all unchecked to cover every camera.</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px 18px">
        ${camChecks || '<span style="font-size:12px;color:var(--dim2)">No cameras configured yet.</span>'}
      </div>
    </div>

    <div class="policy-section" style="margin-top:10px">
      <div class="policy-section-title">Options</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        <label class="chk">
          <input type="checkbox" id="notif-f-snapshot" ${(!isNew && ch.include_snapshot)?'checked':(!isNew?'':'checked')} />
          Include snapshot ${infoHint(snapNote)}
        </label>
        <label class="chk">
          <input type="checkbox" id="notif-f-enabled" ${(isNew||ch.enabled)?'checked':''} />
          Enabled
        </label>
        <label class="chk" id="notif-f-global-wrap">
          <input type="checkbox" id="notif-f-global" ${(!isNew && ch.global)?'checked':''} />
          Make available to all users (global)
        </label>
      </div>
    </div>

    <div class="info-note" style="margin-top:8px">${esc(snapNote)}</div>

    <div style="display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap">
      <button class="primary sm" onclick="${saveFn}">Save</button>
      <button class="ghost sm" onclick="${cancelFn}">Cancel</button>
      <span id="notif-form-msg-${esc(isNew?'__new__':ch.id)}" style="font-size:12px;color:var(--dim);flex:1"></span>
    </div>
  </div>`;
}

/* Render the Notification options (rules) section HTML, called inline. */
function _renderRulesSection() {
  /* Default rule = the row with camera_id null */
  const def = NOTIF_RULES.find(r => !r.camera_id) || {};

  const presenceOpts = [
    ['always',    'Always notify'],
    ['away_only', 'Only when away'],
    ['off',       'Off'],
  ].map(([v,l]) => `<option value="${v}" ${(def.presence_mode||'always')===v?'selected':''}>${l}</option>`).join('');

  /* Per-camera overrides */
  const camOverrideRows = CAMS.map(c => {
    const r = NOTIF_RULES.find(x => x.camera_id === c.id) || {};
    const mode = r.presence_mode || 'default';
    const opts = [['default','Default'],['off','Off'],['away_only','Away only'],['always','Always']]
      .map(([v,l]) => `<option value="${v}" ${mode===v?'selected':''}>${l}</option>`).join('');
    return `<tr>
      <td style="font-size:13px">${esc(c.name)}</td>
      <td><select class="notif-cam-override" data-cam="${esc(c.id)}" style="width:auto;font-size:12px;padding:3px 6px">${opts}</select></td>
    </tr>`;
  }).join('');

  const labelsVal = Array.isArray(def.object_labels) ? def.object_labels.join(', ') : (def.object_labels || '');

  return `
    <div class="rp-section-head" style="margin-bottom:8px">
      <div class="policy-section-title" style="margin-bottom:0">Notification options</div>
      <button class="primary sm" onclick="notifSaveRules()">Save options</button>
    </div>
    <div class="card-hint" style="margin-bottom:10px">
      When and what fires across ALL destinations. Per-camera rows below let you override
      individual cameras.
    </div>

    <div class="grid2" style="gap:8px 16px">
      <div>
        <label class="field-label" style="margin-top:0">Default presence mode ${infoHint('Presence comes from the mobile app or a webhook. Until one is configured the server treats presence as "away".')}</label>
        <select id="notif-presence">${presenceOpts}</select>
        <div class="card-hint" style="margin-top:4px">Until a presence source is set up, the server treats this device as "away".</div>
      </div>
      <div>
        <label class="field-label" style="margin-top:0">Cooldown (seconds) ${infoHint('Minimum gap between notifications for the same camera. Default 90 s.')}</label>
        <input id="notif-cooldown" type="number" min="0" value="${def.cooldown_secs != null ? def.cooldown_secs : 90}" placeholder="90" />
      </div>
    </div>

    <div class="policy-section" style="margin-top:10px">
      <div class="policy-section-title">Triggers</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        <label class="chk">
          <input type="checkbox" id="notif-motion" ${def.notify_motion!==false?'checked':''} />
          Notify on motion
        </label>
        <label class="chk">
          <input type="checkbox" id="notif-detection" ${def.notify_detection!==false?'checked':''} />
          Notify on object detections
        </label>
        <div>
          <label class="field-label" style="margin-top:6px">Object labels (comma-separated; empty = any) ${infoHint('e.g. "person, car", only notify when Frigate fires one of these labels. Leave blank for all objects.')}</label>
          <input id="notif-labels" placeholder="person, car, dog" value="${esc(labelsVal)}" />
        </div>
        <div>
          <label class="field-label" style="margin-top:0">Min detection score (0–1) ${infoHint('Ignore detections below this confidence. Leave blank to use the Frigate integration setting.')}</label>
          <input id="notif-minscore" type="number" min="0" max="1" step="0.05"
                 value="${def.min_score != null ? def.min_score : ''}" placeholder="(use Frigate setting)" />
        </div>
      </div>
    </div>

    <div class="policy-section" style="margin-top:10px">
      <div class="policy-section-title">Quiet hours ${infoHint('Both hours are inclusive (0–23 wall-clock). Leave blank to disable quiet hours.')}</div>
      <div class="grid2" style="gap:6px 14px;margin-top:4px">
        <div>
          <label class="field-label" style="margin-top:0">Start hour (0–23)</label>

        </div>
        <div>
          <label class="field-label" style="margin-top:0">End hour (0–23)</label>
          <input id="notif-quiet-end" type="number" min="0" max="23" placeholder="7"
                 value="${def.quiet_end_hour != null ? def.quiet_end_hour : ''}" />
        </div>

    ${CAMS.length ? `

      <div class="table-wrap">
        <table>
          <thead><tr><th>Camera</th><th style="width:130px">Mode</th></tr></thead>
          <tbody>${camOverrideRows}</tbody>
        </table>
      </div>
    </div>` : ''}`;
}

/* ── Open / close the Configure panel ── */
function notifOpenConfigure(id) {
  /* If already open, toggle it closed. */
  if (NOTIF_OPEN_CH === id) { notifCloseConfigure(id); return; }

  /* If a different panel was open, close it first (re-render its row to "Configure"). */
  if (NOTIF_OPEN_CH !== null) {
    const prev = NOTIF_OPEN_CH;
    NOTIF_OPEN_CH = null;
    if (prev === '__new__') {
      const el = $('notif-cfg-__new__');
      if (el) { el.innerHTML = ''; el.classList.add('hidden'); }
    } else {
      const row = $('notif-ch-row-' + prev);
      if (row) {
        const cfgEl = $('notif-cfg-' + prev);
        if (cfgEl) { cfgEl.innerHTML = ''; cfgEl.classList.add('hidden'); }
        const btn = row.querySelector('button.ghost.xs');
        if (btn && btn.textContent === 'Close') btn.textContent = 'Configure';
      }
    }
  }

  NOTIF_OPEN_CH = id;

  if (id === '__new__') {
    /* Sync the kind from the dropdown before rendering. */
    const kdEl = $('notif-new-kind');
    if (kdEl) NOTIF_NEW_KIND = kdEl.value;
    const el = $('notif-cfg-__new__');
    if (el) { el.innerHTML = _renderConfigureForm(null); el.classList.remove('hidden'); }
  } else {
    const ch = NOTIF_CHANNELS.find(x => x.id === id);
    if (!ch) return;
    const el = $('notif-cfg-' + id);
    if (el) { el.innerHTML = _renderConfigureForm(ch); el.classList.remove('hidden'); }
    /* Flip the button label */
    const row = $('notif-ch-row-' + id);
    if (row) {
      const btn = row.querySelector('button.ghost.xs');
      if (btn) btn.textContent = 'Close';
    }
  }
}

function notifCloseConfigure(id) {
  NOTIF_OPEN_CH = null;
  if (id === '__new__') {
    const el = $('notif-cfg-__new__');
    if (el) { el.innerHTML = ''; el.classList.add('hidden'); }
  } else {
    const el = $('notif-cfg-' + id);
    if (el) { el.innerHTML = ''; el.classList.add('hidden'); }
    const row = $('notif-ch-row-' + id);
    if (row) {
      const btn = row.querySelector('button.ghost.xs');
      if (btn) btn.textContent = 'Configure';
    }
  }
}

/* ── Read the Configure form into a body object ── */
function _readConfigureForm(kind, isNew) {
  const name = ($('notif-f-name') || {}).value || '';
  if (!name.trim()) throw new Error('Name is required.');

  const fields  = NOTIF_PROVIDER_FIELDS[kind] || [];
  const config  = {};
  let   anyNew  = false;
  for (const f of fields) {
    const el = $(`notif-f-${kind}-${f.id}`);
    const v  = el ? el.value : '';
    if (v) { config[f.id] = v; anyNew = true; }
  }

  const camEls  = document.querySelectorAll('.notif-cam-chk:checked');
  const camera_ids = [...camEls].map(e => e.value);

  return {
    name:             name.trim(),
    kind,
    camera_ids,
    include_snapshot: !!($('notif-f-snapshot') || {}).checked,
    enabled:          !!($('notif-f-enabled')  || {}).checked,
    global:           !!($('notif-f-global')   || {}).checked,
    _config:          config,
    _anyNewSecrets:   anyNew,
  };
}

/* ── Save new channel ── */
async function notifSaveNew() {
  const msgEl = $('notif-form-msg-__new__');
  if (msgEl) msgEl.textContent = '';
  let body;
  try { body = _readConfigureForm(NOTIF_NEW_KIND, true); }
  catch (e) { if (msgEl) { msgEl.textContent = e.message; msgEl.style.color='var(--danger)'; } return; }

  const payload = {
    kind:             body.kind,
    name:             body.name,
    config:           body._config,
    camera_ids:       body.camera_ids,
    include_snapshot: body.include_snapshot,
    enabled:          body.enabled,
    global:           body.global,
  };

  try {
    const created = await api('/notifications/channels', { method: 'POST', body: JSON.stringify(payload) });
    toast(`Destination "${body.name}" added.`);
    NOTIF_CHANNELS = await api('/notifications/channels').catch(() => NOTIF_CHANNELS);
    NOTIF_OPEN_CH = null;
    _renderNotificationsPane();
  } catch (e) {
    if (msgEl) { msgEl.textContent = e.message; msgEl.style.color='var(--danger)'; }
  }
}

/* ── Save edit of existing channel ── */
async function notifSaveEdit(id) {
  const msgEl = $('notif-form-msg-' + id);
  if (msgEl) msgEl.textContent = '';
  const ch = NOTIF_CHANNELS.find(x => x.id === id);
  if (!ch) return;
  let body;
  try { body = _readConfigureForm(ch.kind, false); }
  catch (e) { if (msgEl) { msgEl.textContent = e.message; msgEl.style.color='var(--danger)'; } return; }

  /* Only include config when the user typed new secret values (masked = keep). */
  const payload = {
    name:             body.name,
    camera_ids:       body.camera_ids,
    include_snapshot: body.include_snapshot,
    enabled:          body.enabled,
    global:           body.global,
  };
  if (body._anyNewSecrets) payload.config = body._config;

  try {
    await api('/notifications/channels/' + encodeURIComponent(id), { method: 'PUT', body: JSON.stringify(payload) });
    toast(`Destination "${body.name}" saved.`);
    NOTIF_CHANNELS = await api('/notifications/channels').catch(() => NOTIF_CHANNELS);
    NOTIF_OPEN_CH = null;
    _renderNotificationsPane();
  } catch (e) {
    if (msgEl) { msgEl.textContent = e.message; msgEl.style.color='var(--danger)'; }
  }
}

/* ── Test channel (inline result next to the Test button) ── */
async function notifTestChannel(id) {
  const btn = $('notif-test-btn-' + id);
  if (!btn) return;
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = 'Testing…';
  try {
    const r = await api('/notifications/channels/' + encodeURIComponent(id) + '/test', { method: 'POST' });
    btn.textContent = r.ok ? 'OK' : 'Failed';
    btn.style.color = r.ok ? 'var(--ok)' : 'var(--danger)';
    if (!r.ok && r.error) toast('Test failed: ' + r.error, 'err', 5000);
  } catch (e) {
    btn.textContent = 'Error';
    btn.style.color = 'var(--danger)';
    toast('Test error: ' + e.message, 'err', 5000);
  } finally {
    setTimeout(() => { if (btn) { btn.textContent = orig; btn.style.color=''; btn.disabled=false; } }, 3500);
  }
}

/* ── Remove channel (confirm) ── */
async function notifRemoveChannel(id) {
  const ch = NOTIF_CHANNELS.find(x => x.id === id);
  const name = ch ? ch.name : id;
  if (!confirm(`Remove destination "${name}"?`)) return;
  try {
    await api('/notifications/channels/' + encodeURIComponent(id), { method: 'DELETE' });
    toast(`Removed "${name}".`);
    NOTIF_CHANNELS = NOTIF_CHANNELS.filter(x => x.id !== id);
    if (NOTIF_OPEN_CH === id) NOTIF_OPEN_CH = null;
    _renderNotificationsPane();
  } catch (e) { toast('Remove failed: ' + e.message, 'err', 5000); }
}

/* ── Save notification options (default rule + per-camera overrides) ── */
async function notifSaveRules() {
  setMsg('notif-rules-msg', '');

  /* Default rule */
  const labelsRaw = ($('notif-labels') || {}).value || '';
  const labels = labelsRaw.split(',').map(s => s.trim()).filter(Boolean);
  const quietStart = ($('notif-quiet-start') || {}).value;
  const quietEnd   = ($('notif-quiet-end')   || {}).value;
  const cooldown   = ($('notif-cooldown')     || {}).value;
  const minScore   = ($('notif-minscore')     || {}).value;

  const defaultBody = {
    presence_mode:      $('notif-presence') ? $('notif-presence').value : 'always',
    notify_motion:      !!($('notif-motion')    || {}).checked,
    notify_detection:   !!($('notif-detection') || {}).checked,
    object_labels:      labels,
    cooldown_secs:      cooldown   !== '' ? parseInt(cooldown, 10)   : null,
    min_score:          minScore   !== '' ? parseFloat(minScore)      : null,
    quiet_start_hour:   quietStart !== '' ? parseInt(quietStart, 10)  : null,
    quiet_end_hour:     quietEnd   !== '' ? parseInt(quietEnd,   10)  : null,
  };

  /* Per-camera overrides, only write rows that differ from "default" */
  const overrideEls = document.querySelectorAll('.notif-cam-override');
  const overrideCalls = [];
  overrideEls.forEach(sel => {
    const camId = sel.dataset.cam;
    const mode  = sel.value;
    if (mode !== 'default') {
      overrideCalls.push(
        api('/notifications/rules/' + encodeURIComponent(camId), {
          method: 'PUT',
          body: JSON.stringify({ presence_mode: mode }),
        })
      );
    } else {
      /* If set back to "default", delete the override so it doesn't persist. */
      overrideCalls.push(
        api('/notifications/rules/' + encodeURIComponent(camId), { method: 'DELETE' }).catch(() => {})
      );
    }
  });

  try {
    await api('/notifications/rules', { method: 'PUT', body: JSON.stringify(defaultBody) });
    await Promise.all(overrideCalls);
    toast('Notification options saved.');
    NOTIF_RULES = await api('/notifications/rules').catch(() => NOTIF_RULES);
    /* Re-render just the rules section to reflect updated defaults */
    const sec = $('notif-rules-section');
    if (sec) sec.innerHTML = _renderRulesSection();
  } catch (e) { setMsg('notif-rules-msg', e.message, 'err'); }
}
