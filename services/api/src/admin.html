/* ═══════════════════════════════════════════════════════════════════════════
   BOTTOM PANE, singular. Camera → last snapshot; else context summary.
═══════════════════════════════════════════════════════════════════════════ */
/* Bottom pane is DISABLED (the maintainer 2026-06-22): unused; hidden to reclaim the
   vertical space. Flip BOTTOM_PANE_ENABLED back to true to restore it, the
   renderBottom/renderSnapshot code below is intentionally kept intact. */
const BOTTOM_PANE_ENABLED = false;
function renderBottom() {
  const el = $('bottom-pane');
  if (!el) return;
  if (!BOTTOM_PANE_ENABLED) { el.style.display = 'none'; el.innerHTML = ''; return; }
  el.style.display = '';
  if (selKind === 'camera') {
    const c = CAMS.find(x => x.id === selId);
    if (c) return renderSnapshot(c);
  }
  // Non-camera context summaries.
  let txt = 'Select an item from the tree to manage it.';
  if (selKind === 'profile') {
    const p = profileById(selId);
    if (p) { const n = camCountForProfile(p.id, !!p.is_default); txt = `Recording profile "${p.name||'Default'}", ${p.mode==='motion'?'motion-triggered':'continuous'}, keep ${fmtDur(p.live_retention_hours)} live · ${n} camera${n!==1?'s':''} effectively use it.`; }
    else txt = 'New recording profile.';
  } else if (selKind === 'storage' || selKind === 'storage-root') {
    const s = STORAGES.find(x => x.id === selId);
    if (s) txt = `Storage "${s.name}", ${s.path}${(s.total_bytes||s.fs_total_bytes)?' · '+fmtBytes((s.total_bytes||s.fs_total_bytes)-(s.free_bytes||0))+' used of '+fmtBytes(s.total_bytes||s.fs_total_bytes):''}.`;
    else txt = 'Add a new storage location.';
  } else if (selKind === 'user') {
    const u = USERS.find(x => x.id === selId);
    if (u) txt = `User "${u.username}", ${u.role==='admin'?'Administrator (full access)':'Viewer (playback only)'}.`;
    else txt = 'New user.';
  } else if (selKind === 'cameras-root') {
    txt = `${CAMS.length} cameras · ${CAMS.filter(c=>c.enabled).length} recording · ${GROUPS.length} group${GROUPS.length!==1?'s':''}.`;
  } else if (selKind === 'add-camera') {
    txt = 'Adding cameras, scan the network to find them, or paste an RTSP URL manually.';
  }
  el.innerHTML = `<div class="bottom-context">${esc(txt)}</div>`;
}

/* Camera snapshot via the existing authed frame-proxy endpoint (token in query
   so a plain <img> can load it). Captioned + easy to extend later. */
function renderSnapshot(c) {
  const el = $('bottom-pane');
  const eff = effectivePolicy(c);
  const pol = (eff.policy && (eff.policy.name || 'Default')) || 'Default';
  const grp = groupName(c.id);
  const cap = `<div class="snap-caption">
      <div class="sc-title">${esc(c.name)} <span class="status-dot ${c.enabled?'recording':''}" style="margin-left:4px"></span></div>
      <div>${c.enabled?'Recording':'Disabled'} · ${grp?esc(grp)+' group':'Ungrouped'}</div>
      <div>Profile: ${esc(pol)} (${eff.via==='own'?'direct':eff.via==='group'?'via group':eff.via==='custom'?'custom':'default'})</div>
      <div style="color:var(--dim2);margin-top:4px">Last live snapshot</div>
    </div>`;
  if (!c.enabled) {
    el.innerHTML = `<div class="snap-wrap">
      <div class="snap-img-box"><div class="snap-placeholder">Camera disabled —<br>no live snapshot</div></div>
      ${cap}</div>`;
    return;
  }
  // Scoped media token in the query (not the full JWT), audit 2026-07-05 #2.
  // The <img> starts src-less; set it once the per-camera token is minted (and
  // cache-bust with &t= so re-selecting refreshes the still).
  el.innerHTML = `<div class="snap-wrap">
    <div class="snap-img-box">
      <img id="snap-live-img" alt="snapshot"
           onerror="this.style.display='none';this.parentElement.innerHTML='<div class=&quot;snap-placeholder&quot;>Snapshot unavailable<br>(stream warming up)</div>'" />
    </div>
    ${cap}</div>`;
  snapshotUrl(c.id)
    .then(url => { const img = $('snap-live-img'); if (img) img.src = url; })
    .catch(() => {
      const box = document.querySelector('#bottom-pane .snap-img-box');
      if (box) box.innerHTML = '<div class="snap-placeholder">Snapshot unavailable</div>';
    });
}

/* ── Boot ── */
// SSO from an embedding host (the Crumb Client). The host loads
//   /admin#token=<jwt>&embed=1
// so the operator who's already signed into the desktop doesn't re-authenticate
// here. Adopt the token, persist it like a normal login, then SCRUB the hash so
// the credential never lingers in the address bar or history. embed=1 also drops
// our own topbar/sign-out (the host owns that chrome).
(function bootSSO() {
  const h = location.hash || '';
  // Route hashes (#/section/…) belong to the in-app router, leave them alone.
  // Only a key=value fragment (the host's #token=…&embed=1 handshake) is parsed
  // here, and only THAT fragment is scrubbed, so deep links keep working while
  // the credential still never lingers in the address bar or history.
  if (h.length > 1 && !h.startsWith('#/')) {
    const p = new URLSearchParams(h.slice(1));
    const t = p.get('token');
    if (t) { TOKEN = t; localStorage.setItem('crumb_admin_token', TOKEN); }
    if (p.get('embed') === '1') document.body.classList.add('embedded');
    if (t || p.has('embed')) {
      try { history.replaceState(null, '', location.pathname + location.search); }
      catch { location.hash = ''; }
    }
  }
})();
$('lg-pass') && $('lg-pass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
$('bootstrap-pass2') && $('bootstrap-pass2').addEventListener('keydown', e => { if (e.key === 'Enter') bootstrapAdmin(); });

/* Boot: probe setup-status (unauthenticated). No admin yet → the setup wizard
   (first step creates the admin). A saved token → enter the app, or resume the
   wizard if first-run setup was never finished. Otherwise show the login; a
   successful login resumes the wizard too when setup is incomplete. */
(async function boot() {
  let status = null;
  try { status = await fetch('/auth/setup-status').then(res => res.ok ? res.json() : null); } catch (_) { /* fall through */ }
  if (status && status.needs_bootstrap) { openWizard(status); return; }
  if (TOKEN) {
    if (status && !status.setup_complete) { openWizard(status); return; }
    enterApp(); return;
  }
  $('login-screen').classList.remove('hidden');
})();
