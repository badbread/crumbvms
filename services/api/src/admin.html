/* Renders the status line + "Check now" button. `force` = true bypasses the
   server's 6h cache (subject to its own 60s "Check now" backoff). Empty when
   the check is disabled — there is nothing to show, and no request is made. */
async function renderUpdateStatus(force) {
  const el = $('srv-upd-status');
  if (!el) return;
  const chk = $('srv-upd-enabled');
  if (!chk || !chk.checked) { el.innerHTML = ''; return; }
  el.innerHTML = '<span style="color:var(--dim)">Checking…</span>';
  let data;
  try {
    data = await api('/updates/latest' + (force ? '?refresh=1' : ''));
  } catch (e) {
    el.innerHTML = `<span class="form-msg err">Couldn't check: ${esc(String(e.message || e))}</span>`;
    return;
  }
  if (!data.enabled) { el.innerHTML = ''; return; }
  const checkedTxt = data.checked_at ? new Date(data.checked_at).toLocaleString() : null;
  let statusHtml;
  if (data.server_update_available) {
    statusHtml = `<span style="color:var(--warn)">Server v${esc(data.latest_version)} is available</span> — ` +
      `<a href="${esc(data.notes_url)}" target="_blank" rel="noopener">release notes</a>. ` +
      `Upgrade: pin <code>CRUMB_VERSION</code>, then <code>docker compose pull &amp;&amp; docker compose up -d</code> (docs/IMAGES.md).`;
  } else if (data.latest_version) {
    statusHtml = `<span style="color:var(--ok)">Up to date</span> (v${esc(data.server_version || '?')})` +
      (checkedTxt ? `, checked ${esc(checkedTxt)}` : '');
  } else {
    statusHtml = `<span style="color:var(--dim)">Checked — no data yet (github.com unreachable)</span>`;
  }
  el.innerHTML = `<div>${statusHtml}</div><button class="ghost" style="margin-top:6px" onclick="checkForUpdatesNow()">Check now</button>`;
}
function checkForUpdatesNow() {
  renderUpdateStatus(true);
}

/* ── Scrub-preview pre-generation tunables (issue #10) ──
   Five THUMB_PREGEN_ and THUMB_CACHE_ knobs, admin-console override with env
   fallback (server_settings, DB wins, NULL -> env; see scrub_settings.rs).
   Live-reload: both the pre-gen worker and the thumbnail cache sweeper
   re-resolve every cycle, so a save here takes effect without a restart.
   pregen_width stays env-only (D1) -- shown read-only, no PUT for it.
   Each PUT writes ONLY the one field being edited (house rule). */
const SCRUB_BYTES_PER_GIB = 1024 * 1024 * 1024;
const SCRUB_SECS_PER_DAY = 86400;

function scrubSourceNote(source) {
  return source === 'db' ? '' : ' <span style="color:var(--dim)">(env default)</span>';
}

async function loadScrubPreview() {
  const chk = $('srv-pregen-enabled');
  const wrap = $('srv-pregen-wrap');
  const msg = $('srv-pregen-msg');
  const knobs = $('srv-pregen-knobs');
  if (!chk) return;
  let data;
  try {
    data = await api('/config/scrub-preview');
  } catch (e) {
    if (msg) msg.textContent = 'Could not load: ' + (e.message || e);
    return;
  }
  SCRUB_PREVIEW = data;
  chk.checked = !!data.pregen_enabled.value;
  if (wrap) wrap.style.opacity = '1';
  if (msg) msg.textContent = '';

  const gib = (data.cache_max_bytes.value / SCRUB_BYTES_PER_GIB);
  const minGib = (data.cache_max_bytes.min / SCRUB_BYTES_PER_GIB);
  const days = (data.cache_ttl_seconds.value / SCRUB_SECS_PER_DAY);
  const minDays = (data.cache_ttl_seconds.min / SCRUB_SECS_PER_DAY);
  const maxDays = Math.round(data.cache_ttl_seconds.max / SCRUB_SECS_PER_DAY);

  if (knobs) knobs.innerHTML = `
    <div class="form-grid">
      <label class="fg-label" for="srv-pregen-lookback">Backfill lookback${scrubSourceNote(data.pregen_lookback_hours.source)}</label>
      <div class="fg-ctl"><input id="srv-pregen-lookback" type="number" min="${data.pregen_lookback_hours.min}" max="${data.pregen_lookback_hours.max}" step="1" value="${data.pregen_lookback_hours.value}" class="mono" style="width:80px" onchange="saveScrubPregenField('pregen_lookback_hours', parseInt(this.value,10))"> hours <span style="color:var(--dim2)">(0–${data.pregen_lookback_hours.max}, default 2)</span></div>
      <label class="fg-label" for="srv-pregen-scan">Scan interval ${infoHint('How often the worker wakes to generate thumbnails for newly-recorded footage. Advanced.')}${scrubSourceNote(data.pregen_scan_secs.source)}</label>
      <div class="fg-ctl"><input id="srv-pregen-scan" type="number" min="${data.pregen_scan_secs.min}" max="${data.pregen_scan_secs.max}" step="1" value="${data.pregen_scan_secs.value}" class="mono" style="width:80px" onchange="saveScrubPregenField('pregen_scan_secs', parseInt(this.value,10))"> seconds <span style="color:var(--dim2)">(${data.pregen_scan_secs.min}–${data.pregen_scan_secs.max}, default 60)</span></div>
      <label class="fg-label" for="srv-pregen-cache-gib">Cache budget${scrubSourceNote(data.cache_max_bytes.source)}</label>
      <div class="fg-ctl"><input id="srv-pregen-cache-gib" type="number" min="${minGib}" step="0.1" value="${gib.toFixed(2)}" class="mono" style="width:90px" onchange="saveScrubPregenBytes(this.value)"> GiB <span style="color:var(--dim2)">(min ${minGib.toFixed(2)} GiB)</span></div>
      <label class="fg-label" for="srv-pregen-ttl-days">Cache max age${scrubSourceNote(data.cache_ttl_seconds.source)}</label>
      <div class="fg-ctl"><input id="srv-pregen-ttl-days" type="number" min="${minDays.toFixed(3)}" max="${maxDays}" step="0.1" value="${days.toFixed(2)}" class="mono" style="width:90px" onchange="saveScrubPregenTtl(this.value)"> days <span style="color:var(--dim2)">(min ~1 hour, max ${maxDays}d)</span></div>
      <label class="fg-label">Pre-gen width</label>
      <div class="fg-ctl mono">${esc(String(data.pregen_width.value))} px <span style="color:var(--dim2)">(env-only, THUMB_PREGEN_WIDTH -- must match the clients' scrub width or pre-generated previews go unused)</span></div>
    </div>`;
}

async function saveScrubPregenEnabled(enabled) {
  const msg = $('srv-pregen-msg');
  try {
    await api('/config/scrub-preview', { method: 'PUT', body: JSON.stringify({ pregen_enabled: !!enabled }) });
    if (msg) { msg.style.color = 'var(--ok)'; msg.textContent = enabled ? 'Scrub pre-generation enabled.' : 'Scrub pre-generation disabled.'; setTimeout(() => { if (msg) msg.textContent = ''; }, 3000); }
    loadScrubPreview();
  } catch (e) {
    if (msg) { msg.style.color = 'var(--danger)'; msg.textContent = 'Save failed: ' + (e.message || e); }
    /* Revert the checkbox to the last-known server state on failure. */
    loadScrubPreview();
  }
}

async function saveScrubPregenField(field, value) {
  if (!Number.isFinite(value)) { loadScrubPreview(); return; }
  try {
    await api('/config/scrub-preview', { method: 'PUT', body: JSON.stringify({ [field]: value }) });
    toast('Saved.');
    loadScrubPreview();
  } catch (e) {
    toast('Save failed: ' + (e.message || e));
    loadScrubPreview();
  }
}

async function saveScrubPregenBytes(gibStr) {
  const gib = parseFloat(gibStr);
  if (!Number.isFinite(gib)) { loadScrubPreview(); return; }
  const bytes = Math.round(gib * SCRUB_BYTES_PER_GIB);
  try {
    await api('/config/scrub-preview', { method: 'PUT', body: JSON.stringify({ cache_max_bytes: bytes }) });
    toast('Cache budget saved.');
    loadScrubPreview();
  } catch (e) {
    toast('Save failed: ' + (e.message || e));
    loadScrubPreview();
  }
}

async function saveScrubPregenTtl(daysStr) {
  const days = parseFloat(daysStr);
  if (!Number.isFinite(days)) { loadScrubPreview(); return; }
  const secs = Math.round(days * SCRUB_SECS_PER_DAY);
  try {
    await api('/config/scrub-preview', { method: 'PUT', body: JSON.stringify({ cache_ttl_seconds: secs }) });
    toast('Cache max age saved.');
    loadScrubPreview();
  } catch (e) {
    toast('Save failed: ' + (e.message || e));
    loadScrubPreview();
  }
}

/* ── Camera tab 3: Storage & group ──
   Phase 3, camera GROUPS are AUTHORITATIVE. A camera in a group ALWAYS uses
   the group's assigned profile; it cannot hold a per-camera policy/storage
   override while grouped. So the tab branches:
     • GROUPED   → read-only "Controlled by the <group> group → <profile> profile"
                   summary + Edit-group + Ungroup-to-customize. NO override path.
     • UNGROUPED → the inherit / named-profile / custom radios (per-camera
                   overrides are allowed only when ungrouped). */
function renderCamStorageTab(c) {
  const grp = groupOfCamera(c.id);
  if (grp) return renderCamStorageGrouped(c, grp);
  return renderCamStorageUngrouped(c);
}

/* GROUPED: authoritative, read-only. The group's profile governs; the only ways
   to differ are editing the group's profile or ungrouping the camera. */
function renderCamStorageGrouped(c, grp) {
  // Resolve the group's effective profile exactly as effectivePolicy's group leg:
  // the group's assigned policy, else the global Default.
  const gp = grp.policy_id
    ? profileById(grp.policy_id)
    : (DEFAULT_POLICY || allProfiles().find(p => p.is_default) || null);
  const profName = gp ? (gp.name || 'Default') : 'Default';
  const summary = gp ? bannerHTMLForGroup(gp, !grp.policy_id) : '';
  $('cam-tab-body').innerHTML = `
    <div class="policy-section" style="margin-top:0">
      <div class="policy-section-title">Controlled by group</div>
      <div class="opt-sub" style="margin-bottom:10px">
        This camera is in the <strong>${esc(grp.name)}</strong> group, so it always uses the
        <strong>${esc(profName)}</strong> policy. A direct per-camera policy is only available for
        ungrouped cameras, edit the group's policy to change all its cameras at once, or
        ungroup this camera to give it its own.
      </div>
      ${summary}
      <div class="inherit-banner-actions" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="ghost sm" onclick="select('group','${grp.id}')">Edit group "${esc(grp.name)}"</button>
        <button class="ghost sm" onclick="ceUngroup('${c.id}')">Ungroup to customize</button>
      </div>
    </div>`;
}

/* UNGROUPED: ONE assignment model (group → policy), with the direct camera→policy
   pin tucked inside a collapsed "exception" section. The old 3-way radio (inherit
   / named-profile directly / custom copy-on-write fork) is GONE (S1): there is no
   "custom" mode any more, and the anonymous fork is no longer creatable from the
   UI, its replacement is "Save current settings as a new policy…", which POSTs a
   NAMED policy (pre-filled from the effective one) and pins it, so every policy
   stays visible in Recording (§5c / §6).

   `assignMode` is now just 'inherit' (follow group / Default) or 'profile' (a
   direct pin), used only to seed which control is shown, not a radio group. */
function renderCamStorageUngrouped(c) {
  const grp = groupOfCamera(c.id); // null on this path, kept for parity with banner code
  const pinned = !!c.policy_id;    // a direct camera→policy pin is in force

  const groupOpts = `<option value="">Ungrouped (uses Default policy)</option>` +
    (GROUPS||[]).map(g => {
      const gp = g.policy_id ? profileById(g.policy_id) : null;
      const lbl = gp ? `${g.name} → ${gp.name}` : `${g.name} → Default`;
      return `<option value="${g.id}" ${grp && grp.id===g.id ? 'selected':''}>${esc(lbl)}</option>`;
    }).join('') +
    `<option value="__new__">+ New group…</option>`;

  const profileOpts = allProfiles().map(p =>
    `<option value="${p.id}" ${c.policy_id===p.id?'selected':''}>${esc(profileSelectLabel(p))}</option>`).join('');

  // The exception section starts OPEN when a direct pin is already in force (so the
  // operator can see/change it); otherwise collapsed (the recommended path).
  $('cam-tab-body').innerHTML = `
    <div id="ce-inherit-banner"></div>

    <div class="policy-section" style="margin-top:0">
      <div class="policy-section-title">Recording policy</div>
      <div class="card-hint" style="margin:-2px 0 12px 2px">A <b>camera group</b> is the usual way to choose how a camera records, put it in a group, the group picks the policy. Ungrouped cameras follow the <b>Default</b> policy.</div>
      <div class="form-grid">
        <label class="fg-label" for="ce-group">Group ${infoHint('When a camera joins a group, the group\'s policy takes over, any direct per-camera pin is cleared.')}</label>
        <div class="fg-ctl"><select id="ce-group" onchange="ceGroupChanged()" style="font-size:13px;max-width:420px">${groupOpts}</select></div>
        <div class="fg-full"><div class="opt-sub" id="ce-inherit-sub"></div></div>
      </div>

      <details class="detail-section" id="ce-exception" ${pinned?'open':''} style="margin-top:14px">
        <summary>
          <span class="ds-chev">&#x25B6;</span>
          <span class="ds-title">This camera doesn't follow its group</span>
          <span class="ds-glance">${pinned?'A specific policy is pinned':'Advanced, pin a specific policy'}</span>
        </summary>
        <div class="ds-body">
          <div class="card-hint" style="margin:0 0 10px 2px">The exception: pin one specific policy to <b>this camera only</b>, or capture the effective settings as a new named policy. Prefer a group for anything you might configure in bulk later.</div>
          <label class="chk" style="margin-bottom:10px"><input type="checkbox" id="ce-pin-enable" ${pinned?'checked':''} onchange="cePinToggle()" /> Pin a specific policy to this camera</label>
          <div id="ce-pin-wrap" class="${pinned?'':'hidden'}">
            <div class="form-grid">
              <label class="fg-label" for="ce-profile">Policy</label>
              <div class="fg-ctl"><select id="ce-profile" onchange="ceAssignPreview()" style="font-size:13px;max-width:420px">${profileOpts}</select></div>
            </div>
          </div>
          <div style="margin-top:12px">
            <button class="ghost sm" onclick="ceSaveAsNewPolicy()">Save current settings as a new policy…</button>
            <div class="card-hint" style="margin-top:4px">Creates a named copy of this camera's effective policy in <b>Recording</b> and pins it here.</div>
          </div>
          <div id="ce-assign-msg" class="form-msg"></div>
        </div>
      </details>
    </div>`;

  ceAssignChanged();
}

/* Human label + one-line description for each pixel motion algorithm. */
function motionAlgoLabel(a) {
  return ({
    census: 'Census (default, illumination-invariant)',
    framediff: 'Frame difference (most sensitive)',
    mog2: 'MOG2 (multimodal background)',
    opticalflow: 'Optical flow (true movement)',
    ensemble: 'Ensemble (Census + MOG2)',
  })[a] || a;
}
function motionAlgoHelp(a) {
  return ({
    census: 'Compares local texture, not brightness, ignores sun/shade and lighting changes. Best all-round default.',
    framediff: 'Classic frame-to-frame difference. Catches everything but also trips on lighting changes.',
    mog2: 'Learns multiple background appearances per pixel, good for swaying trees / flickering signs.',
    opticalflow: 'Fires only where image content actually moves, ignores in-place flicker and global brightness shifts.',
    ensemble: 'Census plus MOG2 in flat regions, with a lighting veto. Most robust; ~2–3× the CPU.',
  })[a] || '';
}

/* Toggle the algorithm picker: hidden + "managed by Frigate" when the source is
   Frigate; otherwise show the picker and its per-algorithm help text. */
function ceMotionSourceChanged() {
  // The pixel ALGORITHM block is only relevant when the pixel source is enabled.
  const pixel = $('ce-motion-pixel') ? $('ce-motion-pixel').checked : true;
  const wrap = $('ce-motion-algo-wrap');
  const help = $('ce-motion-algo-help');
  if (wrap) wrap.classList.toggle('hidden', !pixel);
  if (help) {
    help.innerHTML = pixel
      ? motionAlgoHelp($('ce-motion-algorithm') ? $('ce-motion-algorithm').value : 'census')
      : 'Pixel analysis is off; enable it above to choose a detector. Frigate and Home Assistant sources need no local algorithm.';
  }
  // Reflect the (possibly just-changed) picker in the "currently loaded" infobox.
  const c = CAMS.find(x => x.id === selId);
  if (c) ceRenderDetectorBox(c);
}

function profileSelectLabel(p) {
  const bits = [fmtDur(p.live_retention_hours), p.mode === 'motion' ? 'Motion' : 'Continuous'];
  if (p.archive_enabled) bits.push('Archive ' + fmtDur(p.archive_retention_hours));
  return `${p.name || 'Default'} (${bits.join(' / ')})`;
}

function ceGroupChanged() {
  const sel = $('ce-group');
  if (sel.value === '__new__') {
    const name = prompt('Name for the new group:');
    if (name && name.trim()) {
      api('/config/groups', { method: 'POST', body: JSON.stringify({ name: name.trim() }) })
        .then(async () => { await ensureGroups(); toast('Group created.'); renderTree(); renderCamera(selId); })
        .catch(e => toast(e.message, 'err'));
    } else { sel.value = ''; }
  }
  ceAssignChanged();
}

/* Assignment "mode" is derived, not radio-selected: a pinned policy (the
   exception) → 'profile'; otherwise 'inherit' (follow group / Default). */
function ceCurrentMode() {
  const pin = $('ce-pin-enable');
  return (pin && pin.checked) ? 'profile' : 'inherit';
}
function ceAssignChanged() {
  const mode = ceCurrentMode();
  const gsel = $('ce-group');
  const gid = gsel ? gsel.value : '';
  const grp = gid && gid !== '__new__' ? (GROUPS||[]).find(g => g.id === gid) : null;
  const gp = grp && grp.policy_id ? profileById(grp.policy_id) : null;
  if ($('ce-inherit-sub')) $('ce-inherit-sub').textContent = grp
    ? `Currently: ${grp.name} (would use the ${gp ? gp.name : 'Default'} policy)`
    : 'Currently: Ungrouped (would follow the Default policy)';
  renderCeBanner(mode);
}
function ceAssignPreview() { renderCeBanner('profile'); }
/* Show/hide the direct-pin policy picker as its checkbox toggles. */
function cePinToggle() {
  const on = $('ce-pin-enable') && $('ce-pin-enable').checked;
  if ($('ce-pin-wrap')) $('ce-pin-wrap').classList.toggle('hidden', !on);
  ceAssignChanged();
}

function renderCeBanner(mode) {
  const c = CAMS.find(x => x.id === selId); if (!c) return;
  const bannerEl = $('ce-inherit-banner'); if (!bannerEl) return;
  let p, via, srcText, borderCls;
  if (mode === 'profile') {
    p = profileById($('ce-profile') ? $('ce-profile').value : c.policy_id) || c.policy;
    via = 'own'; borderCls = 'own';
    srcText = 'directly assigned to this camera';
  } else {
    const gsel = $('ce-group');
    const gid = gsel ? gsel.value : '';
    const grp = gid && gid !== '__new__' ? (GROUPS||[]).find(g => g.id === gid) : null;
    if (grp && grp.policy_id) { p = profileById(grp.policy_id); via='group'; borderCls=''; srcText = `via the ${grp.name} group`; }
    else { p = DEFAULT_POLICY || profileById((c.policy||{}).id); via='default'; borderCls='default-profile'; srcText = grp ? `via the ${grp.name} group (which uses the Default policy)` : 'using the Default policy (no group assigned)'; }
  }
  if (!p) { bannerEl.innerHTML = ''; return; }
  bannerEl.innerHTML = bannerHTML(p, borderCls, srcText, c.id);
  renderRetentionHint();
}

function bannerHTML(p, borderCls, srcText, camId) {
  const liveName = stName(p.live_storage_id);
  const archName = stName(p.archive_storage_id);
  const hl = (txt, varName) => `<strong style="color:var(--${varName})">${txt}</strong>`;
  const modeHl   = p.mode === 'motion' ? hl('Motion-triggered', 'danger') : hl('Continuous', 'ok');
  const streamHl = hl(p.record_stream === 'sub' ? 'sub' : 'main', 'accent2');
  const liveDurHl = hl(fmtDur(p.live_retention_hours), 'accent');
  const liveStHl  = hl(esc(liveName), 'accent2');
  const capHl     = p.live_max_bytes ? `, up to ${hl(fmtBytes(p.live_max_bytes), 'warn')}` : '';
  const archiveLine = p.archive_enabled
    ? `Archive to ${hl(esc(archName), 'accent2')} for ${hl(fmtDur(p.archive_retention_hours), 'warn')}, <span style="color:var(--dim)">${esc(fmtSchedule(p.archive_schedule).toLowerCase())} Pacific</span>.`
    : `<span style="color:var(--dim2)">No archiving configured.</span>`;
  return `<div class="inherit-banner ${borderCls}">
    <div class="inherit-banner-title">Using "${esc(p.name || 'Default')}" policy</div>
    <div class="inherit-banner-source">${esc(srcText)}</div>
    <div class="inherit-banner-facts">
      ${modeHl} recording on the ${streamHl} stream.<br>
      Keep ${liveDurHl} on ${liveStHl}${capHl}.<br>
      ${archiveLine}
      <span id="ce-retention-hint"></span>
    </div>
    <div class="inherit-banner-actions">
      <button class="ghost sm" onclick="select('profile','${p.id}')">Edit "${esc(p.name || 'Default')}"</button>
    </div>
  </div>`;
}
/* Projected-retention hint, only when this camera's stream was tested this session. */
function renderRetentionHint() {
  const el = $('ce-retention-hint'); if (!el || !selId) return;
  const kbps = CAM_BITRATES[selId];
  const p = (effectivePolicy(CAMS.find(c=>c.id===selId)||{})||{}).policy;
  if (!kbps || !p || !p.live_max_bytes) { el.innerHTML = ''; return; }
  const bytesPerDay = (kbps / 8) * 1000 * 86400;
  const days = p.live_max_bytes / bytesPerDay;
  if (days > 0 && isFinite(days)) {
    el.innerHTML = `<br><span style="color:var(--dim2)">At the tested bitrate, the size cap is roughly ≈ ${days.toFixed(days<10?1:0)} days of footage.</span>`;
  } else el.innerHTML = '';
}
/* "Save current settings as a new policy…" (replaces the anonymous custom fork,
   §5c/D2). Creates a NAMED policy pre-filled from this camera's EFFECTIVE policy,
   then pins it to the camera, so the new policy is visible in Recording and the
   camera clearly follows it. Uses only existing endpoints (POST /config/policies
   + PUT /config/cameras/:id {policy_id}); no schema change. */
async function ceSaveAsNewPolicy() {
  const c = CAMS.find(x => x.id === selId); if (!c) return;
  setMsg('ce-assign-msg', '');
  const eff = effectivePolicy(c);
  const base = (eff && eff.policy) || c.policy || {};
  const suggested = `${c.name} policy`;
  const name = (prompt('Name for the new policy:', suggested) || '').trim();
  if (!name) return;
  // Copy the effective policy's recording-behavior + tier fields into a new named
  // policy. Strip identity/derived fields that must not be carried over.
  const body = Object.assign({}, base, { name });
  ['id','is_default','name_is_null','created_at','updated_at'].forEach(k => { delete body[k]; });
  body.name = name;
  try {
    const created = await api('/config/policies', { method: 'POST', body: JSON.stringify(body) });
    await api('/config/cameras/' + c.id, { method: 'PUT', body: JSON.stringify({ policy_id: created.id }) });
    toast(`Created policy "${name}" and pinned it to ${c.name}.`);
    await ensurePolicies(); await ensureDefaultPolicy(); await ensureCams();
    renderTree();
    renderCamera(c.id);
  } catch (e) { setMsg('ce-assign-msg', e.message, 'err'); toast(e.message, 'err', 5000); }
}

/* Re-detect a camera's streams via its stored ONVIF host/credentials. Server-side
   this re-runs ONVIF GetProfiles/GetStreamUri, updates the camera's source URLs +
   PTZ capability, and reconnects go2rtc. The creds must already be SAVED on the
   camera (the button is disabled until an ONVIF host is stored). */
async function redetectCamera(id) {
  const btn = $('ce-redetect-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Re-detecting…'; }
  setMsg('ce-msg', '');
  try {
    const r = await api('/config/cameras/' + id + '/redetect', { method: 'POST' });
    const ptz = r.ptz_supported ? 'PTZ detected' : 'no PTZ detected';
    const subNote = r.source_sub_url ? ' · sub stream found' : '';
    toast(`Streams re-detected, ${ptz}${subNote}.`);
    await ensureCams();
    renderTree();
    renderCamera(id);
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Re-detect streams'; }
    setMsg('ce-msg', e.message, 'err');
    toast(e.message, 'err', 5000);
  }
}

async function saveCamEdit() {
  setMsg('ce-msg', '');
  const id = selId;
  const c = CAMS.find(x => x.id === id);
  if (!c) return;
  const managed = !!c.source_url;
  try {
    const camBody = {};
    // Info-tab fields are only present when the Info tab DOM is mounted; fall
    // back to the camera's current values so saving from another tab is safe.
    camBody.name = $('ce-name') ? $('ce-name').value.trim() : c.name;
    camBody.enabled = $('ce-enabled') ? $('ce-enabled').checked : c.enabled;
    if (!camBody.name) throw new Error('Camera name is required.');
    // Camera type (console glyph). Only present when the Info tab DOM is mounted.
    if ($('ce-type')) camBody.camera_type = $('ce-type').value;
    // Icon override: '' → null (clear → derive from type); else the pinned glyph.
    if ($('ce-icon')) camBody.icon = $('ce-icon').value || null;
    // Stream ownership + Frigate mapping (Info tab). Empty Frigate name → null (clear).
    if ($('ce-served-by')) camBody.served_by = $('ce-served-by').value;
    if ($('ce-source-camera-name')) camBody.source_camera_name = $('ce-source-camera-name').value.trim() || null;
    // ONVIF creds (Info tab). Host/user/port: empty → null (clear). Password is
    // write-only: send ONLY when non-empty (blank keeps the stored password).
    if ($('ce-onvif-host')) camBody.onvif_host = $('ce-onvif-host').value.trim() || null;
    if ($('ce-onvif-user')) camBody.onvif_user = $('ce-onvif-user').value.trim() || null;
    if ($('ce-onvif-port')) { const pv = $('ce-onvif-port').value.trim(); camBody.onvif_port = pv === '' ? null : Number(pv); }
    if ($('ce-onvif-pass') && $('ce-onvif-pass').value) camBody.onvif_password = $('ce-onvif-pass').value;
    // PTZ-controls toggle (Info tab). Only present when the Info tab DOM is mounted.
    if ($('ce-ptz-enabled')) camBody.ptz_control_enabled = $('ce-ptz-enabled').checked;
    if ($('ce-src')) {
      const src = $('ce-src').value.trim();
      const sub = $('ce-src-sub').value.trim() || null;
      if (!src) throw new Error('Main stream URL is required.');
      if (managed) { camBody.source_url = src; camBody.source_sub_url = sub; }
      else         { camBody.main_url   = src; camBody.sub_url        = sub; }
    }
    // Additive motion sources + (pixel) algorithm (Motion tab).
    if ($('ce-motion-pixel')) camBody.motion_pixel_enabled = $('ce-motion-pixel').checked;
    if ($('ce-motion-frigate')) camBody.motion_frigate_enabled = $('ce-motion-frigate').checked;
    if ($('ce-motion-ha')) camBody.motion_ha_enabled = $('ce-motion-ha').checked;
    if ($('ce-motion-algorithm')) camBody.motion_algorithm = $('ce-motion-algorithm').value;

    // Phase 3: a grouped camera is AUTHORITATIVELY governed by its group's
    // profile and may NOT acquire a direct per-camera policy/override. The
    // GROUPED Storage tab renders no override controls, but the Storage- and
    // Motion-tab override writes below also live in this save path, so gate them
    // all on !isGrouped, belt-and-suspenders independent of the rendered DOM.
    // (The backend rejects these too; this keeps the UI from issuing a 4xx.)
    const isGrouped = !!groupOfCamera(id);

    // Recording assignment (Recording tab, ungrouped only, a grouped camera's tab
    // is read-only). ONE model now (S1): pick a GROUP (→ inherit its policy), or,
    // as the collapsed exception, PIN a specific policy directly. The old 3-way
    // radio and the anonymous "custom" copy-on-write fork are gone.
    //   • group chosen (non-empty)  → join it; group authority clears any pin.
    //   • else pin enabled          → set a direct policy_id.
    //   • else                      → clear (follow the Default policy).
    const chosenGroup = (!isGrouped && $('ce-group')) ? $('ce-group').value : '';
    const joiningGroup = !!(chosenGroup && chosenGroup !== '__new__');
    const pinEnabled = !isGrouped && $('ce-pin-enable') && $('ce-pin-enable').checked;
    // mode is null when the Recording tab isn't mounted (saving from another tab).
    let mode = null;
    if (!isGrouped && ($('ce-group') || $('ce-pin-enable'))) {
      if (joiningGroup) { mode = 'inherit'; camBody.policy_id = null; }
      else if (pinEnabled && $('ce-profile')) { mode = 'profile'; camBody.policy_id = $('ce-profile').value; }
      else { mode = 'inherit'; camBody.policy_id = null; }
    }

    // Phase 4: if this reassignment changes the camera's EFFECTIVE storage disk,
    // warn (footage-safe, no per-camera move) before persisting.
    if (mode) {
      const fromPol = effectivePolicy(c).policy;
      let toPol = fromPol;
      if (mode === 'profile') {
        toPol = profileById($('ce-profile').value) || fromPol;
      } else {
        // inherit resolves through the chosen group: group policy → else Default.
        const grp = joiningGroup ? (GROUPS || []).find(g => g.id === chosenGroup) : null;
        const gp = grp && grp.policy_id ? profileById(grp.policy_id) : null;
        toPol = gp || DEFAULT_POLICY || (POLICIES || []).find(p => p.is_default) || fromPol;
      }
      if (!confirmStorageReassign(fromPol, toPol, 'this camera')) {
        setMsg('ce-msg', 'No changes saved.');
        return;
      }
    }

    await api('/config/cameras/' + id, { method: 'PUT', body: JSON.stringify(camBody) });

    if (mode === 'inherit') {
      await applyGroupMembership(id, chosenGroup);
    }
    // Motion tab: persist per-camera motion sensitivity/buffers as a custom policy
    // override (copy-on-write), only when those fields were edited on the tab.
    // motion_sensitivity is sent ALONGSIDE motion_threshold so the threshold is
    // actually honored, in the default 'dynamic' mode a bare threshold is a no-op,
    // so we must flip the mode to 'manual' for the operator's value to take effect.
    // Phase 3: skip entirely for a grouped camera, a motion fork would re-create
    // the very per-camera override grouping forbids (the backend rejects it too).
    if (!isGrouped && activeCamTab === 'motion' && $('cm-sensitivity')) {
      const mb = {};
      const sens = $('cm-sensitivity').value;
      mb.motion_sensitivity = sens;
      if (sens === 'manual') {
        const th = ($('cm-threshold') && $('cm-threshold').value || '').trim();
        if (th !== '') mb.motion_threshold = Number(th) / 100;
      }
      if ($('cm-pre') && $('cm-pre').value !== '') mb.motion_pre_seconds = Number($('cm-pre').value);
      if ($('cm-post') && $('cm-post').value !== '') mb.motion_post_seconds = Number($('cm-post').value);
      await api('/config/cameras/' + id + '/policy', { method: 'PUT', body: JSON.stringify(mb) });
    }
    toast('Camera saved.');
    await ensureCams(); await ensureGroups();
    renderTree();
    renderCamera(id);
  } catch (e) { setMsg('ce-msg', e.message, 'err'); }
}

/* Move a camera into `groupId` (or out of all groups if blank). */
async function applyGroupMembership(camId, groupId) {
  const current = groupOfCamera(camId);
  const target = (groupId && groupId !== '__new__') ? groupId : null;
  if ((current ? current.id : null) === target) return; // no change
  if (current) {
    const ids = (current.camera_ids || []).filter(x => x !== camId);
    await api('/config/groups/' + current.id + '/members', { method: 'PUT', body: JSON.stringify({ camera_ids: ids }) });
  }
  if (target) {
    const tg = (GROUPS||[]).find(g => g.id === target);
    const ids = [...new Set([...(tg ? tg.camera_ids||[] : []), camId])];
    await api('/config/groups/' + target + '/members', { method: 'PUT', body: JSON.stringify({ camera_ids: ids }) });
  }
  await ensureGroups();
}

/* Phase 3: ungroup a camera so per-camera storage/profile overrides become
   available. Removes it from its current group (reusing applyGroupMembership's
   members-replace primitive with a null target) and re-renders the camera, the
   Storage tab now takes the UNGROUPED branch and exposes the override controls. */
async function ceUngroup(camId) {
  setMsg('ce-msg', '');
  try {
    await applyGroupMembership(camId, null);
    toast('Camera ungrouped, you can now set per-camera storage.');
    await ensureCams();
    renderTree();
    renderCamera(camId);
  } catch (e) { setMsg('ce-msg', e.message, 'err'); toast(e.message, 'err', 5000); }
}

function syncModeCards(pfx) {
  ['continuous','motion'].forEach(m => {
    const card = $(`${pfx}-mode-card-${m}`);
    if (card) card.classList.toggle('selected', card.querySelector('input').checked);
  });
  const motion = document.querySelector(`input[name="${pfx}-mode"][value="motion"]`);
  const extra = $(pfx + '-motion-extra');
  if (extra) extra.classList.toggle('hidden', !(motion && motion.checked));
  if (motion && motion.checked) refreshMotionCacheStat(pfx);
}
function archToggle(pfx) {
  const el = $(pfx + '-arch-on');
  const on = el.checked;
  $(pfx + '-arch-fields').classList.toggle('hidden', !on);
  $(pfx + '-arch-card').classList.toggle('archive-disabled', !on);
  // Warn when turning archiving OFF on a policy that WAS archiving: its
  // already-archived footage stops being kept on a separate long-term tier and
  // is drained, under the archive retention it had, or the live retention if
  // Archive was "Keep forever". (The recorder does this gracefully; protected
  // bookmarks are always kept.) No warning for a brand-new or already-off policy.
  const warn = $(pfx + '-arch-disable-warn');
  if (warn) {
    const wasOn = el.dataset.wasOn === '1';
    const wasForever = el.dataset.wasForever === '1';
    if (!on && wasOn) {
      warn.innerHTML =
        'Heads up: footage already moved to the Archive tier will no longer be kept long-term. ' +
        (wasForever
          ? 'Because Archive was set to <b>Keep forever</b>, it will now be retained only as long as the <b>live</b> retention above, then deleted.'
          : 'It will be retained under the <b>archive retention</b> you had set, then deleted.') +
        ' Recent live footage is unaffected, and protected (bookmarked) clips are always kept.';
      warn.classList.remove('hidden');
    } else {
      warn.classList.add('hidden');
    }
  }
  renderTierExplainer(pfx);
}
/* The always-visible "how Crumb manages a filling disk" cascade. */
function renderTierExplainer(pfx) {
  const el = $(pfx + '-tier-explainer'); if (!el) return;
  const on = $(pfx + '-arch-on') && $(pfx + '-arch-on').checked;
  const step = (n, txt, cls) => `<div class="tx-step ${cls||''}"><span class="tx-num">${n}</span><span>${txt}</span></div>`;
  let steps;
  if (on) {
    steps =
      step(1, 'The <b>live</b> disk fills, whichever comes first: the size cap, the free-space floor, or the retention time.') +
      step(2, 'The oldest live footage is <b>moved to Archive</b> (not deleted). With a breathing-room buffer set, Crumb moves a chunk at a time so it works in batches, giving the live disk room to breathe.') +
      step(3, 'The <b>Archive</b> disk fills, whichever comes first: the archive size cap or the archive retention time.') +
      step(4, 'The oldest archived footage is <b>deleted</b>. This is the only place footage is ever lost.', 'tx-warn');
  } else {
    steps =
      step(1, 'The <b>live</b> disk fills, whichever comes first: the size cap, the free-space floor, or the retention time.') +
      step(2, 'The oldest live footage is <b>deleted</b>. With Archive off, footage is removed directly, turn Archive on to move it to a second disk first.', 'tx-warn');
  }
  el.innerHTML = `<div class="tx-title">How Crumb manages a filling disk</div>${steps}` +
    `<div class="tx-note">Free space is measured on the whole disk. When several policies share a disk, the largest free-space headroom wins and each policy frees its own oldest footage.</div>`;
}
function archForeverToggle(pfx) {
  const forever = $(pfx + '-arch-forever').checked;
  const num = $(pfx + '-arch-ret'), unit = $(pfx + '-arch-ret-unit');
  if (num) num.disabled = forever;
  if (unit) unit.disabled = forever;
  if (forever && num) num.value = '';
}
function storageOptions(selId, includeBlank) {
  const blank = includeBlank ? '<option value="">— select a location —</option>' : '';
  return blank + STORAGES.map(s => `<option value="${s.id}" ${s.id === selId ? 'selected' : ''}>${esc(s.name)}</option>`).join('');
}

function fillProfileFields(pfx, p) {
  const modeVal = p.mode || 'continuous';
  const radioEl = document.querySelector(`input[name="${pfx}-mode"][value="${modeVal}"]`);
  if (radioEl) radioEl.checked = true;
  syncModeCards(pfx);
  if ($(pfx+'-stream')) $(pfx + '-stream').value = p.record_stream || 'main';
  if ($(pfx+'-audio')) $(pfx + '-audio').checked = !!p.record_audio;
  if ($(pfx+'-pre')) $(pfx + '-pre').value = p.motion_pre_seconds ?? 5;
  if ($(pfx+'-post')) $(pfx + '-post').value = p.motion_post_seconds ?? 30;
  if ($(pfx+'-live-st')) $(pfx + '-live-st').innerHTML = storageOptions(p.live_storage_id, true);
  // Phase 4: read-only storage display (locked, existing-profile edit), show the
  // current disk name; the disk is changed only via the Change-storage dialog.
  if ($(pfx+'-live-st-ro')) $(pfx + '-live-st-ro').textContent = p.live_storage_id ? stName(p.live_storage_id) : '(default location)';
  setDur(pfx + '-live-ret', p.live_retention_hours ?? 24);
  setSize(pfx + '-live-max', p.live_max_bytes);
  if ($(pfx+'-arch-on')) {
    $(pfx + '-arch-on').checked = !!p.archive_enabled;
    // Remember the SAVED archive state so archToggle can warn when the operator
    // turns archiving off on a policy that was archiving, its already-archived
    // footage will be drained (no longer kept on a separate long-term tier).
    $(pfx + '-arch-on').dataset.wasOn = p.archive_enabled ? '1' : '';
    $(pfx + '-arch-on').dataset.wasForever =
      (!!p.archive_enabled && p.archive_retention_hours == null) ? '1' : '';
  }
  if ($(pfx+'-arch-st')) $(pfx + '-arch-st').innerHTML = storageOptions(p.archive_storage_id, true);
  if ($(pfx+'-arch-st-ro')) $(pfx + '-arch-st-ro').textContent = p.archive_storage_id ? stName(p.archive_storage_id) : '(default location)';
  // archive retention: null + archive_enabled ⇒ "Keep forever"
  const forever = !!p.archive_enabled && (p.archive_retention_hours == null);
  if ($(pfx+'-arch-forever')) $(pfx + '-arch-forever').checked = forever;
  setDur(pfx + '-arch-ret', p.archive_retention_hours ?? '');
  archForeverToggle(pfx);
  setSize(pfx + '-arch-max', p.archive_max_bytes);
  // Advanced storage management (free-space headroom + spill buffer).
  setSize(pfx + '-live-minfree', p.live_min_free_bytes);
  if ($(pfx + '-live-minfree-pct')) {
    $(pfx + '-live-minfree-pct').value =
      p.live_min_free_pct != null ? +(p.live_min_free_pct * 100).toFixed(2) : '';
  }
  setSize(pfx + '-live-spill', p.live_spill_low_water_bytes);
  // Absolute maximum-retention cap (days), blank = OFF (no cap).
  if ($(pfx + '-max-ret-days')) $(pfx + '-max-ret-days').value = (p.max_retention_days != null ? p.max_retention_days : '');
  renderSchedControl(pfx, p.archive_schedule || '');
  archToggle(pfx); // also renders the tier-cascade explainer
  // Capacity bars for the chosen tiers (best-effort).
  renderTierCap(pfx + '-live-cap', p.live_storage_id);
  renderTierCap(pfx + '-arch-cap', p.archive_storage_id);
  if ($(pfx+'-live-st')) $(pfx + '-live-st').onchange = () => renderTierCap(pfx + '-live-cap', $(pfx + '-live-st').value);
  if ($(pfx+'-arch-st')) $(pfx + '-arch-st').onchange = () => renderTierCap(pfx + '-arch-cap', $(pfx + '-arch-st').value);
}
function renderTierCap(containerId, storageId) {
  const el = $(containerId); if (!el) return;
  const s = STORAGES.find(x => x.id === storageId);
  el.innerHTML = (s && s.total_bytes) ? capBarHTML(s) : '';
}

function readProfileFields(pfx) {
  const modeRadio = document.querySelector(`input[name="${pfx}-mode"]:checked`);
  const archOn = $(pfx + '-arch-on') && $(pfx + '-arch-on').checked;
  const forever = $(pfx + '-arch-forever') && $(pfx + '-arch-forever').checked;
  const archRet = getDur(pfx + '-arch-ret');
  // Phase 4: locked-storage mode (existing-profile edit) renders no live/archive
  // <select>, only the read-only display + Change-storage button. In that mode
  // we must OMIT both storage ids from the body entirely so a plain Save never
  // repoints the disk (the backend keeps the existing value when the key is
  // absent: live via `.or(base)`, archive via the double_option `None ⇒ base`).
  const storageLocked = !$(pfx + '-live-st');
  const body = {
    mode: modeRadio ? modeRadio.value : 'continuous',
    record_stream: ($(pfx + '-stream') && $(pfx + '-stream').value) || 'main',
    record_audio: !!($(pfx + '-audio') && $(pfx + '-audio').checked),
    live_retention_hours: Number(getDur(pfx + '-live-ret')) || 24,
    live_max_bytes: getSize(pfx + '-live-max'),
    archive_enabled: !!archOn,
    archive_retention_hours: (archOn && !forever && archRet !== '') ? Number(archRet) : null,
    archive_max_bytes: archOn ? getSize(pfx + '-arch-max') : null,
    archive_schedule: archOn ? readSchedCron(pfx) : null,
    live_min_free_bytes: getSize(pfx + '-live-minfree'),
    live_spill_low_water_bytes: getSize(pfx + '-live-spill'),
    live_min_free_pct: (() => {
      const v = (($(pfx + '-live-minfree-pct') && $(pfx + '-live-minfree-pct').value) || '').trim();
      return v === '' ? null : Number(v) / 100;
    })(),
    // Absolute max-retention cap (days). Blank / non-positive ⇒ null (OFF).
    max_retention_days: (() => {
      const v = (($(pfx + '-max-ret-days') && $(pfx + '-max-ret-days').value) || '').trim();
      const n = Number(v);
      return (v === '' || isNaN(n) || n <= 0) ? null : Math.round(n);
    })(),
  };
  // Archive storage id: only emit when the editable select exists (new profile /
  // camera-custom fork). When locked, omit it so the existing archive disk is
  // preserved. When archive is off, send null (clears it) as before.
  if (!storageLocked) {
    body.archive_storage_id = archOn ? (($(pfx + '-arch-st') && $(pfx + '-arch-st').value) || null) : null;
  }
  // Motion buffers are part of the profile even when the motion-extra row is
  // hidden (continuous mode), fillProfileFields always populates them, so send
  // them whenever the inputs exist, defaulting to the standard 5 s / 30 s. This
  // keeps profile-level edits from being silently dropped.
  const motionPre = $(pfx + '-pre'), motionPost = $(pfx + '-post');
  if (motionPre) body.motion_pre_seconds = motionPre.value !== '' ? Number(motionPre.value) : 5;
  if (motionPost) body.motion_post_seconds = motionPost.value !== '' ? Number(motionPost.value) : 30;
  const liveSt = $(pfx + '-live-st'); if (liveSt && liveSt.value) body.live_storage_id = liveSt.value;
  return body;
}

/* Inline cross-field validation: archive retention must exceed live retention. */
function validateRetention(pfx) {
  const errEl = $(pfx + '-arch-reterr');
  if (!errEl) return true;
  const archOn = $(pfx + '-arch-on') && $(pfx + '-arch-on').checked;
  const forever = $(pfx + '-arch-forever') && $(pfx + '-arch-forever').checked;
  if (!archOn || forever) { errEl.classList.add('hidden'); return true; }
  const live = Number(getDur(pfx + '-live-ret')) || 0;
  const arch = Number(getDur(pfx + '-arch-ret')) || 0;
  if (arch && arch <= live) {
    errEl.textContent = `Archive must retain footage longer than live storage (currently ${fmtDur(live)}). Enter at least ${fmtDur(live + 24)} or more.`;
    errEl.classList.remove('hidden');
    return false;
  }
  errEl.classList.add('hidden');
  return true;
}

/* Inline cross-field validation: breathing-room buffer < size cap. */
function validateAdvanced(pfx) {
  const errEl = $(pfx + '-adv-err');
  if (!errEl) return true;
  const spill = getSize(pfx + '-live-spill');
  const liveCap = getSize(pfx + '-live-max');
  const archOn = $(pfx + '-arch-on') && $(pfx + '-arch-on').checked;
  const archCap = archOn ? getSize(pfx + '-arch-max') : null;
  if (spill && liveCap && spill >= liveCap) {
    errEl.textContent = `Breathing-room buffer (${fmtBytes(spill)}) must be smaller than the live size cap (${fmtBytes(liveCap)}).`;
    errEl.classList.remove('hidden');
    return false;
  }
  if (spill && archCap && spill >= archCap) {
    errEl.textContent = `Breathing-room buffer (${fmtBytes(spill)}) must be smaller than the archive size cap (${fmtBytes(archCap)}).`;
    errEl.classList.remove('hidden');
    return false;
  }
  errEl.classList.add('hidden');
  return true;
}

/* ═══════════════════════════════════════════════════════════════════════════
   PROFILE, detail / edit (single config form, no tab strip)
═══════════════════════════════════════════════════════════════════════════ */
let profileEditMode = false;

function newProfile() {
  selKind = 'profile'; selId = '__new__'; profileEditMode = true;
  renderTree();
  renderProfileEdit(null);
  renderBottom();
}
function editProfile() { profileEditMode = true; renderProfile(selId); }

/* ═══════════════════════════════════════════════════════════════════════════
   CHANGE STORAGE, repoint a profile's live/archive disk + optional guarded
   background drain of existing footage (POST /config/policies/{id}/change-storage,
   then poll /config/migrations/{id}). The repoint is instant + safe; the drain
   runs in the recorder under its archive lock so footage moves never race.
═══════════════════════════════════════════════════════════════════════════ */
let csPollTimer = null;
function closeChangeStorage() {
  if (csPollTimer) { clearInterval(csPollTimer); csPollTimer = null; }
  const el = $('cs-modal'); if (el) el.remove();
}
function openChangeStorage(policyId, role) {
  const p = profileById(policyId); if (!p) return;
  const currentId = role === 'live' ? p.live_storage_id : p.archive_storage_id;
  const targets = STORAGES.filter(s => s.id !== currentId);
  if (!targets.length) { toast('No other storage location to move to, add one first.', 'warn'); return; }
  const opts = targets.map(s => `<option value="${s.id}">${esc(s.name)}, ${esc(s.path)}</option>`).join('');
  const curName = currentId ? stName(currentId) : '(default location)';
  const el = document.createElement('div');
  el.id = 'cs-modal';
  el.className = 'modal-overlay';
  el.innerHTML = `
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">Change ${role} storage, ${esc(p.name || 'Default')}</div>
        <button class="modal-close" onclick="closeChangeStorage()">&times;</button>
      </div>
      <div class="card-hint" style="margin-bottom:12px">Currently recording ${role} to <b>${esc(curName)}</b>. New footage starts landing on the new disk immediately; existing footage can be moved in the background, safely, with no hanging files.</div>
      <label class="field-label" style="margin-top:0">Move ${role} storage to</label>
      <select id="cs-target" style="font-size:13px;width:100%">${opts}</select>
      <label class="chk" style="margin-top:14px"><input type="checkbox" id="cs-migrate" checked/> Also move existing ${role} footage to the new disk</label>
      <div id="cs-msg" class="form-msg"></div>
      <div id="cs-progress" style="margin-top:12px"></div>
      <div class="modal-actions">
        <button class="ghost" onclick="closeChangeStorage()">Cancel</button>
        <button class="primary" id="cs-go" onclick="submitChangeStorage('${policyId}','${role}')">Change storage</button>
      </div>
    </div>`;
  document.body.appendChild(el);
}
async function submitChangeStorage(policyId, role) {
  setMsg('cs-msg', '');
  const to = $('cs-target').value;
  const migrate = $('cs-migrate').checked;
  const go = $('cs-go'); if (go) { go.disabled = true; go.textContent = 'Working…'; }
  try {
    const r = await api('/config/policies/' + policyId + '/change-storage', {
      method: 'POST',
      body: JSON.stringify({ stage: role, to_storage_id: to, migrate_existing: migrate }),
    });
    await ensurePolicies(); await ensureDefaultPolicy();
    if (r.migration_id) {
      toast('Storage changed, moving existing footage in the background.');
      csTrackMigration(r.migration_id, policyId);
    } else {
      toast('Storage changed. New footage now records to the new disk.');
      closeChangeStorage();
      renderProfile(policyId);
    }
  } catch (e) {
    if (go) { go.disabled = false; go.textContent = 'Change storage'; }
    setMsg('cs-msg', e.message, 'err');
  }
}
function csTrackMigration(id, policyId) {
  const go = $('cs-go'); if (go) go.style.display = 'none';
  const tick = async () => {
    let m;
    try { m = await api('/config/migrations/' + id); } catch { return; /* keep polling */ }
    const total = m.total_segments || 0;
    const pct = total > 0 ? Math.min(100, Math.round(m.moved_segments / total * 100)) : (m.status === 'done' ? 100 : 0);
    const cls = m.status === 'failed' ? 'crit' : (m.status === 'done' ? '' : 'warn');
    const box = $('cs-progress'); if (!box) return;
    box.innerHTML = `
      <div style="font-size:12px;color:var(--dim);margin-bottom:4px">Moving footage, ${m.moved_segments}/${total} segments (${pct}%) · ${fmtBytes(m.moved_bytes)}</div>
      <div class="cap-bar-track"><div class="cap-bar-fill ${cls}" style="width:${pct}%"></div></div>
      ${m.status === 'failed' ? `<div class="form-msg err" style="margin-top:8px">Drain failed: ${esc(m.error || 'unknown')}. New footage is already on the new disk; the existing footage stayed put and is safe.</div>` : ''}`;
    const acts = document.querySelector('#cs-modal .modal-actions');
    if (m.status === 'running' || m.status === 'pending') {
      // Let the operator cancel an in-flight (or queued) drain.
      if (acts) acts.innerHTML = `<button class="danger-ghost" onclick="cancelMigration('${id}','${policyId}')">Cancel migration</button>`;
    }
    if (m.status === 'done' || m.status === 'failed') {
      if (csPollTimer) { clearInterval(csPollTimer); csPollTimer = null; }
      if (m.status === 'done') toast('Footage migration complete.');
      if (acts) acts.innerHTML = m.status === 'failed'
        ? `<button class="ghost" onclick="closeChangeStorage(); renderProfile('${policyId}')">Close</button>
           <button class="primary" onclick="retryMigration('${id}','${policyId}')">Retry</button>`
        : `<button class="primary" onclick="closeChangeStorage(); renderProfile('${policyId}')">Done</button>`;
    }
  };
  tick();
  csPollTimer = setInterval(tick, 1500);
}
/* Retry a failed/stuck migration: the API re-queues it as 'pending' and the
   recorder's drain worker re-claims it. Resume polling so progress shows again. */
async function retryMigration(id, policyId) {
  try {
    await api('/config/migrations/' + id + '/retry', { method: 'POST' });
    toast('Migration re-queued, resuming.');
    if (csPollTimer) { clearInterval(csPollTimer); csPollTimer = null; }
    csTrackMigration(id, policyId);
  } catch (e) { setMsg('cs-msg', e.message, 'err'); toast(e.message, 'err', 5000); }
}
/* Cancel a not-yet-done migration. New footage already records to the new disk;
   only the background move of EXISTING footage stops. */
async function cancelMigration(id, policyId) {
  if (!confirm('Cancel this footage migration? New footage already records to the new disk; existing footage stays where it is (safe).')) return;
  try {
    await api('/config/migrations/' + id + '/cancel', { method: 'POST' });
    toast('Migration cancelled.');
    if (csPollTimer) { clearInterval(csPollTimer); csPollTimer = null; }
    const acts = document.querySelector('#cs-modal .modal-actions');
    if (acts) acts.innerHTML = `<button class="primary" onclick="closeChangeStorage(); renderProfile('${policyId}')">Close</button>`;
  } catch (e) { setMsg('cs-msg', e.message, 'err'); toast(e.message, 'err', 5000); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   GROUP DETAIL PANE, a camera group is a first-class, editable entity: it
   carries a recording profile (own → group → default) that every member camera
   inherits, plus its membership. Rename + assign-profile via PUT /config/groups/{id};
   membership via PUT /config/groups/{id}/members (wholesale replace, one-group-
   per-camera, a camera added here is moved out of its previous group server-side).
═══════════════════════════════════════════════════════════════════════════ */
/* Staged member set while editing a group pane (committed on Save). null = not editing. */
let geMembers = null;

function renderGroup(id) {
  selKind = 'group'; selId = id;
  const g = (GROUPS || []).find(x => x.id === id);
  if (!g) { renderWelcome(); return; }
  const byName = (a, b) => (a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase());
  // Staged membership starts from the persisted set each time the pane is (re)rendered.
  geMembers = (g.camera_ids || []).slice();
  const members = geMembers.map(cid => CAMS.find(c => c.id === cid)).filter(Boolean).sort(byName);

  // Profile <select>: an explicit "Use Default profile" (→ policy_id:null = inherit
  // the global default) plus the NAMED profiles only. The global-default profile is
  // intentionally NOT offered by id, "Use Default profile" (null/inherit) is the one
  // canonical way to follow the default, so the choice is simply inherit-default OR a
  // named profile (no confusing duplicate that records identically but pins state).
  const profOpts = `<option value="" ${g.policy_id?'':'selected'}>Use Default profile (inherit global default)</option>` +
    allProfiles().filter(p => !p.is_default).map(p =>
      `<option value="${p.id}" ${g.policy_id===p.id?'selected':''}>${esc(profileSelectLabel(p))}</option>`).join('');

  $('right-pane').innerHTML = `
    <div class="rp-head">
      <div class="rp-head-left">
        <span class="rp-head-icon">${icon('group',22)}</span>
        <div class="rp-head-titles">
          <button class="rp-back" onclick="select('cameras-root')" title="Back to all cameras">‹ Cameras</button>
          <div class="rp-head-title">${esc(g.name)}</div>
          <div class="rp-head-sub">${members.length} camera${members.length!==1?'s':''}</div>
        </div>
      </div>
      <div class="rp-head-actions">
        <button class="primary" onclick="saveGroup('${esc(g.id)}')">Save</button>
        <button class="danger-ghost" onclick="delGroup('${esc(g.id)}')">Remove</button>
      </div>
    </div>

    <div class="policy-section" style="margin-top:0">
      <div class="policy-section-title">Name</div>
      <input id="ge-name" value="${esc(g.name)}" placeholder="Group name" style="max-width:320px" />
    </div>

    <div class="policy-section">
      <div class="policy-section-title">Recording profile</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:6px">All cameras in this group record with the selected profile (unless a camera has its own profile assigned directly).</div>
      <select id="ge-profile" style="font-size:13px;max-width:420px" onchange="geProfileChanged()">${profOpts}</select>
      <div id="ge-profile-summary" style="margin-top:10px"></div>
    </div>

    <div class="policy-section">
      <div class="policy-section-title">Member cameras</div>
      <div id="ge-members"></div>
      <div style="margin-top:10px;display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap">
        <select id="ge-add-cam" multiple size="4" style="font-size:13px;min-width:240px"></select>
        <button class="ghost sm" onclick="geAddCams()">Add selected</button>
      </div>
      <div class="card-hint" style="margin-top:6px">A camera belongs to one group at most, adding a camera that's already in another group moves it here when you Save.</div>
    </div>
    <div id="ge-msg" class="form-msg"></div>`;

  geRenderMembers();
  geRenderAddOptions();
  geProfileChanged();
}

/* Render the staged member roster (each with an inline remove). */
function geRenderMembers() {
  const el = $('ge-members'); if (!el) return;
  const byName = (a, b) => (a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase());
  const members = (geMembers||[]).map(cid => CAMS.find(c => c.id === cid)).filter(Boolean).sort(byName);
  if (!members.length) { el.innerHTML = '<span style="color:var(--dim2);font-size:12px">No cameras in this group yet.</span>'; return; }
  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:4px">` + members.map(c =>
    `<div style="display:flex;align-items:center;gap:8px;font-size:13px;padding:3px 0">
      <span class="tr-icon">${icon(camIcon(c),14)}</span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</span>
      <button class="ghost sm" title="Remove from group" onclick="geRemoveCam('${esc(c.id)}')">&#x2715;</button>
    </div>`).join('') + `</div>`;
}

/* Populate the "Add cameras" multi-select with cameras NOT already staged in this
   group. Cameras in OTHER groups are offered too (with a note), they move here. */
function geRenderAddOptions() {
  const sel = $('ge-add-cam'); if (!sel) return;
  const byName = (a, b) => (a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase());
  const staged = new Set(geMembers || []);
  const avail = (CAMS||[]).filter(c => !staged.has(c.id)).slice().sort(byName);
  if (!avail.length) { sel.innerHTML = `<option disabled>All cameras are already in this group</option>`; sel.disabled = true; return; }
  sel.disabled = false;
  sel.innerHTML = avail.map(c => {
    const og = groupOfCamera(c.id);
    const note = og && og.id !== selId ? ` (in ${og.name})` : '';
    return `<option value="${c.id}">${esc(c.name + note)}</option>`;
  }).join('');
}

function geAddCams() {
  const sel = $('ge-add-cam'); if (!sel) return;
  const picks = Array.from(sel.selectedOptions).map(o => o.value).filter(Boolean);
  if (!picks.length) return;
  geMembers = [...new Set([...(geMembers||[]), ...picks])];
  geRenderMembers();
  geRenderAddOptions();
}
function geRemoveCam(camId) {
  geMembers = (geMembers||[]).filter(x => x !== camId);
  geRenderMembers();
  geRenderAddOptions();
}

/* Live summary of the selected profile's storage + retention (mirrors the camera
   inherit-banner facts). Empty (= inherit) resolves to the Default profile. */
function geProfileChanged() {
  const el = $('ge-profile-summary'); if (!el) return;
  const sel = $('ge-profile');
  const val = sel ? sel.value : '';
  const p = val ? profileById(val) : (DEFAULT_POLICY || allProfiles().find(x => x.is_default) || null);
  if (!p) { el.innerHTML = ''; return; }
  const inheriting = !val;
  el.innerHTML = bannerHTMLForGroup(p, inheriting);
}
/* A compact, button-less variant of the camera inherit-banner for the group pane. */
function bannerHTMLForGroup(p, inheriting) {
  const liveName = stName(p.live_storage_id);
  const archName = stName(p.archive_storage_id);
  const hl = (txt, varName) => `<strong style="color:var(--${varName})">${esc(txt)}</strong>`;
  const modeHl   = p.mode === 'motion' ? hl('Motion-triggered', 'danger') : hl('Continuous', 'ok');
  const streamHl = hl(p.record_stream === 'sub' ? 'sub' : 'main', 'accent2');
  const archiveLine = p.archive_enabled
    ? `Archive to ${hl(archName, 'accent2')} for ${hl(fmtDur(p.archive_retention_hours), 'warn')}, <span style="color:var(--dim)">${esc(fmtSchedule(p.archive_schedule).toLowerCase())} Pacific</span>.`
    : `<span style="color:var(--dim2)">No archiving configured.</span>`;
  return `<div class="inherit-banner ${inheriting?'default-profile':''}">
    <div class="inherit-banner-title">Using "${esc(p.name || 'Default')}" profile</div>
    <div class="inherit-banner-source">${inheriting?'inheriting the global Default profile':'assigned to this group'}</div>
    <div class="inherit-banner-facts">
      ${modeHl} recording on the ${streamHl} stream.<br>
      Keep ${hl(fmtDur(p.live_retention_hours), 'accent')} on ${hl(liveName, 'accent2')}${p.live_max_bytes?`, up to ${hl(fmtBytes(p.live_max_bytes), 'warn')}`:''}.<br>
      ${archiveLine}
    </div>
    <div class="inherit-banner-actions">
      <button class="ghost sm" onclick="select('profile','${p.id}')">Edit this profile</button>
    </div>
  </div>`;
}

/* Save: persist name + profile (PUT /config/groups/{id}) then membership
   (PUT /config/groups/{id}/members) when it changed. policy_id semantics:
   ''  → JSON null (clear → inherit global default); a uuid → assign. */
async function saveGroup(id) {
  setMsg('ge-msg', '');
  const g = (GROUPS||[]).find(x => x.id === id);
  if (!g) { setMsg('ge-msg', 'Group no longer exists.', 'err'); return; }
  const name = ($('ge-name') ? $('ge-name').value : '').trim();
  if (!name) { setMsg('ge-msg', 'Group name is required.', 'err'); return; }
  const profVal = $('ge-profile') ? $('ge-profile').value : '';
  const policyId = profVal || null; // '' → null clears (inherit global default)

  // Phase 4: changing the group's profile changes the EFFECTIVE storage of every
  // member that resolves THROUGH the group (i.e. has no own per-camera policy).
  // If that changes the live/archive disk, warn first (footage-safe, no move).
  if (policyId !== (g.policy_id || null)) {
    const def = DEFAULT_POLICY || (POLICIES || []).find(p => p.is_default) || null;
    const fromPol = (g.policy_id ? profileById(g.policy_id) : def) || def;
    const toPol = (policyId ? profileById(policyId) : def) || def;
    // Members governed by the group (no own override) are the ones affected.
    const affected = (g.camera_ids || [])
      .map(cid => (CAMS || []).find(c => c.id === cid))
      .filter(c => c && !c.policy_id).length;
    if (affected > 0) {
      const scope = `the ${affected} camera${affected !== 1 ? 's' : ''} in this group`;
      if (!confirmStorageReassign(fromPol, toPol, scope)) {
        setMsg('ge-msg', 'No changes saved.');
        return;
      }
    }
  }

  // ADDING a camera to this group changes where it records if the group's
  // effective disk differs from the camera's current effective disk. Joining also
  // clears any own override, so this covers both inherited and custom cameras.
  // Warn first, footage-safe, no move.
  {
    const added = (geMembers || []).filter(cid => !(g.camera_ids || []).includes(cid));
    if (added.length) {
      const def2 = DEFAULT_POLICY || (POLICIES || []).find(p => p.is_default) || null;
      const toPol2 = (policyId ? profileById(policyId) : def2) || def2;
      const toIds = policyStorageIds(toPol2);
      const moved = added
        .map(cid => (CAMS || []).find(c => c.id === cid))
        .filter(Boolean)
        .filter(c => {
          const fi = policyStorageIds(effectivePolicy(c).policy);
          return fi.live !== toIds.live || (fi.archive || null) !== (toIds.archive || null);
        });
      if (moved.length) {
        const b2 = policyStorageNames(toPol2);
        const msg =
          `Adding ${moved.length} camera${moved.length !== 1 ? 's' : ''} to this group changes where ` +
          `${moved.length !== 1 ? 'they record' : 'it records'} footage to:\n\n` +
          `• Live: ${b2.live}` + (b2.archive ? `, Archive: ${b2.archive}` : ', Archive: off') +
          `\n\n(${moved.map(c => c.name).join(', ')})\n\n` +
          `New footage records to the group's disk. Existing footage stays on each camera's ` +
          `current disk and drains there under retention, nothing is deleted.\n\nProceed?`;
        if (!confirm(msg)) { setMsg('ge-msg', 'No changes saved.'); return; }
      }
    }
  }

  try {
    await api('/config/groups/' + id, { method: 'PUT', body: JSON.stringify({ name, policy_id: policyId }) });
    // Membership wholesale-replace only when the staged set differs from persisted.
    const before = (g.camera_ids || []).slice().sort();
    const after = (geMembers || []).slice().sort();
    const changed = before.length !== after.length || before.some((v, i) => v !== after[i]);
    if (changed) {
      await api('/config/groups/' + id + '/members', { method: 'PUT', body: JSON.stringify({ camera_ids: (geMembers||[]) }) });
    }
    toast('Group saved.');
    await ensureGroups(); await ensureCams();
    renderTree();
    renderGroup(id);
  } catch (e) { setMsg('ge-msg', e.message, 'err'); }
}

/* Remove a group (DELETE /config/groups/{id}); members revert to own/default. */
async function delGroup(id) {
  const g = (GROUPS||[]).find(x => x.id === id);
  const name = g ? g.name : id;
  const n = g ? (g.camera_ids||[]).length : 0;
  if (!confirm(`Remove group "${name}"?${n?` Its ${n} camera${n!==1?'s':''} will fall back to their own or the Default profile.`:''}`)) return;
  try {
    await api('/config/groups/' + id, { method: 'DELETE' });
    toast(`Removed "${name}".`);
    if (selId === id) { selKind = null; selId = null; }
    await ensureGroups(); await ensureCams();
    renderTree();
    restoreSelection();
  } catch (e) { setMsg('ge-msg', e.message, 'err'); toast(e.message, 'err', 5000); }
}

/* Create a new group, then select it so the operator can immediately assign a
   profile + members. Used by the Cameras-root "+ New group" affordance. */
async function newGroup() {
  const name = prompt('Name for the new group:');
  if (!name || !name.trim()) return;
  try {
    const created = await api('/config/groups', { method: 'POST', body: JSON.stringify({ name: name.trim() }) });
    toast('Group created.');
    await ensureGroups();
    renderTree();
    if (created && created.id) select('group', created.id);
  } catch (e) { toast(e.message, 'err', 5000); }
}

function renderProfile(id) {
  selKind = 'profile'; selId = id;
  if (id === '__new__') { profileEditMode = true; renderProfileEdit(null); return; }
  const p = profileById(id);
  if (!p) { $('right-pane').innerHTML = '<div class="empty-state"><p>Profile not found.</p></div>'; return; }
  if (profileEditMode) { renderProfileEdit(p); return; }

  const isDefault = !!p.is_default;
  const direct = directCamsForProfile(id);
  const liveName = stName(p.live_storage_id), archName = stName(p.archive_storage_id);
  const viaGroups = (GROUPS||[]).filter(g => g.policy_id === id);
  // Proactive delete guard: a profile still bound to cameras (directly) or groups
  // can't be removed (the API 409s). Disable Remove + explain rather than letting
  // the operator click into a confusing error.
  const refBits = [];
  if (direct.length) refBits.push(`${direct.length} camera${direct.length!==1?'s':''}`);
  if (viaGroups.length) refBits.push(`${viaGroups.length} group${viaGroups.length!==1?'s':''}`);
  const profRemoveDisabled = !isDefault && refBits.length > 0;

  $('right-pane').innerHTML = `
    <div class="rp-head">
      <div class="rp-head-left">
        <span class="rp-head-icon">${icon(isDefault?'star':'profiles',22)}</span>
        <div class="rp-head-titles">
          <button class="rp-back" onclick="select('profiles-root')" title="Back to recording profiles">‹ Recording</button>
          <div class="rp-head-title">${esc(p.name || 'Default')}</div>
          <div class="rp-head-sub">${isDefault?'Default profile · ':''}${direct.length} camera${direct.length!==1?'s':''} direct${viaGroups.length?` · ${viaGroups.length} group${viaGroups.length!==1?'s':''}`:''}</div>
        </div>
      </div>
      <div class="rp-head-actions">
        <button class="primary" onclick="editProfile()">Edit</button>
        ${isDefault ? '' : `<button class="danger-ghost" onclick="delProfile('${esc(p.id)}')" ${profRemoveDisabled?`disabled title="Assigned to ${esc(refBits.join(' and '))}, reassign before deleting"`:''}>Remove</button>`}
      </div>
    </div>
    ${profRemoveDisabled?`<div class="warn-note" style="margin-top:0">This profile is assigned to ${esc(refBits.join(' and '))}. Reassign ${direct.length?'those cameras':''}${direct.length&&viaGroups.length?' / ':''}${viaGroups.length?'those groups':''} to another profile before it can be deleted.</div>`:''}

    <div class="policy-section" style="margin-top:0">
      <div class="policy-section-title">Recording behavior</div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:13px">
        <div style="color:var(--dim)">Mode</div><div>${p.mode==='motion'?'Motion-triggered':'Continuous'}</div>
        <div style="color:var(--dim)">Stream</div><div>${p.record_stream==='sub'?'Sub-stream (lower bandwidth)':'Main stream (full resolution)'}</div>
        <div style="color:var(--dim)">Audio</div><div>${p.record_audio?'Included':'Not recorded'}</div>
        ${p.mode==='motion'?`<div style="color:var(--dim)">Pre-event buffer</div><div>${p.motion_pre_seconds} seconds</div>
        <div style="color:var(--dim)">Post-event buffer</div><div>${p.motion_post_seconds} seconds</div>`:''}
      </div>
    </div>

    <div style="margin-top:14px">
      <div class="policy-section-title" style="margin-bottom:4px">Storage tiers</div>
      <div class="tier-grid">
        <div class="tier-card">
          <div class="tier-label">Live storage <span class="tier-sub">recent footage</span></div>

          <div class="tier-field"><div class="tier-field-name">Keep for</div><div class="tier-field-value">${p.archive_retention_hours==null?'No expiry':fmtDur(p.archive_retention_hours)}</div></div>

      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">

      </div>
      <div class="card-hint" style="margin-top:6px">Repoints where this profile records and (optionally) moves its existing footage to the new disk in the background, safely, no hanging files.</div>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        ${direct.length ? direct.map(c => `<span style="font-size:12px;color:var(--text)">${esc(c.name)}</span>`).join('<span style="color:var(--border2)">·</span>') : '<span style="color:var(--dim2);font-size:12px">None</span>'}
        <button class="ghost sm" style="margin-left:4px" onclick="openAssignPanel('${p.id}')">+ Assign cameras</button>

      <div style="font-size:12px;color:var(--dim);margin:10px 0 4px;display:flex;align-items:center;gap:8px">
