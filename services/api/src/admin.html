        <button class="ghost sm" onclick="identifyCamera('${c.id}')" ${(c.onvif_host && c.onvif_host.trim()) ? '' : 'disabled title="No ONVIF configured for this camera (it was added by a direct RTSP URL), so make and model cannot be read automatically. Add an ONVIF host and credentials in the ONVIF / PTZ section above, or set make/model by hand below."'}>Identify (ONVIF)</button>
      </div>
      <div id="ce-audio-status"></div>
      <div id="ce-compat"><div class="card-hint" style="margin:0">Checking the compatibility database&hellip;</div></div>
      <div id="ce-compat-contrib"></div>
    </div>

    <div class="policy-section">
      <div class="policy-section-title">Home Assistant</div>
      <div id="ce-ha"><div class="card-hint" style="margin:0">Loading Home Assistant links&hellip;</div></div>
    </div>

    <details class="detail-section" id="ce-probe-details">
      <summary>
        <span class="ds-chev">&#x25B6;</span>
        <span class="ds-title">Camera info (probed)</span>
        <span class="ds-glance" id="ce-probe-glance"></span>
      </summary>
      <div class="ds-body">
        <div id="ce-probe-readout"></div>
        <div class="card-hint" style="margin-top:8px">Probed automatically when you open a camera (Crumb's restream) and cached for ~90&nbsp;s, so switching between cameras doesn't re-probe. <b>Test main</b> / <b>Test sub</b> above forces a fresh probe with a live preview.</div>
      </div>
    </details>

    <details class="detail-section" id="ce-restream-details">
      <summary>
        <span class="ds-chev">&#x25B6;</span>
        <span class="ds-title">Streams &amp; restream URLs</span>
        <span class="ds-glance">${c.sub_url ? 'Main + sub RTSP re-streams for external apps' : 'Main RTSP re-stream for external apps'}</span>
      </summary>
      <div class="ds-body">
        <div class="card-hint" style="margin:0 0 10px 2px">Full RTSP URLs Crumb re-publishes, paste these into external apps (Scrypted, VLC, ffmpeg, Blue Iris) so they pull from Crumb, not the camera. Anyone who can reach these URLs can pull the stream, so treat them as sensitive.</div>
        <div class="form-grid">
          <label class="fg-label" for="ce-restream-main">Main restream</label>
          <div class="fg-ctl">
            <input id="ce-restream-main" class="mono" style="font-size:12px" readonly value="${esc(c.main_url||'')}" onclick="this.select()" title="Main (full-resolution) restream" />
            <button class="ghost sm" onclick="copyText(document.getElementById('ce-restream-main').value)">Copy</button>
          </div>
          ${c.sub_url ? `
          <label class="fg-label" for="ce-restream-sub">Sub restream</label>
          <div class="fg-ctl">
            <input id="ce-restream-sub" class="mono" style="font-size:12px" readonly value="${esc(c.sub_url)}" onclick="this.select()" title="Sub (low-resolution) restream" />
            <button class="ghost sm" onclick="copyText(document.getElementById('ce-restream-sub').value)">Copy</button>
          </div>` : '<div class="fg-full" style="font-size:12px;color:var(--dim2)">No sub stream for this camera.</div>'}
        </div>
      </div>
    </details>`;
  renderProbeReadout(c.id);
  fillRestreamUrls(c.id);
  autoProbeCamera(c);
  cePreviewIcon();
  loadCameraCompat(c.id);
  loadCameraAudioStatus(c.id);
  loadCameraHaLinks(c.id);
}

/* ── Camera compatibility (issue #48) ──
   Match this camera's stored ONVIF make/model against the bundled
   compatibility database and render known quirks / recommended settings, plus
   an "Identify" (ONVIF probe) action and a "Contribute this camera" flow that
   opens a pre-filled GitHub issue in the operator's own browser. */
/* ── Audio-transcoding notice (per camera) ──
   Obsolete: recorded audio is now ALWAYS normalized to gap-filled 48 kHz AAC at
   record time (docs/DECISIONS.md 2026-07-13), because a bit-exact copy of the
   camera's drifting audio clock plays silent on Android. There is no longer a
   per-camera copy-vs-transcode decision for the operator to act on, so this shows
   nothing. Kept as a no-op so the #ce-audio-status slot + call site stay stable
   (the /config/decode-status audio fields remain available for future use). */
async function loadCameraAudioStatus(id) {
  const el = $('ce-audio-status'); if (el) el.innerHTML = '';
}

async function loadCameraCompat(id) {
  const el = $('ce-compat'); if (!el) return;
  const cc = $('ce-compat-contrib'); if (cc) cc.innerHTML = '';
  try {
    const r = await api('/cameras/' + id + '/compat');
    el.innerHTML = renderCompat(id, r);
  } catch (e) {
    el.innerHTML = '<div class="card-hint" style="margin:0">Could not load compatibility info.</div>';
  }
}

function renderCompat(id, r) {
  const contributeBtn = `<button class="ghost sm" onclick="contributeCamera('${esc(id)}')">Contribute this camera</button>`;
  const manual = manualDeviceInfoBlock(id, r);
  // No make read yet: prompt to identify.
  if (!r.make && !r.model) {
    return `<div class="card-hint" style="margin:0">Not identified yet. If this camera supports ONVIF, use <b>Identify (ONVIF)</b> above to read its make and model automatically (Crumb then checks the compatibility database). Cameras with no ONVIF — e.g. added by a direct RTSP URL — have that button disabled; set make and model by hand below.</div>` + manual;
  }
  const idLine = `<div style="margin:0 0 6px 0"><b>${esc(r.make || '(unknown make)')}</b> ${esc(r.model || '')}${r.firmware ? ` <span style="color:var(--dim2)">· firmware ${esc(r.firmware)}</span>` : ''}</div>`;

  if (r.level === 'identified' && r.entry) {
    const e = r.entry;
    let out = `${idLine}<div class="pill ok" style="margin-bottom:8px">In the compatibility database</div>`;
    if (e.quirks && e.quirks.length) {
      out += '<div class="policy-section-title" style="margin-top:6px">Known quirks &amp; fixes</div>';
      for (const q of e.quirks) {
        out += `<div style="margin:4px 0 8px 0"><div><b>${esc(q.summary)}</b>${q.affects && q.affects.length ? ` <span style="color:var(--dim2)">(${q.affects.map(esc).join(', ')})</span>` : ''}</div>`;
        if (q.detail) out += `<div class="card-hint" style="margin:2px 0 0 0">${esc(q.detail)}</div>`;
        if (q.fix) out += `<div style="margin:2px 0 0 0"><span style="color:var(--ok)">Fix:</span> ${esc(q.fix)}</div>`;
        out += '</div>';
      }
    }
    if (e.recommended_settings && e.recommended_settings.length) {
      out += '<div class="policy-section-title" style="margin-top:6px">Recommended settings</div><ul style="margin:4px 0 0 0;padding-left:18px">';
      for (const s of e.recommended_settings) out += `<li style="margin:2px 0">${esc(s)}</li>`;
      out += '</ul>';
    }
    out += `<div class="card-hint" style="margin-top:8px">Full list at <a href="https://docs.crumbvms.com/cameras/compatibility" target="_blank" rel="noopener">docs.crumbvms.com</a>. Something off? ${contributeBtn}</div>`;
    return out + manual;
  }

  if (r.level === 'possible') {
    return `${idLine}<div class="pill warn" style="margin-bottom:8px">Manufacturer recognized, model not in the database</div><div class="card-hint" style="margin:0">Crumb knows this maker but not this exact model. If it works well or has a quirk worth noting, help the next person: ${contributeBtn}</div>` + manual;
  }

  // Detected but not in the DB.
  return `${idLine}<div class="card-hint" style="margin:0 0 8px 0">This camera isn't in the compatibility database yet. If you've got it working (or hit a quirk), consider adding it: ${contributeBtn}</div>` + manual;
}

async function identifyCamera(id) {
  const el = $('ce-compat'); if (el) el.innerHTML = '<div class="card-hint" style="margin:0">Probing ONVIF for make/model&hellip;</div>';
  try {
    const r = await api('/cameras/' + id + '/identify', { method: 'POST' });
    if (el) el.innerHTML = renderCompat(id, r);
    toast('Camera identified' + (r.make ? `: ${r.make} ${r.model || ''}` : ''));
  } catch (e) {
    if (el) el.innerHTML = `<div class="card-hint" style="margin:0;color:var(--danger)">Identify failed: ${esc((e && e.message) || 'ONVIF error')}. Check the ONVIF host and credentials above.</div>`;
  }
}

// Stashed so the copy/open buttons don't have to encode the payload into attrs.
let COMPAT_CONTRIB = null;

async function contributeCamera(id) {
  const host = $('ce-compat-contrib'); if (!host) return;
  host.innerHTML = '<div class="card-hint" style="margin:8px 0 0 0">Preparing report&hellip;</div>';
  try {
    const r = await api('/cameras/' + id + '/compat-report');
    const lines = ['Make: ' + (r.make || '(unknown)'), 'Model: ' + (r.model || '(unknown)')];
    if (r.firmware) lines.push('Firmware: ' + r.firmware);
    COMPAT_CONTRIB = { block: lines.join('\n'), url: r.contribute_url };
    host.innerHTML = `
      <div class="card-hint" style="margin:10px 0 6px 0">This opens a pre-filled GitHub issue in your browser, which you review and submit under your own account. Only this leaves your machine (no IPs, credentials, or stream URLs):</div>
      <pre class="mono" style="background:var(--panel2,#00000022);padding:8px;border-radius:6px;margin:0 0 8px 0;white-space:pre-wrap">${esc(COMPAT_CONTRIB.block)}</pre>
      <div style="display:flex;gap:8px">
        <button class="primary sm" onclick="openCompatForm()">Open contribution form</button>
        <button class="ghost sm" onclick="copyCompatDetails()">Copy details</button>
      </div>`;
  } catch (e) {
    host.innerHTML = `<div class="card-hint" style="margin:8px 0 0 0;color:var(--danger)">Could not prepare the report: ${esc((e && e.message) || 'error')}.</div>`;
  }
}

function openCompatForm() { if (COMPAT_CONTRIB && COMPAT_CONTRIB.url) window.open(COMPAT_CONTRIB.url, '_blank', 'noopener'); }
function copyCompatDetails() { if (COMPAT_CONTRIB) copyText(COMPAT_CONTRIB.block); }

/* Manual make/model/firmware entry (issue #48): for cameras without ONVIF, or to
   correct a wrong probe. Prefilled from the current values; saving writes through
   the camera-edit PUT (/config/cameras/:id) and re-checks the compatibility DB. */
function manualDeviceInfoBlock(id, r) {
  const open = (!r.make && !r.model) ? ' open' : '';
  return `
    <details class="detail-section" style="margin-top:10px"${open}>
      <summary>
        <span class="ds-chev">&#x25B6;</span>
        <span class="ds-title">Set make/model manually</span>
      </summary>
      <div class="ds-body">
        <div class="card-hint" style="margin:0 0 8px 0">For cameras without ONVIF (or to correct a wrong probe), type the make and model so Crumb can still check the compatibility database. Clear a field to blank it.</div>
        <div class="form-grid">
          <label class="fg-label" for="ce-dev-make">Make</label>
          <div class="fg-ctl"><input id="ce-dev-make" value="${esc(r.make || '')}" placeholder="e.g. Uniview" maxlength="200" /></div>
          <label class="fg-label" for="ce-dev-model">Model</label>
          <div class="fg-ctl"><input id="ce-dev-model" value="${esc(r.model || '')}" placeholder="e.g. IPC2124SR3-ADPF28M" maxlength="200" /></div>
          <label class="fg-label" for="ce-dev-fw">Firmware</label>
          <div class="fg-ctl"><input id="ce-dev-fw" value="${esc(r.firmware || '')}" placeholder="optional" maxlength="200" /></div>
        </div>
        <div style="margin-top:8px"><button class="primary sm" onclick="saveCameraDeviceInfo('${esc(id)}')">Save make/model</button></div>
      </div>
    </details>`;
}

async function saveCameraDeviceInfo(id) {
  const make = ($('ce-dev-make').value || '').trim();
  const model = ($('ce-dev-model').value || '').trim();
  const firmware = ($('ce-dev-fw').value || '').trim();
  try {
    // null clears the column (double-option), a string sets it.
    await api('/config/cameras/' + id, { method: 'PUT', body: JSON.stringify({
      make: make || null, model: model || null, firmware: firmware || null,
    }) });
    toast('Make/model saved');
    loadCameraCompat(id);
  } catch (e) {
    toast((e && e.message) || 'Could not save make/model', 'err', 5000);
  }
}

/* ── Camera <-> Home Assistant entity links (issue #52, Phase 1) ──
   Link this camera to HA motion/door sensors (role 'motion') and lights/switches
   /scenes (role 'actuator'). Edited as a set and saved via PUT .../ha/links. */
let HA_LINKS = [];        // working set for the open camera
let HA_CAM_ID = null;
let HA_ENT_CACHE = {};    // domain -> [{entity_id, friendly_name, device_class}], per camera open
let HA_PICKER = null;         // which picker is open: 'motion' | 'actuator' | null
let HA_PICKER_SEARCH = '';
let HA_PICKER_SHOWALL = false;
// device_classes worth linking to a camera; the rest hide under "Other sensors".
const HA_SENSOR_CLASSES = ['motion','occupancy','presence','moving','door','window','opening','garage_door'];

async function loadCameraHaLinks(camId) {
  const el = $('ce-ha'); if (!el) return;
  HA_CAM_ID = camId;
  HA_ENT_CACHE = {};
  try {
    const [links, cfg] = await Promise.all([
      api('/cameras/' + camId + '/ha/links'),
      api('/config/ha').catch(() => ({ enabled: false, base_url: '', has_token: false })),
    ]);
    HA_LINKS = links.map(l => ({ entity_id: l.entity_id, role: l.role, device_class: l.device_class, label: l.label, sort_order: l.sort_order }));
    HA_PICKER = null;
    const configured = !!(cfg && cfg.enabled && cfg.base_url && cfg.has_token);
    renderHaLinks(configured);
  } catch (e) {
    el.innerHTML = '<div class="card-hint" style="margin:0">Could not load Home Assistant links.</div>';
  }
}

function haRolePill(l) {
  if (l.role === 'actuator') return 'control';
  return l.device_class || 'sensor';   // show the class (door/motion/...) for sensors
}

function renderHaLinks(configured) {
  const el = $('ce-ha'); if (!el) return;
  if (!configured) {
    el.innerHTML = '<div class="card-hint" style="margin:0">Configure and enable Home Assistant on the <b>Detection &amp; clips</b> page first, then link this camera\'s sensors and controls here.</div>';
    return;
  }
  const rows = HA_LINKS.map((l, i) => `
    <div style="display:flex;align-items:center;gap:8px;margin:4px 0">
      <span class="pill">${esc(haRolePill(l))}</span>
      <span style="flex:1;font-size:13px">${esc(l.label || l.entity_id)}</span>
      <span class="mono" style="color:var(--dim2);font-size:11px">${esc(l.entity_id)}</span>
      <button class="ghost sm" onclick="removeHaLink(${i})">Remove</button>
    </div>`).join('') || '<div class="card-hint" style="margin:4px 0">No links yet.</div>';
  el.innerHTML = `
    <div>${rows}</div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center">
      <button class="ghost sm" onclick="haOpenPicker('motion')">+ Add sensor</button>
      <button class="ghost sm" onclick="haOpenPicker('actuator')">+ Add control</button>
      <button class="primary sm" onclick="saveHaLinks()" style="margin-left:auto">Save links</button>
    </div>
    <div id="ce-ha-picker"></div>
    <div id="ce-ha-msg" class="form-msg"></div>`;
  if (HA_PICKER) renderHaPicker();
}

/* Reusable search + grouped entity picker (avoids a wall-of-entities select).
   Sensors: whitelist device_classes grouped first, rest under a collapsed
   "Other sensors" bucket + a Show-all toggle. Controls: grouped by domain. */
async function haOpenPicker(role) {
  HA_PICKER = role; HA_PICKER_SEARCH = ''; HA_PICKER_SHOWALL = false;
  const domain = role === 'motion' ? 'binary_sensor' : 'controls';
  if (!HA_ENT_CACHE[domain]) {
    const box = $('ce-ha-picker'); if (box) box.innerHTML = '<div class="card-hint" style="margin-top:8px">Loading entities from Home Assistant&hellip;</div>';
    try { HA_ENT_CACHE[domain] = await api('/ha/entities?domain=' + domain); }
    catch (e) { const b = $('ce-ha-picker'); if (b) b.innerHTML = `<div class="form-msg err" style="margin-top:8px">${esc((e && e.message) || 'Failed to load entities')}</div>`; return; }
  }
  renderHaPicker();
}

function haClosePicker() { HA_PICKER = null; renderHaLinks(true); }
function haPickerSearch(v) { HA_PICKER_SEARCH = v; renderHaResults(); }
function haToggleShowAll() { HA_PICKER_SHOWALL = !HA_PICKER_SHOWALL; renderHaResults(); }

function renderHaPicker() {
  const box = $('ce-ha-picker'); if (!box || !HA_PICKER) return;
  const kind = HA_PICKER === 'motion' ? 'sensors' : 'controls';
  box.innerHTML = `
    <div class="policy-section" style="margin-top:8px">
      <div style="display:flex;gap:8px;align-items:center">
        <input id="ha-pick-search" placeholder="Search ${kind}&hellip;" value="${esc(HA_PICKER_SEARCH)}" oninput="haPickerSearch(this.value)" style="flex:1" />
        <button class="ghost sm" onclick="haClosePicker()">Done</button>
      </div>
      <div id="ha-pick-extra"></div>
      <div id="ha-pick-results" style="max-height:240px;overflow:auto;margin-top:6px"></div>
    </div>`;
  renderHaResults();
  const si = $('ha-pick-search'); if (si) si.focus();
}

function renderHaResults() {
  const results = $('ha-pick-results'); const extra = $('ha-pick-extra');
  if (!results || !HA_PICKER) return;
  const role = HA_PICKER;
  const domain = role === 'motion' ? 'binary_sensor' : 'controls';
  const all = HA_ENT_CACHE[domain] || [];
  const q = HA_PICKER_SEARCH.trim().toLowerCase();
  const match = e => !q || e.entity_id.toLowerCase().includes(q) || (e.friendly_name || '').toLowerCase().includes(q);
  const linked = new Set(HA_LINKS.filter(l => l.role === role).map(l => l.entity_id));
  const groups = [];
  if (extra) extra.innerHTML = '';
  if (role === 'motion') {
    const relevant = [], other = [];
    all.filter(match).forEach(e => (HA_SENSOR_CLASSES.includes(e.device_class) ? relevant : other).push(e));
    const byClass = {};
    relevant.forEach(e => { (byClass[e.device_class] = byClass[e.device_class] || []).push(e); });
    Object.keys(byClass).sort().forEach(c => groups.push({ title: c, items: byClass[c] }));
    if (other.length && (HA_PICKER_SHOWALL || q)) groups.push({ title: 'Other sensors', items: other });
    if (extra && other.length && !q) extra.innerHTML = `<label class="chk" style="font-size:12px;margin-top:6px"><input type="checkbox" ${HA_PICKER_SHOWALL ? 'checked' : ''} onchange="haToggleShowAll()"/> Show all binary sensors (${other.length} more)</label>`;
  } else {
    const byDom = {};
    all.filter(match).forEach(e => { const d = e.entity_id.split('.')[0]; (byDom[d] = byDom[d] || []).push(e); });
    Object.keys(byDom).sort().forEach(d => groups.push({ title: d, items: byDom[d] }));
  }
  results.innerHTML = groups.map(g => `
    <div style="margin-top:6px"><div style="font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.04em">${esc(g.title)}</div>
      ${g.items.map(e => `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;${linked.has(e.entity_id) ? 'opacity:.45' : ''}" onclick="haPick('${esc(e.entity_id)}')">
        <span style="flex:1;font-size:13px">${esc(e.friendly_name)}${linked.has(e.entity_id) ? ' (linked)' : ''}</span>
        <span class="mono" style="color:var(--dim2);font-size:11px">${esc(e.entity_id)}</span></div>`).join('')}
    </div>`).join('') || '<div class="card-hint" style="margin:4px 0">No matching entities.</div>';
}

function haPick(entity_id) {
  const role = HA_PICKER; if (!role) return;
  const domain = role === 'motion' ? 'binary_sensor' : 'controls';
  const ent = (HA_ENT_CACHE[domain] || []).find(e => e.entity_id === entity_id);
  if (!ent) return;
  if (HA_LINKS.some(l => l.entity_id === entity_id && l.role === role)) return;
  HA_LINKS.push({ entity_id, role, device_class: ent.device_class || null, label: ent.friendly_name || null, sort_order: HA_LINKS.length });
  renderHaLinks(true);
}

function removeHaLink(i) {
  HA_LINKS.splice(i, 1);
  renderHaLinks(true);
}

async function saveHaLinks() {
  const body = { links: HA_LINKS.map((l, i) => ({ entity_id: l.entity_id, role: l.role, device_class: l.device_class, label: l.label, sort_order: i })) };
  try {
    const saved = await api('/cameras/' + HA_CAM_ID + '/ha/links', { method: 'PUT', body: JSON.stringify(body) });
    HA_LINKS = saved.map(l => ({ entity_id: l.entity_id, role: l.role, device_class: l.device_class, label: l.label, sort_order: l.sort_order }));
    HA_PICKER = null;
    toast('Home Assistant links saved.');
    renderHaLinks(true);
  } catch (e) { setMsg('ce-ha-msg', (e && e.message) || 'Save failed', 'err'); }
}

/* At-a-glance summary line for the collapsed "Camera info (probed)" section: the
   main stream's resolution / fps / codec if probed, else a hint. */
function ceUpdateProbeGlance(camId) {
  const el = $('ce-probe-glance'); if (!el) return;
  const d = (CAM_PROBES[camId] || {}).main;
  if (!d) { el.textContent = 'Probing the live stream…'; return; }
  if (d._error) { el.textContent = 'Probe failed, open to see why'; return; }
  const bits = [];
  if (d.width && d.height) bits.push(`${d.width}×${d.height}`);
  if (d.fps) bits.push(`${d.fps.toFixed(0)} fps`);
  if (d.codec) bits.push(d.codec);
  if (d.bitrate_kbps) bits.push(`${(d.bitrate_kbps / 1000).toFixed(1)} Mbps`);
  el.textContent = bits.length ? bits.join(' · ') : 'Connected';
}

/* Live-update the small glyph next to the camera Icon picker: '' (Auto) shows the
   glyph for the chosen type; an explicit pick shows that glyph. Mirrors camIcon(). */
function cePreviewIcon() {
  const el = $('ce-icon-preview'); if (!el) return;
  const override = $('ce-icon') ? $('ce-icon').value : '';
  const type = $('ce-type') ? $('ce-type').value : 'other';
  el.innerHTML = icon(override || camTypeIcon(type), 15);
}

/* Probed-info readout: shows resolution / fps / codec / bitrate per stream role,
   or a "— (probing…)" placeholder until a Test has populated CAM_PROBES (#75). */
function renderProbeReadout(camId) {
  const el = $('ce-probe-readout'); if (!el) return;
  const c = CAMS.find(x => x.id === camId);
  const probe = CAM_PROBES[camId] || {};
  const blank = (label, note) =>
    `<div class="pk">${label} resolution</div><div>— <span style="color:var(--dim2)">${note}</span></div>
     <div class="pk">${label} frame rate</div><div>—</div>
     <div class="pk">${label} codec</div><div>—</div>
     <div class="pk">${label} bitrate</div><div>—</div>`;
  const line = (label, slot, present) => {
    if (!present) return blank(label, '(no stream)');
    const d = probe[slot];
    if (PROBE_INFLIGHT.has(camId + ':' + slot) && !d) return blank(label, '(probing…)');
    if (!d) return blank(label, '(probing…)');
    if (d._error) {
      return `<div class="pk">${label} resolution</div><div><span style="color:var(--danger)">${esc(d._error)}</span></div>
        <div class="pk">${label} frame rate</div><div>—</div>
        <div class="pk">${label} codec</div><div>—</div>
        <div class="pk">${label} bitrate</div><div>—</div>`;
    }
    const res = (d.width && d.height) ? `${d.width}×${d.height}` : '—';
    const fps = d.fps ? `${d.fps.toFixed(1)} fps` : '—';
    const codec = d.codec ? esc(d.codec) : '—';
    const br = d.bitrate_kbps ? `${(d.bitrate_kbps / 1000).toFixed(1)} Mbps` : '—';
    return `<div class="pk">${label} resolution</div><div>${res}</div>
      <div class="pk">${label} frame rate</div><div>${fps}</div>
      <div class="pk">${label} codec</div><div>${codec}</div>
      <div class="pk">${label} bitrate</div><div>${br}</div>`;
  };
  const hasSub = !!(c && c.sub_url);
  el.innerHTML = `<div class="probe-grid">${line('Main', 'main', true)}${line('Sub', 'sub', hasSub)}</div>`;
  ceUpdateProbeGlance(camId); // keep the collapsed-section glance line in sync
}

/* ── Camera tab 2: Motion (motion tuning + exclusion-zone painter) ── */
const CM_GRID_OPTS = [['8,5','Coarse (8×5)'],['16,9','Standard (16×9)'],['24,14','Fine (24×14)'],['32,18','Very fine (32×18)'],['48,27','Ultra fine (48×27)']];
function renderCamMotionTab(c) {
  const eff = effectivePolicy(c);
  const p = (eff.policy) || c.policy || {};
  const sens = p.motion_sensitivity || 'dynamic';
  const gridKey = `${Number(c.motion_grid_cols)||16},${Number(c.motion_grid_rows)||9}`;
  const gridOpts = CM_GRID_OPTS.map(([v,l]) => `<option value="${v}" ${gridKey===v?'selected':''}>${l}</option>`).join('');
  // Manual-floor SLIDER seed: the effective threshold as a % of frame (0.05–5).
  const thPct = p.motion_threshold != null ? +(p.motion_threshold * 100).toFixed(2) : 0.5;
  // LIVE-TUNER-FIRST layout (UX principle): the tuner window is pinned at the TOP,

  // meter result needs no scrolling.
  $('cam-tab-body').innerHTML = `
    <!-- 1) Live tuner window (pinned at top) -->
    <div class="policy-section" id="cm-zones-section" style="margin-top:0">
      <div class="rp-section-head">
        <div class="policy-section-title">Live motion tuner</div>
        <select id="cm-grid-size" onchange="cmSetGrid(this.value)" style="font-size:12px;width:auto" title="Exclusion-zone painting resolution">${gridOpts}</select>
      </div>
      <div class="card-hint" style="margin:-2px 0 10px 2px">Paint over areas to <b>ignore</b> (e.g. a tree or busy street). Click or drag to add a red exclusion; right-click or right-drag to erase. The recorder skips motion inside the red zones. <b style="color:#28d25a">Green</b> = motion the recorder is seeing right now, tune the settings below until only real events cross the floor.</div>
      <div class="cm-stage" id="cm-stage">
        <img id="cm-snapshot" alt="" />
        <canvas id="cm-canvas"></canvas>
        <div class="cm-frame-ph" id="cm-frame-ph">Loading camera frame…</div>
      </div>
      <div class="cm-meter-row">
        <span class="cm-meter-label">Live motion</span>
        <div class="cm-meter"><div class="cm-meter-fill" id="cm-meter-fill"></div><div class="cm-meter-mark" id="cm-meter-mark"></div></div>
        <span class="cm-meter-text" id="cm-meter-text">waiting for recorder…</span>
      </div>
      <div class="cm-painter-bar">
        <span class="cm-hint" id="cm-mask-status"></span>
        <button class="ghost sm" onclick="cmClearMask()">Clear all</button>
        <button class="primary sm" onclick="cmSaveMask()">Save zones</button>
      </div>
      <div id="cm-mask-err" class="field-err hidden"></div>
    </div>

    <!-- 2) Settings under the tuner, in two columns -->
    <div class="mt-settings-cols">
      <!-- col 1: detection source + algorithm + "currently loaded" infobox -->
      <div class="policy-section" style="margin-top:0">
        <div class="policy-section-title">Detection source</div>
        <div class="card-hint" style="margin:-2px 0 10px 2px">How recording is triggered. Enable one or more; the camera records on the <b>union</b> of every enabled source. <b>Pixel analysis</b> runs Crumb's own detector on the sub-stream; <b>Frigate detections</b> records when Frigate's object detector fires; <b>Home Assistant sensors</b> records when this camera's linked HA motion/door sensors fire (linked below). With none enabled a Motion-mode camera records everything (fail-open).</div>
        <div class="form-grid narrow" style="align-items:start">
          <label class="fg-label">Sources ${infoHint(MOTION_SOURCE_HINT)}</label>
          <div class="fg-ctl">
            <label class="chk"><input type="checkbox" id="ce-motion-pixel" ${(c.motion_pixel_enabled ?? ((c.motion_source||'pixel')==='pixel'))?'checked':''} onchange="ceMotionSourceChanged()"/> Pixel analysis (Crumb)</label>
            <label class="chk"><input type="checkbox" id="ce-motion-frigate" ${(c.motion_frigate_enabled ?? (c.motion_source==='frigate'))?'checked':''} onchange="ceMotionSourceChanged()"/> Frigate detections</label>
            <label class="chk"><input type="checkbox" id="ce-motion-ha" ${(c.motion_ha_enabled ?? (c.motion_source==='ha'))?'checked':''} onchange="ceMotionSourceChanged()"/> Home Assistant sensors</label>
          </div>

        <div id="ce-motion-algo-wrap" style="margin-top:8px">
          <div class="form-grid narrow">
            <label class="fg-label" for="ce-motion-algorithm">Algorithm ${infoHint(MOTION_ALGO_HINT_ALL)}</label>
            <div class="fg-ctl">
              <select id="ce-motion-algorithm" onchange="ceMotionSourceChanged()" style="font-size:13px">
                ${['census','framediff','mog2','opticalflow','ensemble'].map(a => `<option value="${a}" ${((c.motion_algorithm||'census')===a)?'selected':''}>${motionAlgoLabel(a)}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
        <div id="ce-motion-algo-help" class="card-hint" style="margin:8px 0 0 2px"></div>
        <div id="ce-detector-box" class="detector-box"></div>
      </div>

      <!-- col 2: sensitivity (mode + manual-floor SLIDER) + buffers -->
      <div class="policy-section" style="margin-top:0">
        <div class="policy-section-title">Sensitivity &amp; buffers</div>
        <div class="card-hint" style="margin:-2px 0 10px 2px">From the effective policy (${esc(p.name || 'Default')}). Editing here pins <b>custom motion settings to this camera only</b>. For many cameras at once, edit the policy in <b>Recording</b>.</div>
        <div class="form-grid narrow">
          <label class="fg-label" for="cm-sensitivity">Sensitivity mode ${infoHint('Dynamic: Crumb auto-tunes the trigger floor to the scene (recommended). Manual: you set a fixed triggering floor below, the recorder only records above it.')}</label>
          <div class="fg-ctl">
            <select id="cm-sensitivity" onchange="cmSensitivityChanged()" style="font-size:13px">
              <option value="dynamic" ${sens==='dynamic'?'selected':''}>Dynamic (auto-tuned)</option>
              <option value="manual" ${sens==='manual'?'selected':''}>Manual (fixed floor)</option>
            </select>

        </div>

          <div class="form-grid narrow">
            <label class="fg-label" for="cm-threshold">Triggering floor (% of frame) ${infoHint('Smallest moving area that triggers recording, as a fraction of the frame. Lower = more sensitive. The white marker on the live meter above tracks this floor.')}</label>
            <div class="fg-ctl">
              <div class="mt-slider-row" style="flex:1;margin-top:0">
                <input id="cm-threshold-slider" type="range" min="0.05" max="5" step="0.05" value="${thPct}" oninput="cmThresholdSliderChanged()" />
                <span class="mt-slider-val" id="cm-threshold-val"></span>
              </div>
            </div>
            <div class="fg-label"></div>
            <div class="fg-ctl"><input id="cm-threshold" type="number" min="0.05" max="5" step="0.05" value="${thPct}" oninput="cmThresholdInputChanged()" style="max-width:110px" placeholder="e.g. 0.5" /><span class="card-hint" style="margin:0" id="cm-threshold-note"></span></div>
          </div>
        </div>
        <div class="form-grid narrow" style="margin-top:8px">
          <label class="fg-label" for="cm-pre">Pre-event buffer (s)</label>
          <div class="fg-ctl"><input id="cm-pre" type="number" min="0" value="${p.motion_pre_seconds ?? 5}" style="max-width:110px" /></div>
          <label class="fg-label" for="cm-post">Post-event buffer (s)</label>
          <div class="fg-ctl"><input id="cm-post" type="number" min="0" value="${p.motion_post_seconds ?? 30}" style="max-width:110px" /></div>
        </div>
      </div>
    </div>`;
  ceMotionSourceChanged();
  ceRenderDetectorBox(c);
  cmSensitivityChanged();
  cmSyncThresholdLabel();
  cmInitPainter(c);
}
/* Keep the slider, the number input, and the live meter marker in lockstep.
   cmState.liveThreshold drives the meter marker (cmRenderMeter); when in Manual
   mode we set it from the slider so the marker MOVES as the operator drags. */
function cmThresholdSliderChanged() {
  const s = $('cm-threshold-slider'); if (!s) return;
  if ($('cm-threshold')) $('cm-threshold').value = s.value;
  cmApplyManualFloorToMeter();
  cmSyncThresholdLabel();
}
function cmThresholdInputChanged() {
  const n = $('cm-threshold'); if (!n) return;
  if ($('cm-threshold-slider') && n.value !== '') $('cm-threshold-slider').value = n.value;
  cmApplyManualFloorToMeter();
  cmSyncThresholdLabel();
}
function cmSyncThresholdLabel() {
  const v = $('cm-threshold-val'); if (!v) return;
  const n = $('cm-threshold');
  const val = (n && n.value !== '') ? Number(n.value) : null;
  v.textContent = val != null ? `${val.toFixed(2)}%` : '—';
}
/* In Manual mode, the meter marker should reflect the floor the operator is
   choosing (not the recorder's last-published floor) so dragging gives instant
   visual feedback. Re-render the meter from the slider value (% → fraction). */
function cmApplyManualFloorToMeter() {
  const modeEl = $('cm-sensitivity');
  if (!modeEl || modeEl.value !== 'manual') return;
  const n = $('cm-threshold');
  if (n && n.value !== '') cmState.liveThreshold = Number(n.value) / 100;
  cmRenderMeter();
}
/* "Currently loaded" detector infobox (item #2): the recorder respawns the motion
   worker when motion_source/algorithm changes, so the live heatmap reflects the new
   detector within seconds. The motion-grid endpoint doesn't echo the active detector,
   so we label from the SAVED camera value and note the reload lag. Reading the
   PICKER values (not the saved row) lets the box update the instant the user changes
   a picker, before the save round-trips. */
function ceRenderDetectorBox(c) {
  const box = $('ce-detector-box'); if (!box) return;
  const px = $('ce-motion-pixel') ? $('ce-motion-pixel').checked : !!c.motion_pixel_enabled;
  const fr = $('ce-motion-frigate') ? $('ce-motion-frigate').checked : !!c.motion_frigate_enabled;
  const ha = $('ce-motion-ha') ? $('ce-motion-ha').checked : !!c.motion_ha_enabled;
  const savedAlgo = c.motion_algorithm || 'census';
  const pickedAlgo = $('ce-motion-algorithm') ? $('ce-motion-algorithm').value : savedAlgo;
  const names = [];
  if (px) names.push(`Pixel analysis, ${motionAlgoLabel(px ? pickedAlgo : savedAlgo)}`);
  if (fr) names.push('Frigate detections');
  if (ha) names.push('Home Assistant sensors');
  const loaded = names.length ? names.join(' + ') : 'NONE — records everything (fail-open)';
  // Pending = the pickers differ from the saved values (a change not yet saved).
  const changed = (px !== !!c.motion_pixel_enabled)
    || (fr !== !!c.motion_frigate_enabled)
    || (ha !== !!c.motion_ha_enabled)
    || (px && pickedAlgo !== savedAlgo);
  const note = changed
    ? 'Save to apply, the recorder reloads its sources and the live heatmap above will follow within a few seconds.'
    : 'The live heatmap above reflects the pixel detector. After a change the recorder reloads within a few seconds.';
  box.innerHTML = `<span class="db-ico">${icon('reload', 14)}</span><span>Recorder currently loaded: <b>${esc(loaded)}</b><br><span class="db-note">${esc(note)}</span></span>`;
}
/* Toggle the manual-floor controls on the sensitivity mode. In Dynamic mode the
   recorder auto-tunes the floor, so the slider/threshold are informational only. */
function cmSensitivityChanged() {
  const mode = $('cm-sensitivity') ? $('cm-sensitivity').value : 'dynamic';
  const wrap = $('cm-threshold-wrap');
  const note = $('cm-threshold-note');
  if (wrap) wrap.style.opacity = mode === 'manual' ? '1' : '.5';
  const inp = $('cm-threshold'); if (inp) inp.disabled = mode !== 'manual';
  const sld = $('cm-threshold-slider'); if (sld) sld.disabled = mode !== 'manual';
  if (note) note.textContent = mode === 'manual'
    ? ''
    : 'In Dynamic mode the floor is auto-tuned, this value is not used until you switch to Manual.';
  // Entering Manual: pin the meter marker to the chosen floor. Leaving Manual: let
  // the recorder's published floor drive the marker again (next cmPoll refreshes it).
  if (mode === 'manual') cmApplyManualFloorToMeter();
}
/* "Edit motion zones…" now scrolls to the inline painter below instead of a toast. */
function editMotionZones() {
  const el = $('cm-zones-section');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── Inline motion-exclusion-zone painter (ported from the desktop tuner) ──
   Draws the camera's still frame (authed frame proxy) with a grid overlay; the
   operator paints cells to EXCLUDE. Cells are saved as the camera's motion_mask
   (normalized [x,y,w,h] rects, per-row runs), the SAME shape the desktop/Android
   write, via PUT /config/cameras/{id}; the chosen grid persists on the same PUT
   (motion_grid_cols/rows). */
const cmState = { camId: null, cols: 16, rows: 9, excluded: new Set(), drag: null,
  grid: [], gridCols: 0, gridRows: 0, liveScore: null, liveThreshold: null,
  pollTimer: null, snapTimer: null };
const CM_VALID_GRIDS = ['8,5','16,9','24,14','32,18','48,27'];
function cmCellKey(gx, gy) { return gx + ',' + gy; }

function cmInitPainter(c) {
  cmState.camId = c.id;
  let gc = Number(c.motion_grid_cols) || 16, gr = Number(c.motion_grid_rows) || 9;
  if (!CM_VALID_GRIDS.includes(gc + ',' + gr)) { gc = 16; gr = 9; }
  cmState.cols = gc; cmState.rows = gr;
  cmState.drag = null;
  cmMaskErr('');
  cmLoadMaskToCells(c);
  // Load the still frame (authed proxy, NOT go2rtc :1984). Swap in only after it
  // decodes so the <img> never flashes a broken-link icon.
  const snap = $('cm-snapshot'), ph = $('cm-frame-ph');
  let attempts = 0;
  const fail = () => {
    if (cmState.camId !== c.id) return;
    if (attempts++ < 4) { setTimeout(tryLoad, 800); }
    else if (ph) ph.textContent = 'Camera frame unavailable (stream warming up). Zones can still be painted on the grid.';
    cmResizeCanvas(); cmDrawGrid();
  };
  const tryLoad = () => {
    // Scoped media token in the query (not the full JWT), audit 2026-07-05 #2.
    snapshotUrl(c.id).then(url => {
      const pre = new Image();
      pre.onload = () => {
        if (cmState.camId !== c.id) return; // tab/camera changed while loading
        snap.src = pre.src; snap.style.display = 'block';
        if (ph) ph.style.display = 'none';
        cmFitStage(pre.naturalWidth, pre.naturalHeight);
        cmResizeCanvas(); cmDrawGrid();
      };
      pre.onerror = fail;
      pre.src = url;
    }).catch(fail);
  };
  tryLoad();
  // Wire pointer handlers (per-render; on* assignments are idempotent).
  const cv = $('cm-canvas');
  if (cv) {
    cv.oncontextmenu = e => e.preventDefault(); // right-click erases, not a menu
    cv.onpointerdown = cmPointerDown;
    cv.onpointermove = cmPointerMove;
  }
  // Window-level listeners wired ONCE (avoid stacking on every camera/tab render).
  if (!cmState._wired) {
    cmState._wired = true;
    window.addEventListener('pointerup', cmPointerUp);
    window.addEventListener('resize', () => { if (cmPainterActive()) { cmResizeCanvas(); cmDrawGrid(); } });
  }
  cmUpdateStatus();
  cmStartLive(); // live motion heatmap + meter + periodic frame refresh
}

/* Size the stage to the frame's REAL aspect ratio so object-fit:contain fills it
   with NO letterbox, otherwise the grid paints over black bars and the saved
   zones map to the wrong image regions (the "scale way off" bug). Height is capped
   by limiting WIDTH (not max-height, which would re-break the aspect). */
function cmFitStage(nw, nh) {
  const stage = $('cm-stage');
  if (!stage || !(nw > 0) || !(nh > 0)) return;
  const maxH = Math.max(200, Math.round((window.innerHeight || 800) * 0.5));
  stage.style.aspectRatio = `${nw} / ${nh}`;
  stage.style.maxHeight = 'none';
  stage.style.maxWidth = Math.round(maxH * nw / nh) + 'px';
}

/* Live loop: poll the recorder's motion-grid (green heatmap + meter) and refresh
   the backdrop frame, so the operator tunes against motion AS IT HAPPENS. */
function cmStartLive() {
  cmStopLive();
  cmPoll();
  cmState.pollTimer = setInterval(cmPoll, 500);          // motion heatmap + meter
  cmState.snapTimer = setInterval(cmRefreshFrame, 2000); // live backdrop frame
}
function cmStopLive() {
  if (cmState.pollTimer) { clearInterval(cmState.pollTimer); cmState.pollTimer = null; }
  if (cmState.snapTimer) { clearInterval(cmState.snapTimer); cmState.snapTimer = null; }
}
async function cmPoll() {
  if (!cmPainterActive()) { cmStopLive(); return; } // left the tuner → self-terminate
  try {
    const res = await fetch(`/cameras/${encodeURIComponent(cmState.camId)}/motion-grid`,
      { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (!res.ok) return;
    const g = await res.json();
    if (g && Array.isArray(g.cells) && (g.cols | 0) > 0 && (g.rows | 0) > 0) {
      cmState.gridCols = g.cols | 0; cmState.gridRows = g.rows | 0; cmState.grid = g.cells;
      if (typeof g.score === 'number') cmState.liveScore = g.score;
      // In Manual mode the meter marker tracks the operator's chosen floor (the
      // slider), so don't let the recorder's published threshold clobber it.
      const manual = $('cm-sensitivity') && $('cm-sensitivity').value === 'manual';
      if (!manual && typeof g.threshold === 'number') cmState.liveThreshold = g.threshold;
      cmDrawGrid(); cmRenderMeter();
    }
  } catch { /* transient, ignore */ }
}
/* Reload the backdrop frame (preload-swap → no flash). Keeps last good frame on error. */
function cmRefreshFrame() {
  if (!cmPainterActive()) { cmStopLive(); return; }
  const id = cmState.camId, snap = $('cm-snapshot');
  if (!id || !snap) return;
  // Scoped media token in the query (not the full JWT), audit 2026-07-05 #2.
  snapshotUrl(id).then(url => {
    const pre = new Image();
    pre.onload = () => {
      if (cmState.camId !== id) return;
      snap.src = pre.src; snap.style.display = 'block';
      cmFitStage(pre.naturalWidth, pre.naturalHeight);
    };
    pre.src = url;
  }).catch(() => {});
}
/* Live motion meter: fill = recorder's largest-blob score, marker = effective floor
   (both fractions of the frame). Past the marker → recording right now. */
function cmRenderMeter() {
  const fill = $('cm-meter-fill'), mark = $('cm-meter-mark'), txt = $('cm-meter-text');
  if (!fill) return;
  const scorePct = cmState.liveScore != null ? cmState.liveScore * 100 : null;
  const floorPct = cmState.liveThreshold != null ? cmState.liveThreshold * 100 : null;
  if (scorePct == null || floorPct == null) {
    fill.style.width = '0%'; if (mark) mark.style.display = 'none';
    if (txt) { txt.textContent = 'waiting for recorder…'; txt.style.color = 'var(--dim)'; }
    return;
  }
  const fullScale = Math.max(1.0, floorPct * 4.5);
  const over = scorePct >= floorPct;
  fill.style.width = Math.min(100, (scorePct / fullScale) * 100) + '%';
  fill.style.background = over ? 'var(--danger)' : 'var(--accent)';
  if (mark) { mark.style.display = 'block'; mark.style.left = Math.min(100, (floorPct / fullScale) * 100) + '%'; }
  if (txt) {
    txt.textContent = `${scorePct.toFixed(1)}% motion · floor ${floorPct.toFixed(1)}%${over ? ' · RECORDING' : ''}`;
    txt.style.color = over ? 'var(--danger)' : 'var(--dim)';
  }
}

function cmMaskErr(msg) {
  const el = $('cm-mask-err'); if (!el) return;
  el.textContent = msg || '';
  el.classList.toggle('hidden', !msg);
}
function cmUpdateStatus() {
  const el = $('cm-mask-status'); if (!el) return;
  const n = cmState.excluded.size;
  el.textContent = n ? `${n} cell${n!==1?'s':''} excluded.` : 'No zones, the whole frame is monitored.';
}

/* Load existing motion_mask (normalized rects) → excluded cells at the current grid. */
function cmLoadMaskToCells(c) {
  cmState.excluded.clear();
  const mask = c.motion_mask;
  if (!Array.isArray(mask)) return;
  const rects = mask.filter(r => Array.isArray(r) && r.length >= 4 && typeof r[0] === 'number');
  const hasPolygon = mask.some(r => Array.isArray(r) && Array.isArray(r[0]));
  if (hasPolygon) cmMaskErr('This camera has a legacy polygon mask that can’t be shown here, saving will replace it.');
  cmRectsToCells(rects);
}
/* Mark a cell excluded if its center falls inside any rect. */
function cmRectsToCells(rects) {
  cmState.excluded.clear();
  for (let gy = 0; gy < cmState.rows; gy++) {
    for (let gx = 0; gx < cmState.cols; gx++) {
      const cxN = (gx + 0.5) / cmState.cols, cyN = (gy + 0.5) / cmState.rows;
      for (const r of rects) {
        if (cxN >= r[0] && cxN < r[0] + r[2] && cyN >= r[1] && cyN < r[1] + r[3]) { cmState.excluded.add(cmCellKey(gx, gy)); break; }
      }
    }
  }
}
/* Excluded cells → normalized [x,y,w,h] rects (merged into per-row runs). */
function cmCellsToMask() {
  const rects = [];
  for (let gy = 0; gy < cmState.rows; gy++) {
    let runStart = -1;
    for (let gx = 0; gx <= cmState.cols; gx++) {
      const on = gx < cmState.cols && cmState.excluded.has(cmCellKey(gx, gy));
      if (on && runStart < 0) runStart = gx;
      else if (!on && runStart >= 0) {
        rects.push([runStart / cmState.cols, gy / cmState.rows, (gx - runStart) / cmState.cols, 1 / cmState.rows]);
        runStart = -1;
      }
    }
  }
  return rects;
}
/* Change the authoring grid, preserving the painted area (cells → rects → cells). */
function cmSetGrid(value) {
  const [c, r] = value.split(',').map(Number);
  if (!c || !r) return;
  const rects = cmCellsToMask();   // capture area at OLD resolution
  cmState.cols = c; cmState.rows = r;
  cmRectsToCells(rects);           // re-derive at NEW resolution
  cmDrawGrid(); cmUpdateStatus();
}

function cmResizeCanvas() {
  const cv = $('cm-canvas'), stage = $('cm-stage'); if (!cv || !stage) return;
  const rect = stage.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.max(1, Math.round(rect.width * dpr));
  cv.height = Math.max(1, Math.round(rect.height * dpr));
}
function cmDrawGrid() {
  const cv = $('cm-canvas'); if (!cv) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  // 1. Live motion heatmap (recorder's own grid resolution, independent of the
  //    authoring/exclusion grid). Green = motion the recorder is scoring right now.
  if (Array.isArray(cmState.grid) && cmState.gridCols > 0 && cmState.gridRows > 0) {
    const hcw = W / cmState.gridCols, hch = H / cmState.gridRows;
    for (let gy = 0; gy < cmState.gridRows; gy++) for (let gx = 0; gx < cmState.gridCols; gx++) {
      const intensity = cmState.grid[gy * cmState.gridCols + gx] || 0;
      if (intensity > 0.5) {
        const a = Math.min(1, 0.5 + (intensity / 100) * 0.5);
        ctx.fillStyle = `rgba(40,210,90,${a})`;
        ctx.fillRect(gx * hcw, gy * hch, hcw, hch);
      }
    }
  }
  const cols = cmState.cols, rows = cmState.rows;
  const cw = W / cols, ch = H / rows;
  // Excluded cells = red with a diagonal slash.
  for (let gy = 0; gy < rows; gy++) for (let gx = 0; gx < cols; gx++) {
    if (cmState.excluded.has(cmCellKey(gx, gy))) {
      const x = gx * cw, y = gy * ch;
      ctx.fillStyle = 'rgba(229,72,77,0.32)';
      ctx.fillRect(x, y, cw, ch);
      ctx.strokeStyle = 'rgba(229,72,77,0.8)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, y + ch); ctx.lineTo(x + cw, y); ctx.stroke();
    }
  }
  // Grid lines.
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
  for (let gx = 1; gx < cols; gx++) { ctx.beginPath(); ctx.moveTo(gx * cw, 0); ctx.lineTo(gx * cw, H); ctx.stroke(); }
  for (let gy = 1; gy < rows; gy++) { ctx.beginPath(); ctx.moveTo(0, gy * ch); ctx.lineTo(W, gy * ch); ctx.stroke(); }
  // Drag preview, white add box / amber erase box.
  if (cmState.drag) {
    const { ax, ay, cx, cy, erase } = cmState.drag;
    const x0 = Math.min(ax, cx) * cw, y0 = Math.min(ay, cy) * ch;
    const x1 = (Math.max(ax, cx) + 1) * cw, y1 = (Math.max(ay, cy) + 1) * ch;
    if (erase) { ctx.fillStyle = 'rgba(245,166,35,0.20)'; ctx.fillRect(x0, y0, x1 - x0, y1 - y0); }
    ctx.strokeStyle = erase ? 'rgba(245,166,35,0.95)' : 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2;
    ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
  }
}
function cmCellFromEvent(e) {
  const cv = $('cm-canvas'); const r = cv.getBoundingClientRect();
  const gx = Math.max(0, Math.min(cmState.cols - 1, Math.floor((e.clientX - r.left) / r.width * cmState.cols)));
  const gy = Math.max(0, Math.min(cmState.rows - 1, Math.floor((e.clientY - r.top) / r.height * cmState.rows)));
  return { gx, gy };
}
function cmPainterActive() { return selKind === 'camera' && activeCamTab === 'motion' && cmState.camId === selId; }
function cmPointerDown(e) {
  if (!cmPainterActive()) return;
  e.preventDefault();
  const { gx, gy } = cmCellFromEvent(e);
  cmState.drag = { ax: gx, ay: gy, cx: gx, cy: gy, erase: e.button === 2 };
  cmDrawGrid();
}
function cmPointerMove(e) {
  if (!cmState.drag) return;
  const { gx, gy } = cmCellFromEvent(e);
  cmState.drag.cx = gx; cmState.drag.cy = gy;
  cmDrawGrid();
}
function cmPointerUp() {
  if (!cmState.drag) return;
  const { ax, ay, cx, cy, erase } = cmState.drag;
  cmState.drag = null;
  const x0 = Math.min(ax, cx), x1 = Math.max(ax, cx), y0 = Math.min(ay, cy), y1 = Math.max(ay, cy);
  if (x0 === x1 && y0 === y1) {
    const k = cmCellKey(x0, y0);
    if (erase) cmState.excluded.delete(k);
    else if (cmState.excluded.has(k)) cmState.excluded.delete(k); else cmState.excluded.add(k);
  } else {
    for (let gy = y0; gy <= y1; gy++) for (let gx = x0; gx <= x1; gx++) {
      const k = cmCellKey(gx, gy);
      if (erase) cmState.excluded.delete(k); else cmState.excluded.add(k);
    }
  }
  cmDrawGrid(); cmUpdateStatus();
}
function cmClearMask() { cmState.excluded.clear(); cmDrawGrid(); cmUpdateStatus(); }
/* Persist the painted mask + chosen grid via PUT /config/cameras/{id}. */
async function cmSaveMask() {
  if (!cmState.camId) return;
  cmMaskErr('');
  const mask = cmCellsToMask();
  try {
    await api('/config/cameras/' + cmState.camId, { method: 'PUT', body: JSON.stringify({
      motion_mask: mask, motion_grid_cols: cmState.cols, motion_grid_rows: cmState.rows,
    }) });
    toast(`Motion zones saved (${mask.length} zone${mask.length!==1?'s':''}).`);
    await ensureCams();
  } catch (e) { cmMaskErr('Save failed: ' + e.message); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   DETECTION & CLIPS, one home for everything about detecting + clipping:
   Frigate (MQTT + detection + all address bases), the motion-decode backend,
   and clip behavior. Merges the old "Integrations" (frigate_config, DB-backed,
   hot-reloaded) with the Frigate address bases / hwaccel / clip settings that
   used to live under "Server & streaming" (S3, S4).

   NOTE (Phase 1): this is a UI reorganization only. The two Frigate-HTTP-API
   fields (frigate_config.api_base and server_settings.frigate_http_api_base)
   still write their OWN columns, collapsing them to one owner is D3 (Phase 4).
   Saving a section only touches that section's backing table.
═══════════════════════════════════════════════════════════════════════════ */
/* ── Motion-decode TRUTH (GET /config/decode-status) ─────────────────────────
   "I switched to VAAPI and have no idea if it's running." The recorder reports
   what it ACTUALLY launched per camera (requested vs active + why it fell back)
   plus the container's accelerator surface (render nodes / NVIDIA device /
   compiled-in ffmpeg hwaccels). This block paints that truth into the Motion
   decoding panel and polls it after "Save decoding" so the operator watches the
   badges converge (or read the honest fallback reason).
   Degrades on an older server (endpoint 404): everything stays hidden. */
let DECODE_STATUS;            // undefined = never fetched; null = endpoint absent; else DTO
let _decodePollTimer = null;

const DECODE_BACKEND_LABEL = { cpu: 'CPU', cuda: 'NVDEC', vaapi: 'VAAPI', auto: 'Auto', none: 'none' };
function decodeBackendLabel(b) { return DECODE_BACKEND_LABEL[b] || (b || '?'); }
function decodeAgo(ts) {
  const t = Date.parse(ts); if (isNaN(t)) return '';
  const s = Math.max(0, (Date.now() - t) / 1000);
  if (s < 90) return Math.round(s) + 's ago';
  if (s < 5400) return Math.round(s / 60) + 'm ago';
  if (s < 129600) return Math.round(s / 3600) + 'h ago';
  return Math.round(s / 86400) + 'd ago';
}

async function loadDecodeStatus() {
  try { DECODE_STATUS = await api('/config/decode-status'); }
  catch (_) {
    // First fetch failing (404 on an older server, or any error) → hide the
    // surface. A later transient failure keeps the last-good snapshot.
    if (DECODE_STATUS === undefined) DECODE_STATUS = null;
  }
}

/* One-line capability summary, color-coded. `st` = the decode-status DTO. */
function decodeCapsSummaryHtml(st) {
  if (!st) return '';
  const caps = st.capabilities;
  if (!caps) {
    return `<span style="color:var(--warn)">●</span> <b>No hardware report from the recorder yet</b>, the recorder posts one each time it starts. If it's running an older image, update it; status appears after its next boot.`;
  }
  const dri = caps.dri_devices || [];
  const hw = caps.ffmpeg_hwaccels || [];
  const bits = [];
  bits.push(dri.length ? `render nodes: <code>${dri.map(d => esc(d)).join('</code>, <code>')}</code>` : 'no /dev/dri render nodes');
  bits.push(caps.nvidia ? 'NVIDIA device: present' : 'no NVIDIA device');
  if (hw.length) bits.push(`ffmpeg hwaccels (compiled-in, not necessarily usable): ${hw.map(h => esc(h)).join(', ')}`);
  const anyHw = dri.length > 0 || caps.nvidia;
  if (anyHw) {
    return `<span style="color:var(--ok)">●</span> <b>Recorder container:</b> ${bits.join(' · ')} <span style="color:var(--dim2)">— detected ${decodeAgo(caps.detected_at)}</span>`;
  }
  return `<span style="color:var(--warn)">●</span> <b>Recorder container: no /dev/dri render nodes, no NVIDIA device</b>, hardware decode requires a compose overlay (see below when a hardware backend is selected). ${hw.length ? bits[2] : ''} <span style="color:var(--dim2)">— detected ${decodeAgo(caps.detected_at)}</span>`;
}

/* Per-camera requested-vs-active badge. */
function decodeCamBadgeHtml(c) {
  const pill = (fg, bg, text, title) =>
    `<span title="${esc(title || '')}" style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;background:${bg};color:${fg};white-space:nowrap">${text}</span>`;
  if (c.active === 'none') {
    return pill('var(--dim)', 'var(--border)', 'no local decode (Frigate / no sub-stream)',
      'This camera has no local motion-decode worker, its motion comes from Frigate, or it has no sub-stream.');
  }
  const ok = !c.fallback_reason && (c.requested === c.active || c.requested === 'auto');
  if (ok) {
    return pill('var(--ok)', 'rgba(52,199,89,.12)', 'Active: ' + esc(decodeBackendLabel(c.active)) + ' ✓',
      'Requested ' + decodeBackendLabel(c.requested) + ', running ' + decodeBackendLabel(c.active) + '.');
  }
  const sev = (c.requested !== 'auto' && c.requested !== c.active) ? 'var(--danger)' : 'var(--warn)';
  const badge = pill(sev, sev === 'var(--danger)' ? 'rgba(229,72,77,.12)' : 'rgba(245,166,35,.12)',
    'Requested ' + esc(decodeBackendLabel(c.requested)) + ' → running ' + esc(decodeBackendLabel(c.active)),
    c.fallback_reason || '');
  const why = c.fallback_reason
    ? `<span style="font-size:11px;color:var(--dim2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0" title="${esc(c.fallback_reason)}">${esc(c.fallback_reason)}</span>`
    : '';
  return badge + why;
}

function decodeCamsHtml(st) {
  const cams = (st && st.cameras) || [];
  if (!cams.length) return '<div class="card-hint" style="margin-top:8px">No motion-decode workers reported yet, rows appear when the recorder (re)starts a camera\'s motion worker.</div>';
  return cams.map(c => `
    <div style="display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid var(--border);min-width:0">
      <span style="flex:0 0 170px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.camera_name)}">${esc(c.camera_name)}</span>
      ${decodeCamBadgeHtml(c)}
      <span style="flex:1"></span>
      <span style="font-size:11px;color:var(--dim2);white-space:nowrap">${decodeAgo(c.updated_at)}</span>
    </div>`).join('');
}

/* Explicit next-steps guidance when the OPERATOR-SELECTED backend needs a device
   the recorder container demonstrably doesn't have. Shared by the Detection &
   clips panel and the setup wizard's Motion-decoding step. Returns '' when
   there's nothing actionable to say. */
function decodeGuidanceHtml(backend, st) {
  if (backend !== 'vaapi' && backend !== 'cuda') return '';
  if (!st) return ''; // no truth available (older server / not loaded), the static hint covers it
  const caps = st.capabilities;
  const box = inner => `<div style="border:1px solid var(--warn);border-radius:6px;padding:10px 12px;margin-top:10px;font-size:12px;line-height:1.6;color:var(--dim)">${inner}</div>`;
  const cmd = c => `<pre class="mono" style="margin:6px 0;padding:7px 9px;background:var(--panel2,rgba(0,0,0,.25));border-radius:4px;overflow-x:auto;font-size:11.5px;white-space:pre">${c}</pre>`;
  if (!caps) {
    return box(`<b style="color:var(--warn)">Can't verify this pick yet:</b> the recorder hasn't reported its hardware. If motion decode falls back to CPU after saving, the compose overlays below are the usual fix (<code>docker-compose.vaapi.example.yml</code> for Intel/AMD iGPU, <code>docker-compose.gpu.example.yml</code> for NVIDIA, both at the repo root).`);
  }
  const notCompiled = (caps.ffmpeg_hwaccels || []).length && !(caps.ffmpeg_hwaccels || []).includes(backend)
    ? `<br><b style="color:var(--danger)">Also:</b> the recorder's bundled ffmpeg was not compiled with <code>${esc(backend)}</code> support, this backend cannot work with the current recorder image.` : '';
  if (backend === 'vaapi' && (caps.dri_devices || []).length === 0) {
    return box(
      `<b style="color:var(--warn)">VAAPI can't work yet:</b> the recorder container has no <code>/dev/dri</code> render node mapped in, the recorder will fall back to CPU decode.<br>` +
      `Easiest fix, one command on the server (detects the hardware, writes <code>docker-compose.override.yml</code>, restarts the recorder):` +
      cmd(`scripts/enable-hwaccel.sh --backend vaapi`) +
      `Or by hand with the committed overlay <code>docker-compose.vaapi.example.yml</code> (repo root):` +
      cmd(`docker compose -f docker-compose.yml -f docker-compose.vaapi.example.yml up -d recorder`) +
      `For the manual path: set <code>RENDER_GID</code> in <code>.env</code> to the host's render-group GID (<code>getent group render | cut -d: -f3</code>), and <code>MOTION_VAAPI_DEVICE</code> if your iGPU's render node isn't <code>/dev/dri/renderD128</code> (check <code>ls -l /dev/dri/by-path</code>).` +
      notCompiled);
  }
  if (backend === 'cuda' && !caps.nvidia) {
    return box(
      `<b style="color:var(--warn)">NVDEC can't work yet:</b> the recorder container has no NVIDIA device, the recorder will fall back to CPU decode.<br>` +
      `The host needs the NVIDIA driver + <code>nvidia-container-toolkit</code>. Easiest fix, one command on the server (verifies the driver, writes <code>docker-compose.override.yml</code>, restarts the recorder):` +
      cmd(`scripts/enable-hwaccel.sh --backend nvdec`) +
      `Or by hand with the committed overlay <code>docker-compose.gpu.example.yml</code> (repo root):` +
      cmd(`docker compose -f docker-compose.yml -f docker-compose.gpu.example.yml up -d recorder`) +
      notCompiled);
  }
  if (notCompiled) return box(`<b style="color:var(--danger)">Heads up:</b> the device is present, but the recorder's bundled ffmpeg was not compiled with <code>${esc(backend)}</code> support, this backend cannot work with the current recorder image.`);
  // Device present + compiled in, a small positive confirmation.
  const dev = backend === 'vaapi' ? (caps.dri_devices || [])[0] : 'NVIDIA device';
  return `<div style="font-size:12px;color:var(--ok);margin-top:8px">✓ ${esc(dev)} is mapped into the recorder container, ${esc(decodeBackendLabel(backend))} should engage after Save (watch the per-camera status below).</div>`;
}

/* Paint strip + per-camera rows + selected-backend guidance into the Motion
   decoding panel (no-op when the pane isn't on screen or the endpoint is absent). */
function renderDecodeStatus() {
  const strip = $('decode-status-strip'), cams = $('decode-status-cams'), guide = $('decode-overlay-guide');
  if (!strip && !cams && !guide) return;
  if (!DECODE_STATUS) { // null (unsupported) or undefined (not yet loaded) → hidden
    if (strip) strip.style.display = 'none';
    if (cams) cams.style.display = 'none';
    if (guide) guide.innerHTML = '';
    return;
  }
  if (strip) {
    strip.style.display = '';
    strip.innerHTML = decodeCapsSummaryHtml(DECODE_STATUS);
  }
  if (cams) {
    cams.style.display = '';
    cams.innerHTML = `<div class="policy-section-title" style="margin-top:12px">Per-camera decode status <span style="font-weight:400;color:var(--dim2);text-transform:none;letter-spacing:0">— requested vs actually running</span></div>` + decodeCamsHtml(DECODE_STATUS);
  }
  if (guide) {
    const sel = $('srv-hwaccel');
    guide.innerHTML = sel ? decodeGuidanceHtml(sel.value, DECODE_STATUS) : '';
  }
}

async function refreshDecodeStatus() {
  await loadDecodeStatus();
  renderDecodeStatus();
}

/* After "Save decoding": the recorder hot-reloads its motion workers within a
   few seconds, poll ~every 2 s for up to ~20 s so the operator SEES the badges
   converge (or the honest fallback reason). Stops early if the pane goes away. */
function pollDecodeStatus() {
  if (_decodePollTimer) { clearInterval(_decodePollTimer); _decodePollTimer = null; }
  if (DECODE_STATUS === null) return; // endpoint absent, nothing to poll
  let ticks = 0;
  _decodePollTimer = setInterval(async () => {
    ticks++;
    if (ticks > 10 || !$('decode-status-strip')) { clearInterval(_decodePollTimer); _decodePollTimer = null; return; }
    await refreshDecodeStatus();
  }, 2000);
}

/* ── Motion RAM-cache telemetry (GET /config/motion-cache-status) ───────────
   Mirrors the decode-status block above: the recorder reports real cache
   usage + per-camera ring occupancy; the API adds a per-camera projected
   need. Two surfaces read the same fetch:
     1. A compact stat line in the recording-profile editor (Recording
        behavior section), refreshed when the mode radio toggles.
     2. A fuller "Motion cache" gauge + per-camera table on the Storage page.
   Degrades silently on an older server (endpoint 404). */
let MOTION_CACHE_STATUS; // undefined = never fetched; null = endpoint absent; else DTO

async function loadMotionCacheStatus(force) {
  if (MOTION_CACHE_STATUS !== undefined && !force) return MOTION_CACHE_STATUS;
  try { MOTION_CACHE_STATUS = await api('/config/motion-cache-status'); }
  catch (_) { if (MOTION_CACHE_STATUS === undefined) MOTION_CACHE_STATUS = null; }
  return MOTION_CACHE_STATUS;
}

/* pct 0..100 (or null if we can't compute one) + a severity bucket the
   caller uses for color. Bucketing matches the spec: <60% ok, 60–85% warn,
   >85% danger. */
function motionCacheSeverity(usedBytes, totalBytes) {
  if (totalBytes == null || !totalBytes || usedBytes == null) return { pct: null, sev: 'ok' };
  const pct = Math.max(0, Math.min(100, (usedBytes / totalBytes) * 100));
  const sev = pct > 85 ? 'danger' : pct > 60 ? 'warn' : 'ok';
  return { pct, sev };
}
const MC_SEV_COLOR = { ok: 'var(--ok)', warn: 'var(--warn)', danger: 'var(--danger)' };

/* Compact one-line stat for the recording-profile editor's Recording
   behavior section. `st` = the motion-cache-status DTO (or null/undefined). */
function motionCacheStatLineHtml(st) {
  if (st === undefined) return '<span style="color:var(--dim2)">Loading motion cache stats…</span>';
  if (st === null) return ''; // older server, hide entirely
  const g = st.global;
  const motionCams = st.cameras || [];
  if (!motionCams.length && !g) return ''; // nothing Motion-mode yet, nothing to show

  // Prefer the projected total (works even before caching is active) over
  // reported live usage, but show BOTH when we have them.
  const usedKnown = g && typeof g.free_bytes === 'number' && typeof g.total_bytes === 'number';
  const used = usedKnown ? Math.max(0, g.total_bytes - g.free_bytes) : null;
  const total = usedKnown ? g.total_bytes : null;
  const { sev } = motionCacheSeverity(st.total_projected_bytes, total);
  const color = MC_SEV_COLOR[sev];

  const n = motionCams.length;
  const usedTxt = usedKnown ? `${fmtBytes(used)} used of ${fmtBytes(total)}` : 'no cache telemetry yet';
  const projTxt = st.total_projected_bytes > 0 ? `projected need ≈ ${fmtBytes(st.total_projected_bytes)}` : null;
  const shadowPrefix = g && g.shadow_mode ? '<b>Shadow mode</b>, cache not active yet; ' : '';
  const hint = sev === 'danger'
    ? ` <span style="color:var(--dim2)">— raise <code>MOTION_CACHE_TMPFS_BYTES</code> in <code>.env</code></span>`
    : '';

  const bits = [`${n} camera${n!==1?'s':''} in Motion mode`];
  if (projTxt) bits.push(projTxt);

  return `<span style="color:${color}">●</span> ${shadowPrefix}<b>Motion cache (RAM):</b> ${esc(usedTxt)}, ${bits.map(esc).join(', ')}${hint}`;
}

/* Refresh + paint the stat line into the profile editor's placeholder (id
   `${pfx}-motion-cache-stat`). No-op if the placeholder isn't on screen
   (e.g. the editor was closed while the fetch was in flight) or the camera
   isn't in Motion mode. */
async function refreshMotionCacheStat(pfx) {
  const host = $(pfx + '-motion-cache-stat');
  if (!host) return;
  const modeEl = document.querySelector(`input[name="${pfx}-mode"][value="motion"]`);
  if (!modeEl || !modeEl.checked) { host.innerHTML = ''; return; }
  host.innerHTML = motionCacheStatLineHtml(MOTION_CACHE_STATUS);
  const st = await loadMotionCacheStatus(false);
  // Guard: the editor may have closed, or the mode may have flipped back to
  // Continuous, while the fetch was in flight.
  const stillHost = $(pfx + '-motion-cache-stat');
  const stillMotion = document.querySelector(`input[name="${pfx}-mode"][value="motion"]`);
  if (!stillHost || !stillMotion || !stillMotion.checked) return;
  stillHost.innerHTML = motionCacheStatLineHtml(st);
}

/* ── Storage page: fuller "Motion cache" gauge + per-camera table ── */
function motionCacheGaugeHtml(st) {
  if (st === undefined) return '<div class="card-hint" style="padding:6px 2px">Loading motion cache telemetry…</div>';
  if (st === null) return ''; // older server, section hides itself (see caller)
  const g = st.global;
  const cams = st.cameras || [];
  if (!g && !cams.length) {
    return '<div class="card-hint" style="padding:6px 2px;color:var(--dim2)">No cache telemetry yet, reports appear once a Motion-mode camera worker has started.</div>';
  }
  const usedKnown = g && typeof g.free_bytes === 'number' && typeof g.total_bytes === 'number';
  const used = usedKnown ? Math.max(0, g.total_bytes - g.free_bytes) : null;
  const total = usedKnown ? g.total_bytes : 0;
  const pct = usedKnown && total ? Math.round(used / total * 100) : 0;
  const barCls = pct > 85 ? 'crit' : pct > 60 ? 'warn' : '';
  const shadowNote = g && g.shadow_mode
    ? `<div class="card-hint" style="margin:4px 0 8px;color:var(--warn)">Shadow mode is on, the cache is not actually persisting on motion yet; these numbers are for validation.</div>`
    : '';

  const gauge = usedKnown ? `<div class="cap-bar-wrap">
      <div class="cap-bar-track"><div class="cap-bar-fill ${barCls}" style="width:${pct}%"></div></div>
      <div class="cap-bar-meta"><span>${fmtBytes(used)} used</span><span>${fmtBytes(g.free_bytes)} free of ${fmtBytes(total)}</span></div>
    </div>` : `<div class="card-hint" style="padding:2px 0">No cache telemetry yet.</div>`;

  const rows = cams.map(c => `
    <div style="display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid var(--border);min-width:0">
      <span style="flex:0 0 170px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.camera_name)}">${esc(c.camera_name)}</span>
      <span style="flex:0 0 90px;font-size:12px;color:var(--dim)">${c.ring_segments == null ? '—' : c.ring_segments + ' seg'}</span>
      <span style="flex:0 0 90px;font-size:12px;color:var(--dim)">${c.ring_bytes == null ? '—' : fmtBytes(c.ring_bytes)}</span>
      <span style="flex:1"></span>
      <span style="font-size:11px;color:var(--dim2);white-space:nowrap">${c.projected_ring_bytes != null ? 'projected ' + fmtBytes(c.projected_ring_bytes) : 'no estimate yet'}</span>
    </div>`).join('');

  const table = cams.length ? `
    <div class="policy-section-title" style="margin-top:14px">Per-camera ring occupancy</div>
    <div style="display:flex;gap:10px;padding:2px 0 4px;font-size:11px;color:var(--dim2)">
      <span style="flex:0 0 170px">Camera</span><span style="flex:0 0 90px">Ring</span><span style="flex:0 0 90px">Ring size</span><span style="flex:1"></span><span>Projected</span>
    </div>
    ${rows}
    <div class="card-hint" style="margin-top:8px">Total projected across Motion cameras: <b>${esc(fmtBytes(st.total_projected_bytes))}</b></div>`
    : '<div class="card-hint" style="margin-top:10px">No Motion-mode cameras configured.</div>';

  return shadowNote + gauge + table;
}

async function loadMotionCacheGauge() {
  const host = $('motion-cache-gauge'); if (!host) return;
  host.innerHTML = '<div class="card-hint" style="padding:6px 2px">Loading motion cache telemetry…</div>';
  const st = await loadMotionCacheStatus(true);
  if (!$('motion-cache-gauge')) return; // navigated away mid-fetch
  if (st === null) { $('motion-cache-section') && ($('motion-cache-section').style.display = 'none'); return; }
  host.innerHTML = motionCacheGaugeHtml(st);
}

async function renderDetectionClips() {

async function saveFrigate() {
  setMsg('fr-msg', '');
  const body = {
    enabled: $('fr-enabled').checked,
    mqtt_url: $('fr-url').value.trim(),
    mqtt_prefix: $('fr-prefix').value.trim() || 'frigate',
    mqtt_user: $('fr-user').value.trim() || null,
    api_base: $('fr-apibase').value.trim() || null,
    min_score: parseFloat($('fr-score').value),
    catchup_hours: parseInt($('fr-catchup').value, 10),
  };
  // Password: omitted = unchanged; "Clear" sends ""; a typed value sets it.
  if ($('fr-pass-clear').checked) body.mqtt_password = '';
  else if ($('fr-pass').value) body.mqtt_password = $('fr-pass').value;
  if (body.enabled && !body.mqtt_url) { setMsg('fr-msg', 'Broker URL is required when Frigate is enabled.', 'err'); return; }
  try {
    await api('/config/frigate', { method: 'PUT', body: JSON.stringify(body) });
    toast('Frigate settings saved, reconnecting (no restart).');
    renderDetectionClips();
  } catch (e) { setMsg('fr-msg', e.message, 'err'); }
}
/* Save the Detection & clips server_settings knobs (Frigate address bases +
   motion-decode backend). /config/server is a whole-row replace whose Crumb
   fields are REQUIRED, so we send a COMPLETE body, the Crumb bases come from the
   fetched settings (DETECTION_SERVER) unchanged; only the Frigate + decode fields
   below reflect this pane. Phase 1 keeps writing the same columns as before
   (frigate_http_api_base stays distinct from frigate_config.api_base, D3/Phase 4). */
async function saveDetectionServer() {
  setMsg('srv-frigate-msg', '');
  const s = DETECTION_SERVER || {};
  const frigateGo2rtc = ($('srv-frigate-go2rtc-api') && $('srv-frigate-go2rtc-api').value.trim()) || '';
  const body = {
    // Crumb-owned fields (required by the PUT), preserve the fetched values.
    server_address:          s.server_address || '',
    crumb_rtsp_base:         s.crumb_rtsp_base || '',
    crumb_api_base:          s.crumb_api_base || '',
    // Frigate address bases (this pane).
    frigate_rtsp_base:       $('srv-frigate-rtsp') ? $('srv-frigate-rtsp').value.trim() : (s.frigate_rtsp_base || ''),
    frigate_go2rtc_api_base: frigateGo2rtc,
    frigate_http_api_base:   $('srv-frigate-http-api') ? $('srv-frigate-http-api').value.trim() : (s.frigate_http_api_base || ''),
    // Keep the legacy single-field column in sync (= go2rtc base) for back-compat.
    frigate_api_base:        frigateGo2rtc,
    // Motion decode backend (recorder hot-reloads its workers on change).
    motion_hwaccel:          $('srv-hwaccel') ? $('srv-hwaccel').value : (s.motion_hwaccel || 'auto'),
    motion_vaapi_device:     $('srv-vaapi-device') ? $('srv-vaapi-device').value.trim() : (s.motion_vaapi_device || ''),
  };
  try {
    const updated = await api('/config/server', { method: 'PUT', body: JSON.stringify(body) });
    DETECTION_SERVER = updated || DETECTION_SERVER;
    toast('Detection settings saved.');
    // The recorder hot-reloads its motion workers within a few seconds, poll
    // the decode truth so the operator watches requested → active converge.
    pollDecodeStatus();
  } catch (e) { setMsg('srv-frigate-msg', e.message, 'err'); }
}
/* ── Home Assistant integration config (ha_config) ── */
async function saveHa() {
  setMsg('ha-msg', '');
  const body = { enabled: $('ha-enabled').checked, base_url: $('ha-url').value.trim() };
  const tok = $('ha-token').value;
  if (tok) body.token = tok;               // write-only: only sent when the user types one
  if (body.enabled && !body.base_url) { setMsg('ha-msg', 'Base URL is required when enabled.', 'err'); return; }
  try {
    const res = await api('/config/ha', { method: 'PUT', body: JSON.stringify(body) });
    $('ha-token').value = '';
    $('ha-token').placeholder = res && res.has_token ? '•••••••• (unchanged)' : '(none set)';
    toast('Home Assistant settings saved.');
  } catch (e) { setMsg('ha-msg', e.message, 'err'); }
}
async function testHa() {
  const el = $('ha-test');
  if (el) { el.textContent = 'Testing…'; el.style.color = 'var(--dim2)'; }
  try {
    await api('/config/ha/test', { method: 'POST' });
    if (el) { el.textContent = 'Connected'; el.style.color = 'var(--ok)'; }
  } catch (e) {
    if (el) { el.textContent = (e && e.message) || 'Failed'; el.style.color = 'var(--danger)'; }
  }
}
/* ── License-plate recognition config (lpr_config) ──
   Toggles plate CAPTURE (privacy-sensitive, off by default) and the plate-read
   retention window. On save we refresh the left nav so the Plates entry
   appears/disappears with the enabled flag. */
async function saveLpr() {
  setMsg('lpr-msg', '');
  const days = parseInt(($('lpr-retention') || {}).value, 10);
  if (!Number.isFinite(days) || days < 1 || days > 3650) {
    setMsg('lpr-msg', 'Retention must be between 1 and 3650 days.', 'err'); return;
  }
  const fuzzPct = Math.max(0, Math.min(50, parseInt(($('lpr-fuzz') || {}).value, 10) || 0));
  const body = { enabled: $('lpr-enabled').checked, retention_days: days, watchlist_fuzz: fuzzPct / 100 };
  try {
    LPR_CONFIG = await api('/config/lpr', { method: 'PUT', body: JSON.stringify(body) });
    renderTree();               // show/hide the Plates nav entry to match
    toast('License-plate settings saved.');
  } catch (e) { setMsg('lpr-msg', e.message, 'err'); }
}
/* ── Frigate URL-base test (POST /config/frigate/test-http) ──────────────────
   Server-side probe of the go2rtc REST base + Frigate HTTP API base (the
   browser can't cross-origin probe them). Shared by the setup wizard's
   Object-detection step and the console's Frigate-stream-addresses panel.
   Paints per-target ✓/✕ + operator-ready detail into `el`. Non-blocking —
   purely informational. */
async function frigateHttpTest(go2, http, el) {
  if (!el) return;
  go2 = (go2 || '').trim(); http = (http || '').trim();
  if (!go2 && !http) { el.style.color = 'var(--danger)'; el.textContent = 'Enter a URL base first.'; return; }
  el.style.color = 'var(--dim)'; el.textContent = 'Testing…';
  let r;
  try {
    r = await api('/config/frigate/test-http', { method: 'POST', body: JSON.stringify({ go2rtc_api_base: go2, http_api_base: http }) });
  } catch (e) { el.style.color = 'var(--danger)'; el.textContent = 'Test failed: ' + e.message; return; }
  const part = (label, t) => {
    if (!t || t.ok === null || t.ok === undefined) return `<span style="color:var(--dim2)">${label}: skipped</span>`;
    const col = t.ok ? 'var(--ok)' : 'var(--danger)';
    return `<span style="color:${col}" title="${esc(t.detail || '')}">${t.ok ? '✓' : '✕'} ${label}: ${esc(t.detail || '')}</span>`;
  };
  el.style.color = '';
  el.innerHTML = part('go2rtc', r.go2rtc) + '<br>' + part('HTTP API', r.http);
}
function wizardFrigateTest() {
  frigateHttpTest(($('wz-frg-go2rtc') || {}).value, ($('wz-frg-http') || {}).value, $('wz-frg-test'));
}
function consoleFrigateHttpTest() {
  frigateHttpTest(($('srv-frigate-go2rtc-api') || {}).value, ($('srv-frigate-http-api') || {}).value, $('srv-frigate-test'));
}
async function testFrigate() {
  const el = $('fr-test'); if (!el) return;
  el.textContent = 'Testing…'; el.style.color = 'var(--dim)';
  try {
    const r = await api('/config/frigate/test', { method: 'POST', body: JSON.stringify({ enabled: true, mqtt_url: $('fr-url').value.trim() }) });
    el.textContent = r.detail;
    el.style.color = r.ok ? 'var(--ok)' : 'var(--danger)';
  } catch (e) { el.textContent = e.message; el.style.color = 'var(--danger)'; }
}

/* ═══════════════════════════════════════════════════════════════════════════
   SERVER & STREAMING, the reachable RTSP / API bases the recorder + clients use.
   crumb_* = Crumb's OWN go2rtc restreamer (cameras you add in Crumb).
   frigate_* = an EXTERNAL Frigate's go2rtc (bring-your-own).
   An empty field falls back to the container env default, so a fresh
   `docker compose up` records + serves the web UI with no config; the PUBLIC
   address only matters for native desktop/Android RTSP clients.

async function saveServerSettings() {
  setMsg('srv-msg', '');
  // /config/server is a whole-row replace; the Frigate/motion columns are edited
  // in Detection & clips now, so preserve their fetched values (SERVER_SETTINGS)
  // rather than blanking them. Only the This-server + Crumb fields come from here.
  const s = SERVER_SETTINGS || {};
  const body = {
    server_address:          $('srv-address').value.trim(),
    crumb_rtsp_base:         $('srv-crumb-rtsp').value.trim(),
    crumb_api_base:          $('srv-crumb-api').value.trim(),

    frigate_http_api_base:   s.frigate_http_api_base || '',
    frigate_api_base:        s.frigate_api_base || '',
    motion_hwaccel:          s.motion_hwaccel || 'auto',
    motion_vaapi_device:     s.motion_vaapi_device || '',
  };

    const updated = await api('/config/server', { method: 'PUT', body: JSON.stringify(body) });
