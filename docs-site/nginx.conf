server {
  listen      3000;
  server_name _;
  root        /usr/share/nginx/html;
  index       index.html;

  # Hide nginx version
  server_tokens off;

  # Docusaurus-friendly routing: try the exact file, then a directory index,
  # then fall back to Docusaurus's generated 404.html (NOT a bare 404) so a
  # client-side navigation to a route Docusaurus pre-rendered still gets a
  # branded page.
  location / {
    try_files $uri $uri/ $uri/index.html /404.html;
  }

  # Cache long-lived hashed build assets aggressively; html lightly so a
  # redeploy is picked up promptly.
  location ~* \.(?:png|jpg|jpeg|svg|webp|css|js|woff2|ico)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }
  location ~* \.html$ {
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
  }

  # Health endpoint for the doco-cd / monitoring poke and the container
  # healthcheck below.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    default_type text/plain;
  }
}
