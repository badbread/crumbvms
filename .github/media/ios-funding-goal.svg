<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 250" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="bulbG" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#f4cd72"/>
      <stop offset="1" stop-color="#b9791f"/>
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="676" height="246" rx="18" fill="#fffdf8" stroke="#eadfce" stroke-width="1.5" filter="url(#sh)"/>

  <!-- $99 goal burst -->
  <g transform="translate(98,30)">
    <path d="M0,-20 L4.5,-6.2 L19,-6.2 L7.3,2.4 L11.7,16.2 L0,7.8 L-11.7,16.2 L-7.3,2.4 L-19,-6.2 L-4.5,-6.2 Z" fill="#e8a33d" stroke="#c07f22" stroke-width="1"/>
    <text x="0" y="3.5" text-anchor="middle" font-size="9.5" font-weight="800" fill="#5a3a11">$99</text>
  </g>

  <!-- tube track + bulb outline (the crumbs will rise up this tube as funds come in) -->
  <rect x="84" y="54" width="28" height="148" rx="14" fill="#f6efe2" stroke="#d8c6a8" stroke-width="2"/>
  <circle cx="98" cy="208" r="25" fill="#f6efe2" stroke="#d8c6a8" stroke-width="2"/>

  <!-- breadcrumb reservoir in the bulb (0% raised: crumbs waiting at the bottom) -->
  <clipPath id="bulbclip"><circle cx="98" cy="208" r="22"/></clipPath>
  <g clip-path="url(#bulbclip)">
    <circle cx="98" cy="208" r="22" fill="url(#bulbG)"/>
    <circle cx="90"  cy="200" r="2.4" fill="#a5701f"/>
    <circle cx="100" cy="197" r="1.8" fill="#f0d18a"/>
    <circle cx="107" cy="203" r="2.6" fill="#8f5e18"/>
    <circle cx="94"  cy="206" r="1.6" fill="#f5dca0"/>
    <circle cx="103" cy="209" r="2.2" fill="#7d5115"/>
    <circle cx="88"  cy="211" r="2.0" fill="#b47f2a"/>
    <circle cx="96"  cy="214" r="2.6" fill="#9a661c"/>
    <circle cx="106" cy="214" r="1.7" fill="#e8c274"/>
    <circle cx="110" cy="208" r="1.9" fill="#83571a"/>
    <circle cx="99"  cy="203" r="1.5" fill="#f2d492"/>
    <circle cx="92"  cy="197" r="1.6" fill="#6f4a13"/>
    <circle cx="104" cy="199" r="1.5" fill="#c79236"/>
  </g>

  <!-- a few crumbs scattered on the counter -->
  <ellipse cx="66"  cy="226" rx="3"   ry="2.2" fill="#c8962f"/>
  <circle  cx="60"  cy="230" r="1.8"  fill="#9a661c"/>
  <ellipse cx="132" cy="230" rx="3.4" ry="2.4" fill="#b9832a" transform="rotate(18 132 230)"/>
  <circle  cx="140" cy="226" r="1.6"  fill="#e8c274"/>
  <circle  cx="150" cy="232" r="2.1"  fill="#8f5e18"/>

  <!-- scale -->
  <g font-size="10" fill="#8a7a5e">
    <g stroke="#d8c6a8" stroke-width="1.5">
      <line x1="114" y1="196" x2="122" y2="196"/>
      <line x1="114" y1="160" x2="122" y2="160"/>
      <line x1="114" y1="124" x2="122" y2="124"/>
      <line x1="114" y1="88"  x2="122" y2="88"/>
    </g>
    <text x="126" y="199">$0</text>
    <text x="126" y="163">$25</text>
    <text x="126" y="127">$50</text>
    <text x="126" y="91">$75</text>
  </g>

  <!-- copy -->
  <text x="210" y="68" font-size="23" font-weight="800" fill="#2b2113">Help unlock the iOS app</text>
  <text x="210" y="97" font-size="14" fill="#6b5a3f">The iOS app is built and ready for testing. Apple requires a</text>
  <text x="210" y="117" font-size="14" fill="#6b5a3f">$99/year developer account before it can go out to testers.</text>

  <text x="210" y="170" font-size="30" font-weight="800" fill="#2b2113">$0<tspan font-size="16" font-weight="600" fill="#8a7a5e"> raised of $99</tspan></text>
  <text x="210" y="198" font-size="13.5" font-weight="700" fill="#b8791f">Leave a crumb to help put CrumbVMS on your iPhone</text>
</svg>
