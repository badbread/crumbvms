# Crumb — macOS desktop app (native SwiftUI)
#
# Builds the native macOS app (target `Crumb-mac`, shares the iOS SwiftUI code,
# no WebRTC) on a GitHub-hosted macos-latest runner and zips the .app. The
# Xcode project is generated by XcodeGen from apps/ios/project.yml.
#
# Triggers:
#   - push to ci/macos-installer → build + upload as a workflow ARTIFACT (iteration)
#   - v* tag                     → build + attach the zip to that Release
#   - workflow_dispatch          → manual build (artifact only)
#
# Unsigned for now: macOS Gatekeeper will say the app is from an unidentified
# developer. Users right-click the app and choose Open (or `xattr -dr
# com.apple.quarantine Crumb.app`). Notarization needs a paid Apple Developer
# account; documented in docs/CLIENTS.md.
name: macos-release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # attach the app zip to the GitHub Release (tag builds)

jobs:
  build:
    name: build macOS app
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the Xcode project
        run: xcodegen generate

      - name: Build the macOS app (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project Crumb.xcodeproj \
            -scheme Crumb-mac \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Locate + zip the .app
        id: pkg
        run: |
          APP=$(find build/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1)
          if [ -z "$APP" ]; then echo "::error::no .app produced under Release"; ls -R build/Build/Products || true; exit 1; fi
          echo "app: $APP"
          VER=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Contents/Info.plist" 2>/dev/null || echo 0.0.1)
          OUT="CrumbVMS-macos-${VER}.zip"
          ditto -c -k --keepParent "$APP" "$OUT"
          H=$(shasum -a 256 "$OUT" | awk '{print $1}')
          printf '%s  %s\n' "$H" "$OUT" > "$OUT.sha256"
          ls -la "$OUT" "$OUT.sha256"

      - name: Upload app as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: crumbvms-macos-app
          path: |
            apps/ios/CrumbVMS-macos-*.zip
            apps/ios/CrumbVMS-macos-*.zip.sha256
          if-no-files-found: error

      - name: Attach app + sha256 to the Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" CrumbVMS-macos-*.zip CrumbVMS-macos-*.zip.sha256 --clobber --repo "${GITHUB_REPOSITORY}"
