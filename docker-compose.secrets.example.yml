# Crumb — Docker Compose SECRETS overlay (audit Risk #9).
#
# Moves the four sensitive values out of plaintext .env into files mounted at
# /run/secrets/<name>, instead of injecting them as environment variables:
#   - the Postgres password          (postgres native *_FILE support)
#   - the full DATABASE_URL          (recorder + api, via the app's *_FILE reader)
#   - the JWT signing secret          (api)
#   - the bootstrap admin password    (api)
#
# This overlay is OPT-IN and additive — the default `docker compose up -d` keeps
# using .env unchanged. To use secrets instead:
#
#   ./scripts/setup-secrets.sh                 # generate ./secrets/* (once)
#   cp docker-compose.secrets.example.yml docker-compose.secrets.yml
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# NOTE: empty string env values below are intentional — both the postgres
# entrypoint and the app's secret reader treat an empty var as "unset" and fall
# through to the *_FILE source, so there is no "both var and _FILE set" conflict.
#
# IMPORTANT: this overlay must NOT set a top-level `name:` — Compose lets the
# last file's project name win, so overriding it here would silently re-home the
# whole stack to a different project on adoption: a brand-new empty Postgres
# volume, port collisions with the running stack, and an apparent total loss of
# the segment index. The base file's `name: crumbvms` is inherited; keep it that
# way so the DB volume (`crumbvms_crumb_pgdata`) stays put.

secrets:
  db_password:
    file: ./secrets/db_password
  database_url:
    file: ./secrets/database_url
  jwt_secret:
    file: ./secrets/jwt_secret
  admin_password:
    file: ./secrets/admin_password

services:
  postgres:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_PASSWORD: ""
    secrets:
      - db_password

  recorder:
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_URL: ""
    secrets:
      - database_url

  api:
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_URL: ""
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_SECRET: ""
      SEED_ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      SEED_ADMIN_PASSWORD: ""
    secrets:
      - database_url
      - jwt_secret
      - admin_password
